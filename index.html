function jerseyDotCss(team) {
  if (!team) return 'background:#ccc;';
  const primary = hsl(team.primaryColor);
  const secondary = team.secondaryColor ? hsl(team.secondaryColor) : primary;
  const tertiary = team.tertiaryColor ? hsl(team.tertiaryColor) : secondary;
  switch (team.design) {
    case 'vertical-stripes':
      return `background-image: repeating-linear-gradient(90deg, ${primary}, ${primary} 15%, ${secondary} 15%, ${secondary} 30%);`;
    case 'sash':
      return `background-image: linear-gradient(135deg, ${primary} 42%, ${secondary} 42%, ${secondary} 58%, ${primary} 58%);`;
    case 'horizontal-stripe':
      return `background-image: linear-gradient(180deg, ${primary} 33%, ${secondary} 33%, ${secondary} 67%, ${primary} 67%);`;
    case 'v-shape':
      return `background-image: conic-gradient(from -135deg at 50% 25%, ${primary} 90deg, ${secondary} 90deg, ${secondary} 180deg, ${primary} 180deg);`;
    case 'double-vertical-stripe':
      return `background-image: linear-gradient(to right, ${primary} 30%, ${secondary} 30%, ${secondary} 50%, ${tertiary} 50%, ${tertiary} 70%, ${primary} 70%);`;
    case 'triple-horizontal-stripe':
      return `background-image: linear-gradient(to bottom, ${primary} 35%, ${secondary} 35%, ${secondary} 45%, ${tertiary} 45%, ${tertiary} 55%, ${secondary} 55%, ${secondary} 65%, ${primary} 65%);`;
    default:
      return `background-color: ${primary};`;
  }
}
function jerseyDot(teamIdOrTeam, size) {
  const team = typeof teamIdOrTeam === 'string' ? TEAMS.find(t => t.id === teamIdOrTeam) : teamIdOrTeam;
  size = size || 18;
  return `<span style="display:inline-block; width:${size}px; height:${size}px; border-radius:50%; border:1px solid rgba(0,0,0,0.2); ${jerseyDotCss(team)} vertical-align:middle; flex-shrink:0;"></span>`;
}

function renderLeagueSetup() {
  if (leagueSelectedTeams.length !== leagueNumTeams) leagueSelectedTeams = Array(leagueNumTeams).fill(null);
  const teamSelectors = Array.from({ length: leagueNumTeams }).map((_, i) => {
    const options = TEAMS.map(t => {
      const disabled = leagueSelectedTeams.includes(t.id) && leagueSelectedTeams[i] !== t.id;
      const selected = leagueSelectedTeams[i] === t.id;
      return `<option value="${t.id}" ${selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}>${t.name}</option>`;
    }).join('');
    return `
      <div>
        <span class="field-label">Equipo ${i + 1}</span>
        <select class="team-pick league-team-select" data-team-slot="${i}" style="width:100%;">
          <option value="" ${!leagueSelectedTeams[i] ? 'selected' : ''} disabled>Elige un equipo</option>
          ${options}
        </select>
      </div>`;
  }).join('');

  const hasDuplicates = leagueSelectedTeams.filter(Boolean).length !== new Set(leagueSelectedTeams.filter(Boolean)).size;
  const allSelected = leagueSelectedTeams.every(Boolean);

  return `
  <div class="menu-screen" style="max-width:680px;">
    <h1>🏆 Configurar Liga</h1>
    <div class="subtitle">Elige los equipos y la duración de cada partido. Se juega ida y vuelta.</div>
    <div class="setup-row">
      <div>
        <span class="field-label">Número de equipos</span>
        <select class="team-pick" id="league-num-teams" style="width:100%;">
          ${[2,3,4,5,6,7,8].map(n => `<option value="${n}" ${n===leagueNumTeams?'selected':''}>${n} equipos</option>`).join('')}
        </select>
      </div>
      <div>
        <span class="field-label">Duración por tiempo</span>
        <div class="duration-row" id="league-duration-row">
          ${[5, 10, 20, 30, 45].map(m => `<button data-league-duration="${m}" class="${m === leagueDuration ? 'active' : ''}">${m} min</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="team-select-grid" style="grid-template-columns: 1fr 1fr;">
      ${teamSelectors}
    </div>
    ${hasDuplicates ? `<p style="color:#9a2f24; font-size:0.8rem; text-align:center; margin-top:8px;">No puedes seleccionar el mismo equipo dos veces.</p>` : ''}
    <div class="menu-grid" style="margin-top:16px;">
      <button class="menu-btn" id="start-league-btn" style="background:var(--accent); border-color:var(--accent); ${(!allSelected || hasDuplicates) ? 'opacity:0.5; pointer-events:none;' : ''}">
        <div class="t" style="color:#fff;">🏆 Comenzar liga →</div>
      </button>
      <button class="menu-btn" data-menu="back"><div class="t">← Volver</div></button>
    </div>
  </div>`;
}

let leagueViewTab = 'standings';

function renderLeagueView(s) {
  const ls = s.leagueState;
  const sortedTeams = getSortedLeagueTeams(ls.teams, ls.schedule);
  const matchesByRound = {};
  ls.schedule.forEach(m => { (matchesByRound[m.round] = matchesByRound[m.round] || []).push(m); });

  const tabs = [
    { id: 'standings', label: '📊 Tabla' },
    { id: 'schedule', label: '📅 Calendario' },
    { id: 'scorers', label: '⭐ Goleadores' },
  ];

  let body = '';
  if (leagueViewTab === 'standings') {
    body = `
    <table class="league-table">
      <thead><tr><th>#</th><th style="text-align:left;">Equipo</th><th>Pts</th><th>PJ</th><th>V</th><th>E</th><th>D</th><th>GF</th><th>GC</th><th>DG</th></tr></thead>
      <tbody>
        ${sortedTeams.map((t, i) => `
          <tr class="${i < 2 ? 'top' : ''}">
            <td>${i + 1}</td>
            <td style="text-align:left;"><div style="display:flex; align-items:center; gap:6px;">${jerseyDot(t.teamId, 16)} ${t.name}</div></td>
            <td><b>${t.points}</b></td><td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td>
            <td>${t.goalsFor}</td><td>${t.goalsAgainst}</td><td>${t.goalDifference > 0 ? '+' + t.goalDifference : t.goalDifference}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  } else if (leagueViewTab === 'schedule') {
    const rounds = Object.keys(matchesByRound).map(Number).sort((a, b) => a - b);
    body = rounds.map(round => `
      <div class="league-round">
        <div class="league-round-title ${round === ls.currentRound ? 'current' : ''}">Jornada ${round}${round === ls.currentRound ? ' (actual)' : ''}</div>
        ${matchesByRound[round].map(m => {
          const homeT = TEAMS.find(t => t.id === m.homeTeamId), awayT = TEAMS.find(t => t.id === m.awayTeamId);
          return `
          <div class="league-match-row">
            <div class="league-match-team"><span>${homeT.name}</span>${jerseyDot(homeT, 16)}</div>
            <div class="league-match-score">
              ${m.played ? `<b>${m.homeScore} - ${m.awayScore}</b>` : (round === ls.currentRound ? `<button class="btn" data-play-match="${m.matchId}" style="padding:5px 12px; font-size:0.75rem;">Jugar</button>` : '<span style="opacity:0.4;">vs</span>')}
            </div>
            <div class="league-match-team away">${jerseyDot(awayT, 16)}<span>${awayT.name}</span></div>
          </div>`;
        }).join('')}
      </div>`).join('');
  } else if (leagueViewTab === 'scorers') {
    const topScorers = ls.playerStats.filter(p => p.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 10);
    const topAssists = ls.playerStats.filter(p => p.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 10);
    const renderStatTable = (list, key, label) => list.length === 0 ? `<p style="text-align:center; color:#8a9582; padding:14px 0;">Aún no hay estadísticas.</p>` : `
      <table class="league-table" style="margin-bottom:16px;">
        <thead><tr><th>#</th><th style="text-align:left;">Jugador</th><th style="text-align:left;">Equipo</th><th>${label}</th></tr></thead>
        <tbody>${list.map((p, i) => `<tr><td>${i+1}</td><td style="text-align:left;">${p.name}</td><td style="text-align:left;"><div style="display:flex; align-items:center; gap:6px;">${jerseyDot(p.teamId, 14)} ${TEAMS.find(t=>t.id===p.teamId)?.name}</div></td><td><b>${p[key]}</b></td></tr>`).join('')}</tbody>
      </table>`;
    body = `<h3 style="margin:0 0 6px;">Goleadores</h3>${renderStatTable(topScorers, 'goals', 'Goles')}<h3 style="margin:14px 0 6px;">Asistencias</h3>${renderStatTable(topAssists, 'assists', 'Asist.')}`;
  }

  return `
  <div class="menu-screen league-screen" style="max-width:760px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h1 style="margin:0; font-size:1.6rem;">🏆 Liga Hexagol</h1>
      <button class="btn ghost" data-menu="league-exit" style="padding:7px 14px; font-size:0.78rem;">Salir de la liga</button>
    </div>
    <div class="league-tabs">
      ${tabs.map(t => `<button class="league-tab ${leagueViewTab === t.id ? 'active' : ''}" data-league-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
    <div class="league-tab-body">${body}</div>
  </div>`;
}

function renderLeagueOver(s) {
  const ls = s.leagueState;
  const sortedTeams = getSortedLeagueTeams(ls.teams, ls.schedule);
  const champion = sortedTeams[0];
  const championTeam = TEAMS.find(t => t.id === champion.teamId);
  return `
  <div class="menu-screen" style="max-width:600px;">
    <div style="font-size:3.5rem; line-height:1;">🏆</div>
    <h1 style="margin:10px 0 4px;">¡CAMPEONES!</h1>
    <div class="subtitle">La liga ha terminado y <b style="color:${hsl(championTeam.primaryColor)};">${champion.name}</b> se coronó como el mejor equipo.</div>
    <table class="league-table" style="margin-top:10px;">
      <thead><tr><th>#</th><th style="text-align:left;">Equipo</th><th>Pts</th><th>DG</th></tr></thead>
      <tbody>
        ${sortedTeams.slice(0, 3).map((t, i) => `
          <tr class="${i===0?'top':''}"><td>${i+1}</td><td style="text-align:left;"><div style="display:flex; align-items:center; gap:6px;">${jerseyDot(t.teamId,16)} ${t.name}</div></td><td><b>${t.points}</b></td><td>${t.goalDifference > 0 ? '+' + t.goalDifference : t.goalDifference}</td></tr>`).join('')}
      </tbody>
    </table>
    <div class="menu-grid" style="margin-top:16px;">
      <button class="menu-btn" data-menu="back"><div class="t">← Volver al menú principal</div></button>
    </div>
  </div>`;
}

/* =========================================================================
   MAIN GAME SCREEN
   ========================================================================= */

function renderGameScreen(s) {
  const homeKit = hsl(s.homeTeam.primaryColor);
  const awayKit = hsl(s.awayTeam.primaryColor);
  const homeBorder = s.homeTeam.secondaryColor ? hsl(s.homeTeam.secondaryColor) : 'rgba(255,255,255,0.6)';
  const awayBorder = s.awayTeam.secondaryColor ? hsl(s.awayTeam.secondaryColor) : 'rgba(255,255,255,0.6)';

  let msgClass = 'board-message';
  if (s.toastToShow && s.toastToShow.variant === 'destructive') msgClass += '';
  if (s.gamePhase === 'resolving-offside') msgClass += ' alert';
  if (s.gamePhase === 'goalkeeper-swap') msgClass += ' alert';
  if (/GOL|gana|ganó/i.test(s.message)) msgClass += ' good';

  const possessionTotal = s.stats.possession.home + s.stats.possession.away;
  const possHomePct = possessionTotal ? Math.round((s.stats.possession.home / possessionTotal) * 100) : 50;

  const isOnline = s.gameMode === 'online';
  const isMyTurn = !isOnline || s.currentPlayer === onlineMyTeam;
  const opponentLabel = isOnline && !isMyTurn ? `<div class="spectator-banner">⏳ Turno del rival — esperá tu turno</div>` : '';
  const onlineIndicator = isOnline ? `<span class="online-badge"><span class="online-dot"></span> Online · ${onlineMyTeam === 'home' ? 'Local' : 'Visitante'}</span>` : '';

  // Contextual banners for situations that require specific player interaction.
  // These sit above the board message so they're the first thing the eye lands on.
  const offsideBanner = s.gamePhase === 'resolving-offside'
    ? `<div class="situation-banner offside-banner">🚩 Fuera de juego — mové al jugador marcado en rojo a la línea permitida</div>`
    : '';
  const swapBanner = s.gamePhase === 'goalkeeper-swap'
    ? `<div class="situation-banner swap-banner">🔄 Podés cambiar al arquero por uno de los jugadores en su área</div>`
    : '';

  return `
  <div class="game-layout">
    <div class="board-wrap">
      ${opponentLabel}
      ${offsideBanner}
      ${swapBanner}
      <div class="${msgClass}">${s.message}</div>
      <div class="board-frame">${renderBoardSVG(s)}</div>
    </div>
    ${isOnline ? `
    <button class="chat-fab" id="chat-fab-btn" title="Chat">
      💬${onlineChatUnread > 0 ? `<span class="chat-fab-badge">${onlineChatUnread > 9 ? '9+' : onlineChatUnread}</span>` : ''}
    </button>` : ''}
    <div class="panel">
      <div class="mini-scoreboard">
        <div class="mini-team home">
          <span class="kit-dot" style="background:${homeKit}; border-color:${homeBorder};"></span>
          <span class="mini-team-name">${s.homeTeam.name}</span>
          <span class="mini-score">${s.score.home}</span>
        </div>
        <div class="mini-team away">
          <span class="kit-dot" style="background:${awayKit}; border-color:${awayBorder};"></span>
          <span class="mini-team-name">${s.awayTeam.name}</span>
          <span class="mini-score">${s.score.away}</span>
        </div>
        <div class="mini-meta"><span class="clock" id="match-clock">⏱ ${formatClock(s.gameClock)}</span><span>${s.half}er T.</span><span>Turno ${s.turnCount}</span>${onlineIndicator}<button class="sound-toggle-btn" id="sound-toggle-btn" title="${soundEnabled ? 'Silenciar sonido' : 'Activar sonido'}">${soundEnabled ? '🔊' : '🔇'}</button><button class="fullscreen-btn" id="fullscreen-btn" title="${document.fullscreenElement ? 'Salir de pantalla completa' : 'Pantalla completa'}">${document.fullscreenElement ? '✕⤢' : '⤢'}</button></div>
      </div>
      ${s.gameMode === 'tutorial' ? renderTutorialPanel(s) : s.gameMode === 'training' ? renderSandboxPanel(s) : renderDicePanel(s)}
      <div>
        <h3>Estadísticas</h3>
        <div class="stats-grid" style="margin-top:6px;">
          <div class="val home">${possHomePct}%</div><div class="label">Posesión</div><div class="val away">${100-possHomePct}%</div>
          <div class="val home">${s.stats.shotsOnGoal.home}</div><div class="label">Remates</div><div class="val away">${s.stats.shotsOnGoal.away}</div>
          <div class="val home">${s.stats.offsides.home}</div><div class="label">Offsides</div><div class="val away">${s.stats.offsides.away}</div>
        </div>
      </div>
      <div style="display:flex; flex-direction:column; flex:1; min-height:0;">
        <h3>Jugadas</h3>
        <ul class="log-list">
          ${s.gameLog.slice().reverse().map(e => `<li class="${e.team || ''} ${e.actionType === 'goal' ? 'goal' : ''}"><span class="turn-tag">T${e.turn}</span>${e.message}</li>`).join('')}
        </ul>
      </div>
      <div class="btn-row" style="gap:6px;">
        <button class="btn ghost" id="reset-btn" style="flex:1; font-size:0.76rem; padding:9px 8px;">Reiniciar</button>
        <button class="btn ghost" id="exit-to-menu-btn" style="flex:1; font-size:0.76rem; padding:9px 8px;">Menú principal</button>
      </div>
    </div>
  </div>
  ${isOnline ? `
  <div class="chat-panel ${onlineChatOpen ? 'open' : ''}" id="chat-panel">
    <div class="chat-header">
      <span>💬 Chat con el rival</span>
      <button class="chat-close-btn" id="chat-close-btn">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      ${onlineChatMessages.length === 0
        ? `<div class="chat-empty">Todavía no hay mensajes. ¡Decí algo!</div>`
        : onlineChatMessages.map(m => `<div class="chat-msg ${m.from === onlineMyTeam ? 'mine' : 'theirs'}">${escapeHtml(m.text)}</div>`).join('')}
    </div>
    <div class="chat-quick-row">
      ${CHAT_QUICK_PHRASES.map(p => `<button class="chat-quick-btn" data-quick-phrase="${escapeHtml(p)}">${p}</button>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" class="chat-input" placeholder="Escribí un mensaje..." maxlength="200" autocomplete="off" />
      <button class="chat-send-btn" id="chat-send-btn">➤</button>
    </div>
  </div>` : ''}
  `;
}

function teamButtonStyle(team) {
  const bg = hsl(team.primaryColor);
  const fg = hsl(team.textColor);
  const border = team.secondaryColor ? hsl(team.secondaryColor) : 'transparent';
  return `background:${bg}; color:${fg}; border:2px solid ${border};`;
}

function renderTutorialPanel(s) {
  const step = tutorialScript[s.tutorialStep];
  const isLast = s.tutorialStep === tutorialScript.length - 1;
  const progress = Math.round(((s.tutorialStep + 1) / tutorialScript.length) * 100);
  const needsDiceButton = step.action.type === 'click_element' && step.action.payload.elementId === 'dice-roll-button';
  const needsSkipSwapButton = step.action.type === 'click_element' && step.action.payload.elementId === 'skip-swap-button';
  const diceDisplay = s.diceValue !== null ? s.diceValue : '🎲';

  let actionHtml = '';
  if (needsDiceButton) {
    actionHtml = `<div class="dice-row" style="margin:8px 0;"><div class="dice-face">${diceDisplay}</div><button class="btn team-btn" id="roll-dice-btn" style="flex:1; ${teamButtonStyle(s.homeTeam)}">🎲 Lanzar dado</button></div>`;
  } else if (needsSkipSwapButton) {
    actionHtml = `<button class="btn ghost" id="skip-swap-btn" style="width:100%; margin-top:8px;">Finalizar turno (omitir cambio)</button>`;
  } else if (s.diceValue !== null) {
    actionHtml = `<div class="dice-row" style="margin:8px 0;"><span style="font-size:0.78rem; color:#5b6f8a;">Dado:</span><div class="dice-face">${diceDisplay}</div></div>`;
  } else if (!isLast) {
    actionHtml = `<div style="font-size:0.74rem; color:#5b6f8a; margin-top:6px;">Seguí la indicación resaltada en el tablero.</div>`;
  }

  return `
  <div class="dice-panel" style="background:#eef5ff; border-color:#cfe0fb;">
    <h3>🎓 Tutorial · Paso ${s.tutorialStep + 1}/${tutorialScript.length}</h3>
    <div class="tutorial-progress-bar"><div class="tutorial-progress-fill" style="width:${progress}%;"></div></div>
    ${actionHtml}
    ${isLast ? `<button class="btn" id="final-ok-button" style="width:100%; margin-top:10px;">¡Entendido! →</button>` : ''}
    <button class="btn ghost" id="tutorial-exit-btn" style="width:100%; margin-top:8px; font-size:0.74rem; padding:7px;">Salir del tutorial</button>
  </div>`;
}

function renderSandboxPanel(s) {
  const homeOptions = TEAMS.map((t,i) => `<option value="${i}" ${s.homeTeam.id===t.id?'selected':''}>${t.name}</option>`).join('');
  const awayOptions = TEAMS.map((t,i) => `<option value="${i}" ${s.awayTeam.id===t.id?'selected':''}>${t.name}</option>`).join('');
  const teamName = getTeamName(s, s.currentPlayer);
  return `
  <div class="dice-panel">
    <h3>🧪 Entrenamiento — ${teamName}</h3>
    <div class="dice-row" style="margin:6px 0;">
      <div class="dice-face ${s.diceValue === null ? 'empty' : ''}">${s.diceValue !== null ? s.diceValue : '🎲'}</div>
    </div>
    ${s.gamePhase === 'rolling' ? `
    <div style="margin-bottom:10px;">
      <span class="field-label">Elegí el valor del dado</span>
      <div class="training-dice-grid">
        ${DICE_VALUES.map(v => `<button class="training-dice-btn" data-training-dice="${v}">${v}</button>`).join('')}
      </div>
    </div>
    ` : `<p style="font-size:0.76rem; color:#6b7a64; text-align:center; margin:8px 0;">Realizá tu jugada en el tablero.</p>`}
    ${s.gamePhase === 'goalkeeper-swap' ? `<button class="btn ghost" id="skip-swap-btn" style="width:100%;">No cambiar, finalizar turno</button>` : ''}
    ${s.gamePhase === 'chain-pass' ? `<button class="btn ghost" id="cancel-chain-btn" style="width:100%;">Terminar jugada acá</button>` : ''}
    <hr style="border:none; border-top:1px solid rgba(255,255,255,0.12); margin:10px 0;" />
    <div style="margin-bottom:8px;">
      <span class="field-label">Equipos</span>
      <div class="team-select-grid" style="margin-top:4px;">
        <select class="team-pick" id="sandbox-home-select">${homeOptions}</select>
        <select class="team-pick" id="sandbox-away-select">${awayOptions}</select>
      </div>
    </div>
    <button class="btn ghost" id="sandbox-reset-btn" style="width:100%; margin-top:4px;">↺ Resetear posiciones</button>
    <button class="btn ghost" id="back-to-menu-btn" style="width:100%; margin-top:6px;">← Volver al menú</button>
  </div>`;
}

function renderDicePanel(s) {
  if (s.gamePhase === 'pre-game-roll') {
    const homeName = s.homeTeam.name, awayName = s.awayTeam.name;
    return `
    <div class="dice-panel">
      <h3>Sorteo inicial</h3>
      <div style="font-size:0.78rem; color:#6b7a64; margin:2px 0 8px;">Quien saque más alto empieza con el balón.</div>
      <div class="btn-row" style="flex-direction:column;">
        <button class="btn team-btn" id="roll-pre-home" style="width:100%; ${teamButtonStyle(s.homeTeam)}" ${(s.gameMode==='vs-ai' && s.aiTeam==='home') || s.isResolvingKickoff ? 'disabled' : ''}>🎲 Tirar por ${homeName}${s.homeRoll !== null ? ` — salió ${s.homeRoll}` : ''}</button>
        <button class="btn team-btn" id="roll-pre-away" style="width:100%; ${teamButtonStyle(s.awayTeam)}" ${(s.gameMode==='vs-ai' && s.aiTeam==='away') || s.isResolvingKickoff ? 'disabled' : ''}>🎲 Tirar por ${awayName}${s.awayRoll !== null ? ` — salió ${s.awayRoll}` : ''}</button>
      </div>
      ${s.isResolvingKickoff ? `<div style="font-size:0.74rem; color:#1d6b2b; font-weight:700; margin-top:8px;">⏳ Empezando partido...</div>` : (s.gameMode === 'vs-ai' ? `<div style="font-size:0.72rem; color:#8a9582; margin-top:6px;">🤖 La computadora tira automáticamente.</div>` : '')}
    </div>`;
  }

  if (s.gamePhase === 'half-time') {
    return `<div class="dice-panel"><h3>Medio tiempo</h3><button class="btn" id="start-2nd-half-btn" style="width:100%; margin-top:6px;">Comenzar 2do tiempo →</button></div>`;
  }
  if (s.gamePhase === 'game-over') {
    if (s.gameMode === 'online') {
      const requesterName = onlineIncomingRematchFrom ? getTeamName(s, onlineIncomingRematchFrom) : '';
      return `<div class="dice-panel">
        <h3>Partido finalizado</h3>
        ${onlineIncomingRematchFrom ? `
          <div class="rematch-prompt">
            <p>${requesterName} te pidió la revancha.</p>
            <div class="rematch-prompt-actions">
              <button class="btn team-btn" id="accept-rematch-btn" style="flex:1; background:var(--accent); border-color:var(--accent);">✓ Aceptar</button>
              <button class="btn ghost" id="decline-rematch-btn" style="flex:1;">✕ No, gracias</button>
            </div>
          </div>
        ` : onlineRematchRequestedByMe
          ? `<div class="rematch-waiting">⏳ Esperando que el rival acepte la revancha...</div>`
          : `<button class="btn team-btn" id="request-rematch-btn" style="width:100%; margin-top:6px; background:var(--accent); border-color:var(--accent);">🔁 Pedir revancha</button>`}
        <button class="btn ghost" id="back-to-menu-btn" style="width:100%; margin-top:6px;">Volver al menú</button>
      </div>`;
    }
    return `<div class="dice-panel"><h3>Partido finalizado</h3><button class="btn" id="back-to-menu-btn" style="width:100%; margin-top:6px;">${s.gameMode === 'league' ? '🏆 Volver a la liga' : 'Volver al menú'}</button></div>`;
  }

  const isBotTurn = s.gameMode === 'vs-ai' && s.currentPlayer === s.aiTeam;
  const isOpponentOnlineTurn = s.gameMode === 'online' && s.currentPlayer !== onlineMyTeam;
  const blockControls = isBotTurn || isOpponentOnlineTurn;
  const currentTeam = s.currentPlayer === 'home' ? s.homeTeam : s.awayTeam;
  const teamName = getTeamName(s, s.currentPlayer);
  const isZero = s.gamePhase === 'turn-over';
  const diceDisplay = s.diceValue !== null ? s.diceValue : '🎲';
  const isTimerActive = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass'].includes(s.gamePhase);
  const timerPct = isTimerActive ? Math.max(0, Math.min(100, (s.timer / s.turnDuration) * 100)) : 100;
  const timerLow = isTimerActive && s.timer <= Math.ceil(s.turnDuration * 0.3);
  return `
  <div class="dice-panel">
    <h3>Dado — turno de ${teamName}${isBotTurn ? ' 🤖' : ''}${isOpponentOnlineTurn ? ' ⏳' : ''}</h3>
    ${isTimerActive ? `
    <div class="turn-timer-row">
      <div class="turn-timer-bar"><div class="turn-timer-fill ${timerLow ? 'low' : ''}" id="turn-timer-fill" style="width:${timerPct}%;"></div></div>
      <span class="turn-timer-label ${timerLow ? 'low' : ''}" id="turn-timer-label">⏳ ${s.timer}s</span>
    </div>` : ''}
    <div class="dice-row" style="margin:6px 0;">
      <div class="dice-face ${isZero ? 'zero' : ''} ${s.diceValue === null ? 'empty' : ''}">${diceDisplay}</div>
      ${s.gamePhase === 'rolling' && !blockControls ? `<button class="btn team-btn" id="roll-dice-btn" style="flex:1; ${teamButtonStyle(currentTeam)}">🎲 Lanzar dado</button>` : ''}
      ${isBotTurn ? `<div class="bot-thinking"><span class="bot-dot"></span><span class="bot-dot"></span><span class="bot-dot"></span> Pensando...</div>` : ''}
      ${isOpponentOnlineTurn && s.gamePhase === 'rolling' ? `<div class="bot-thinking"><span class="bot-dot"></span><span class="bot-dot"></span><span class="bot-dot"></span> Rival tirando...</div>` : ''}
    </div>
    ${isZero ? `<div class="zero-note">¡Sacaste 0! Se pierde el turno automáticamente…</div>` : ''}
    ${s.gamePhase === 'goalkeeper-swap' && !blockControls ? `<button class="btn ghost" id="skip-swap-btn" style="width:100%;">No cambiar, finalizar turno</button>` : ''}
    ${s.gamePhase === 'chain-pass' && !blockControls ? `<button class="btn ghost" id="cancel-chain-btn" style="width:100%;">Terminar jugada acá</button>` : ''}
  </div>`;
}

/* renderControls removed: dice now lives in the side panel (renderDicePanel),
   and ambiguous action choice is now resolved with icons drawn directly on the
   target tile inside renderBoardSVG (see actionChoice handling there). */

/* =========================================================================
   RENDER ROOT + EVENT WIRING
   ========================================================================= */

let currentMenuView = 'main'; // 'main' | 'rules' | 'setup'

function render() {
  const app = document.getElementById('app');

  if (state.gamePhase === 'main-menu') {
    if (currentMenuView === 'rules') app.innerHTML = renderRules();
    else if (currentMenuView === 'setup') app.innerHTML = renderSetup();
    else if (currentMenuView === 'ai-setup') app.innerHTML = renderAiSetup();
    else if (currentMenuView === 'league-entry') app.innerHTML = renderLeagueSetup();
    else if (currentMenuView === 'online-setup') app.innerHTML = renderOnlineSetup();
    else if (currentMenuView === 'online-join') app.innerHTML = renderOnlineJoin();
    else if (currentMenuView === 'online-waiting') app.innerHTML = renderOnlineWaiting();
    else if (currentMenuView === 'online-searching') app.innerHTML = renderOnlineSearching();
    else if (currentMenuView === 'online-reconnect') app.innerHTML = renderOnlineReconnect();
    else if (currentMenuView === 'online-kit-editor') app.innerHTML = renderCustomKitEditor();
    else app.innerHTML = renderMainMenu();
  } else if (state.gamePhase === 'league-view') {
    app.innerHTML = renderLeagueView(state);
  } else if (state.gamePhase === 'league-over') {
    app.innerHTML = renderLeagueOver(state);
  } else if (state.gamePhase === 'tutorial') {
    app.innerHTML = renderGameScreen(state);
  } else {
    app.innerHTML = renderGameScreen(state);
  }

  renderToast();
  wireEvents();
}

function renderToast() {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  if (state.toastToShow) {
    const t = document.createElement('div');
    t.className = 'toast' + (state.toastToShow.variant === 'destructive' ? ' destructive' : '');
    t.textContent = state.toastToShow.title + (state.toastToShow.description ? ' — ' + state.toastToShow.description : '');
    document.body.appendChild(t);
    clearTimeout(toastTimeoutHandle);
    toastTimeoutHandle = setTimeout(() => { setState({ toastToShow: null }); }, 2600);
  }
}

function wireEvents() {
  const soundToggleBtn = document.getElementById('sound-toggle-btn');
  if (soundToggleBtn) {
    soundToggleBtn.onclick = () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) { getAudioCtx(); sounds.move(); } // tiny confirmation blip when turning back on
      render();
    };
  }

  const fullscreenBtn = document.getElementById('fullscreen-btn');
  if (fullscreenBtn) {
    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    };
  }

  // Rules screen: hide the scroll hint once the user has scrolled to the bottom.
  const rulesBody = document.querySelector('.rules-body');
  if (rulesBody) {
    const hint = document.getElementById('rules-scroll-hint');
    const updateHint = () => {
      if (!hint) return;
      const atBottom = rulesBody.scrollHeight - rulesBody.scrollTop - rulesBody.clientHeight < 4;
      hint.style.opacity = atBottom ? '0' : '1';
    };
    updateHint();
    rulesBody.onscroll = updateHint;
  }

  // Main menu
  document.querySelectorAll('[data-menu]').forEach(btn => {
    btn.onclick = () => {
      const target = btn.getAttribute('data-menu');
      if (target === 'league-exit') {
        currentMenuView = 'main';
        setState(getInitialState());
        return;
      }
      if (target === 'tutorial') {
        currentMenuView = 'main';
        setState(startTutorial());
        return;
      }
      if (target === 'sandbox') {
        currentMenuView = 'main';
        sandboxDragTarget = null;
        setState(startSandbox());
        return;
      }
      if (target === 'back') currentMenuView = 'main';
      else currentMenuView = target;
      render();
    };
  });

  // Online duration selector
  document.querySelectorAll('[data-online-duration]').forEach(btn => {
    btn.onclick = () => {
      setupDuration = parseInt(btn.getAttribute('data-online-duration'), 10);
      document.querySelectorAll('[data-online-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  // Online — Create room
  const onlineCreateBtn = document.getElementById('online-create-btn');
  if (onlineCreateBtn) {
    onlineCreateBtn.onclick = () => {
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      onlineCreateRoom(resolvePickedTeam('home'), setupDuration);
    };
  }

  // Online — Quick match
  const onlineQuickBtn = document.getElementById('online-quick-btn');
  if (onlineQuickBtn) {
    onlineQuickBtn.onclick = () => {
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      onlineQuickMatch(resolvePickedTeam('home'), setupDuration);
    };
  }

  // Online — Join by code
  const onlineJoinBtn = document.getElementById('online-join-btn');
  if (onlineJoinBtn) {
    onlineJoinBtn.onclick = () => {
      const code = (document.getElementById('join-code-input').value || '').trim().toUpperCase();
      if (code.length !== 6) { alert('El código debe tener 6 caracteres.'); return; }
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      onlineJoinRoom(code, resolvePickedTeam('home'));
    };
  }
  const joinInput = document.getElementById('join-code-input');
  if (joinInput) {
    joinInput.onkeydown = (e) => { if (e.key === 'Enter') { document.getElementById('online-join-btn')?.click(); } };
  }

  // Online — team picker mode toggle (preset vs custom)
  document.querySelectorAll('[data-team-mode]').forEach(btn => {
    btn.onclick = () => {
      const [side, mode] = btn.getAttribute('data-team-mode').split(':');
      onlineTeamPicker[side].mode = mode;
      render();
    };
  });

  // Online — open the kit editor for a side
  ['home', 'away'].forEach(side => {
    const editBtn = document.getElementById('edit-custom-kit-' + side);
    if (editBtn) editBtn.onclick = () => {
      onlineKitEditorReturnView = currentMenuView; // 'online-setup' or 'online-join'
      onlineCustomEditorSide = side;
      currentMenuView = 'online-kit-editor';
      render();
    };
  });

  // Online — kit editor: design choice
  document.querySelectorAll('[data-kit-design]').forEach(btn => {
    btn.onclick = () => {
      if (!onlineCustomEditorSide) return;
      onlineTeamPicker[onlineCustomEditorSide].customKit.design = btn.getAttribute('data-kit-design');
      render();
    };
  });

  // Online — kit editor: color swatches (primary/secondary/tertiary/text)
  document.querySelectorAll('[data-kit-color]').forEach(btn => {
    btn.onclick = () => {
      if (!onlineCustomEditorSide) return;
      const [field, value] = btn.getAttribute('data-kit-color').split(':');
      onlineTeamPicker[onlineCustomEditorSide].customKit[field] = value;
      render();
    };
  });

  // Online — kit editor: team name
  const customNameInput = document.getElementById('custom-team-name');
  if (customNameInput) {
    customNameInput.oninput = () => {
      if (!onlineCustomEditorSide) return;
      onlineTeamPicker[onlineCustomEditorSide].customName = customNameInput.value;
    };
  }

  // Online — kit editor: save and go back
  const saveCustomKitBtn = document.getElementById('save-custom-kit-btn');
  if (saveCustomKitBtn) {
    saveCustomKitBtn.onclick = () => {
      if (onlineCustomEditorSide) {
        const picker = onlineTeamPicker[onlineCustomEditorSide];
        if (!picker.customName || !picker.customName.trim()) picker.customName = onlineCustomEditorSide === 'home' ? 'Mi Equipo' : 'Equipo Visitante';
      }
      onlineCustomEditorSide = null;
      currentMenuView = onlineKitEditorReturnView || 'online-setup';
      render();
    };
  }

  // Online — kit editor: discard and go back
  const discardCustomKitBtn = document.getElementById('discard-custom-kit-btn');
  if (discardCustomKitBtn) {
    discardCustomKitBtn.onclick = () => {
      onlineCustomEditorSide = null;
      currentMenuView = onlineKitEditorReturnView || 'online-setup';
      render();
    };
  }

  // Online — Cancel / leave room
  const onlineCancelBtn = document.getElementById('online-cancel-btn');
  if (onlineCancelBtn) {
    onlineCancelBtn.onclick = () => {
      leaveOnlineRoom();
      currentMenuView = 'main';
      render();
    };
  }

  const reconnectAcceptBtn = document.getElementById('reconnect-accept-btn');
  if (reconnectAcceptBtn) reconnectAcceptBtn.onclick = () => { reconnectToOnlineRoom(); };

  const reconnectDeclineBtn = document.getElementById('reconnect-decline-btn');
  if (reconnectDeclineBtn) reconnectDeclineBtn.onclick = () => { declineReconnect(); };

  // Chat
  const chatFabBtn = document.getElementById('chat-fab-btn');
  if (chatFabBtn) chatFabBtn.onclick = () => { toggleOnlineChat(); };

  const chatCloseBtn = document.getElementById('chat-close-btn');
  if (chatCloseBtn) chatCloseBtn.onclick = () => { toggleOnlineChat(); };

  const chatInput = document.getElementById('chat-input');
  const chatSendBtn = document.getElementById('chat-send-btn');
  const doSendChat = () => {
    if (!chatInput) return;
    const text = chatInput.value;
    if (!text.trim()) return;
    sendOnlineChatMessage(text);
    chatInput.value = '';
  };
  if (chatSendBtn) chatSendBtn.onclick = doSendChat;
  if (chatInput) {
    chatInput.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); doSendChat(); } };
  }

  document.querySelectorAll('[data-quick-phrase]').forEach(btn => {
    btn.onclick = () => { sendOnlineChatMessage(btn.getAttribute('data-quick-phrase')); };
  });

  // Auto-scroll chat to the latest message whenever the panel is in the DOM.
  const chatMessagesEl = document.getElementById('chat-messages');
  if (chatMessagesEl) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;

  // Online — Copy room code on click
  const codeDisplay = document.getElementById('room-code-display');
  if (codeDisplay && onlineRoomId) {
    codeDisplay.style.cursor = 'pointer';
    codeDisplay.title = 'Clic para copiar';
    codeDisplay.onclick = () => {
      navigator.clipboard.writeText(onlineRoomId).then(() => {
        codeDisplay.textContent = '¡Copiado!';
        setTimeout(() => { codeDisplay.textContent = onlineRoomId; }, 1500);
      }).catch(() => {});
    };
  }

  const finalOkBtn = document.getElementById('final-ok-button');
  if (finalOkBtn) finalOkBtn.onclick = () => handleTutorialAction({ type: 'click_element', payload: { elementId: 'final-ok-button' } });

  const tutorialExitBtn = document.getElementById('tutorial-exit-btn');
  if (tutorialExitBtn) tutorialExitBtn.onclick = () => { currentMenuView = 'main'; setState(getInitialState()); };

  const startBtn = document.getElementById('start-match-btn');
  if (startBtn) {
    startBtn.onclick = () => {
      const homeIdx = parseInt(document.getElementById('home-team-select').value, 10);
      const awayIdx = parseInt(document.getElementById('away-team-select').value, 10);
      let homeTeam = TEAMS[homeIdx], awayTeam = TEAMS[awayIdx];
      if (homeIdx === awayIdx) { awayTeam = TEAMS[(awayIdx + 1) % TEAMS.length]; }
      const { finalHomeTeam, finalAwayTeam, clashResolved } = resolveKitClash(homeTeam, awayTeam);
      const fresh = getInitialState();
      const turnDur = setupDuration <= 5 ? (setupDuration <= 2 ? 10 : 20) : TURN_DURATION;
      setState({
        ...fresh, homeTeam: finalHomeTeam, awayTeam: finalAwayTeam,
        gamePhase: 'pre-game-roll', halfDurationMinutes: setupDuration, gameClock: setupDuration * 60,
        turnDuration: turnDur, timer: turnDur,
        message: 'Tiren los dados para decidir quién empieza.',
        toastToShow: clashResolved ? { title: 'Conflicto de camisetas', description: `${awayTeam.name} usará un color alternativo.` } : null,
      });
    };
  }

  document.querySelectorAll('[data-ai-side]').forEach(btn => {
    btn.onclick = () => { aiHumanSide = btn.getAttribute('data-ai-side'); render(); };
  });
  document.querySelectorAll('[data-ai-difficulty]').forEach(btn => {
    btn.onclick = () => { aiDifficultyChoice = btn.getAttribute('data-ai-difficulty'); render(); };
  });
  const startAiBtn = document.getElementById('start-ai-match-btn');
  if (startAiBtn) {
    startAiBtn.onclick = () => {
      const homeIdx = parseInt(document.getElementById('ai-home-team-select').value, 10);
      const awayIdx = parseInt(document.getElementById('ai-away-team-select').value, 10);
      let homeTeam = TEAMS[homeIdx], awayTeam = TEAMS[awayIdx];
      if (homeIdx === awayIdx) { awayTeam = TEAMS[(awayIdx + 1) % TEAMS.length]; }
      const { finalHomeTeam, finalAwayTeam, clashResolved } = resolveKitClash(homeTeam, awayTeam);
      const fresh = getInitialState();
      const turnDur = setupDuration <= 5 ? (setupDuration <= 2 ? 10 : 20) : TURN_DURATION;
      const aiTeam = aiHumanSide === 'home' ? 'away' : 'home';
      setState({
        ...fresh, homeTeam: finalHomeTeam, awayTeam: finalAwayTeam, gameMode: 'vs-ai',
        aiTeam, aiDifficulty: aiDifficultyChoice,
        gamePhase: 'pre-game-roll', halfDurationMinutes: setupDuration, gameClock: setupDuration * 60,
        turnDuration: turnDur, timer: turnDur,
        message: 'Tiren los dados para decidir quién empieza.',
        toastToShow: clashResolved ? { title: 'Conflicto de camisetas', description: `${awayTeam.name} usará un color alternativo.` } : null,
      });
    };
  }
  document.querySelectorAll('[data-duration]').forEach(btn => {
    btn.onclick = () => {
      setupDuration = parseInt(btn.getAttribute('data-duration'), 10);
      document.querySelectorAll('[data-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  // League setup
  const leagueNumSelect = document.getElementById('league-num-teams');
  if (leagueNumSelect) {
    leagueNumSelect.onchange = () => {
      leagueNumTeams = parseInt(leagueNumSelect.value, 10);
      leagueSelectedTeams = Array(leagueNumTeams).fill(null);
      render();
    };
  }
  document.querySelectorAll('.league-team-select').forEach(sel => {
    sel.onchange = () => {
      const slot = parseInt(sel.getAttribute('data-team-slot'), 10);
      leagueSelectedTeams[slot] = sel.value || null;
      render();
    };
  });
  document.querySelectorAll('[data-league-duration]').forEach(btn => {
    btn.onclick = () => {
      leagueDuration = parseInt(btn.getAttribute('data-league-duration'), 10);
      document.querySelectorAll('[data-league-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
  const startLeagueBtn = document.getElementById('start-league-btn');
  if (startLeagueBtn) {
    startLeagueBtn.onclick = () => {
      if (leagueSelectedTeams.some(id => !id)) return;
      if (new Set(leagueSelectedTeams).size !== leagueSelectedTeams.length) return;
      const leagueState = startLeague(leagueSelectedTeams, leagueDuration);
      currentMenuView = 'main';
      leagueViewTab = 'standings';
      setState({ ...getInitialState(), gameMode: 'league', gamePhase: 'league-view', leagueState, message: `Comienza la liga. Jornada 1.` });
    };
  }

  // League view: tabs + play match buttons
  document.querySelectorAll('[data-league-tab]').forEach(btn => {
    btn.onclick = () => { leagueViewTab = btn.getAttribute('data-league-tab'); render(); };
  });
  document.querySelectorAll('[data-play-match]').forEach(btn => {
    btn.onclick = () => {
      const matchId = parseInt(btn.getAttribute('data-play-match'), 10);
      setState(s => startLeagueMatch(s, matchId));
    };
  });

  // Pre-game roll
  const rollPreHome = document.getElementById('roll-pre-home');
  if (rollPreHome) rollPreHome.onclick = () => {
    if (state.gameMode === 'online' && onlineMyTeam !== 'home') return;
    doPreGameRoll('home');
  };
  const rollPreAway = document.getElementById('roll-pre-away');
  if (rollPreAway) rollPreAway.onclick = () => {
    if (state.gameMode === 'online' && onlineMyTeam !== 'away') return;
    doPreGameRoll('away');
  };

  // Dice roll
  const rollBtn = document.getElementById('roll-dice-btn');
  if (rollBtn) rollBtn.onclick = () => {
    if (state.gameMode === 'tutorial') { handleTutorialAction({ type: 'click_element', payload: { elementId: 'dice-roll-button' } }); return; }
    doDiceRoll();
  };

  const skipSwap = document.getElementById('skip-swap-btn');
  if (skipSwap) skipSwap.onclick = () => {
    if (state.gameMode === 'tutorial') { handleTutorialAction({ type: 'click_element', payload: { elementId: 'skip-swap-button' } }); return; }
    setState(s => advanceToNextTurn(s, { skipSwapCheck: true }));
  };

  const cancelChain = document.getElementById('cancel-chain-btn');
  if (cancelChain) cancelChain.onclick = () => setState(s => {
    if (s.gamePhase !== 'chain-pass' || !s.turnStartState) return s;
    const logState = logAction(s, 'Jugada de pase en cadena anulada por el jugador.', 'game-event');
    const teamName = getTeamName(s, s.currentPlayer);
    const reverted = { ...logState, players: s.turnStartState.players, ballPosition: s.turnStartState.ballPosition, lastPlayerToTouchBallId: s.turnStartState.lastPlayerToTouchBallId };
    return { ...reverted, ...freshActionState({ gamePhase: 'selecting-piece' }), message: `Jugada anulada. Tienes un ${s.diceValue}. Elige un jugador de ${teamName} para mover.` };
  });

  const start2nd = document.getElementById('start-2nd-half-btn');
  if (start2nd) start2nd.onclick = () => setState(s => {
    const secondHalfKickoff = s.kickoffTeam === 'home' ? 'away' : 'home';
    const newPlayers = movePlayersForKickoff(getInitialPlayers(), secondHalfKickoff);
    const kickoffTeamName = getTeamName(s, secondHalfKickoff);
    const news = {
      ...s, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION }, gamePhase: 'rolling',
      currentPlayer: secondHalfKickoff, half: 2, diceValue: null, ...freshActionState(),
      lastPlayerToTouchBallId: null, timer: s.turnDuration, gameClock: s.halfDurationMinutes * 60,
      isClockRunning: true, isKickoffTurn: true, assistProviderId: null,
    };
    return logAction(news, `Comienza el segundo tiempo. Saca ${kickoffTeamName}.`, 'game-event');
  });

  const backToMenu = document.getElementById('back-to-menu-btn');
  if (backToMenu) backToMenu.onclick = () => {
    if (state.gameMode === 'online') leaveOnlineRoom();
    if (state.gameMode === 'league' && state.leagueState) {
      setState(s => finishLeagueMatch(s));
    } else {
      currentMenuView = 'main'; setState(getInitialState());
    }
  };

  const requestRematchBtn = document.getElementById('request-rematch-btn');
  if (requestRematchBtn) requestRematchBtn.onclick = () => {
    requestOnlineRematch();
    render();
  };

  const acceptRematchBtn = document.getElementById('accept-rematch-btn');
  if (acceptRematchBtn) acceptRematchBtn.onclick = () => {
    acceptOnlineRematch();
  };

  const declineRematchBtn = document.getElementById('decline-rematch-btn');
  if (declineRematchBtn) declineRematchBtn.onclick = () => {
    declineOnlineRematch();
    render();
  };

  const resetBtn = document.getElementById('reset-btn');
  if (resetBtn) resetBtn.onclick = () => {
    if (confirm('¿Reiniciar el partido actual?')) {
      if (state.gameMode === 'online') leaveOnlineRoom();
      currentMenuView = 'main'; setState(getInitialState());
    }
  };

  // Sandbox panel controls
  // Sandbox / Training panel controls
  document.querySelectorAll('[data-training-dice]').forEach(btn => {
    btn.onclick = () => {
      const value = parseInt(btn.getAttribute('data-training-dice'), 10);
      handleTrainingDiceSelect(value);
    };
  });

  const sandboxResetBtn = document.getElementById('sandbox-reset-btn');
  if (sandboxResetBtn) sandboxResetBtn.onclick = () => {
    sandboxDragTarget = null;
    const homeSelect = document.getElementById('sandbox-home-select');
    const awaySelect = document.getElementById('sandbox-away-select');
    const homeIdx = homeSelect ? parseInt(homeSelect.value, 10) : 0;
    const awayIdx = awaySelect ? parseInt(awaySelect.value, 10) : 1;
    setState(s => ({
      ...startSandbox(),
      homeTeam: TEAMS[homeIdx] || TEAMS[0],
      awayTeam: TEAMS[awayIdx] || TEAMS[1],
    }));
  };
  const sandboxHomeSelect = document.getElementById('sandbox-home-select');
  if (sandboxHomeSelect) sandboxHomeSelect.onchange = () => {
    const idx = parseInt(sandboxHomeSelect.value, 10);
    setState(s => ({ ...s, homeTeam: TEAMS[idx] || s.homeTeam }));
  };
  const sandboxAwaySelect = document.getElementById('sandbox-away-select');
  if (sandboxAwaySelect) sandboxAwaySelect.onchange = () => {
    const idx = parseInt(sandboxAwaySelect.value, 10);
    setState(s => ({ ...s, awayTeam: TEAMS[idx] || s.awayTeam }));
  };

  const exitToMenuBtn = document.getElementById('exit-to-menu-btn');
  if (exitToMenuBtn) exitToMenuBtn.onclick = () => {
    if (confirm('¿Salir al menú principal? Se perderá el progreso del partido actual.')) {
      if (state.gameMode === 'online') leaveOnlineRoom();
      currentMenuView = 'main';
      setState(getInitialState());
    }
  };

  // Action choice buttons (ambiguous square click)
  document.querySelectorAll('[data-exec-action]').forEach(btn => {
    btn.onclick = () => {
      if (state.gameMode === 'online' && state.currentPlayer !== onlineMyTeam) return;
      const action = btn.getAttribute('data-exec-action');
      // Read position from the button's own data attributes rather than
      // state.actionChoice — a remote Firebase update could have arrived
      // between render and click and cleared/changed actionChoice, which
      // would silently throw here (actionChoice.position on null) and make
      // the click appear to do nothing, with no visible error.
      const x = parseInt(btn.getAttribute('data-exec-x'), 10);
      const y = parseInt(btn.getAttribute('data-exec-y'), 10);
      setState(s => handleActionExecution({ ...s, actionChoice: null }, action, { x, y }));
    };
  });

  // Board interactions
  const boardSvg = document.getElementById('board');
  if (boardSvg) {
    boardSvg.querySelectorAll('[data-player-id]').forEach(el => {
      el.onclick = (ev) => {
        ev.stopPropagation();
        if (state.gameMode === 'online' && state.currentPlayer !== onlineMyTeam) return;
        const id = parseInt(el.getAttribute('data-player-id'), 10);
        if (state.gameMode === 'tutorial') {
          const player = state.players.find(p => p.id === id);
          if (player) handleTutorialAction({ type: 'click_player', payload: { playerNumber: player.playerNumber, team: player.team } });
          return;
        }
        // Training mode uses normal rules — fall through to handlePlayerSelection below.
        if (state.gamePhase === 'resolving-offside' && state.selectedPlayerId != null) {
          const clickedPlayer = state.players.find(p => p.id === id);
          const isValidOffsideDest = clickedPlayer && state.validOffsideMoves.some(p => p.x === clickedPlayer.position.x && p.y === clickedPlayer.position.y);
          if (isValidOffsideDest) {
            setState(s => handleSquareSelection(s, { x: clickedPlayer.position.x, y: clickedPlayer.position.y }));
            return;
          }
        }
        setState(s => handlePlayerSelection(s, id));
      };
    });

    // Sandbox: click the ball SVG element to select it for free movement
    boardSvg.querySelectorAll('[data-action-x]').forEach(el => {
      el.onclick = (ev) => {
        ev.stopPropagation();
        if (state.gameMode === 'online' && state.currentPlayer !== onlineMyTeam) return;
        const x = parseInt(el.getAttribute('data-action-x'), 10);
        const y = parseInt(el.getAttribute('data-action-y'), 10);
        const isOffside = el.getAttribute('data-offside') === '1';
        if (state.gameMode === 'tutorial') {
          handleTutorialAction({ type: 'click_square', payload: { position: { x, y } } });
          return;
        }
        setState(s => {
          if (isOffside) {
            return { ...s, toastToShow: { title: 'Jugada Ilegal', description: 'Esa jugada deja a un jugador en fuera de juego.', variant: 'destructive' } };
          }
          return handleSquareSelection(s, { x, y });
        });
      };
    });
    boardSvg.querySelectorAll('.tile-hit').forEach(el => {
      el.onclick = () => {
        if (state.gameMode === 'online' && state.currentPlayer !== onlineMyTeam) return;
        const x = parseInt(el.getAttribute('data-x'), 10);
        const y = parseInt(el.getAttribute('data-y'), 10);
        if (state.gameMode === 'tutorial') {
          handleTutorialAction({ type: 'click_square', payload: { position: { x, y } } });
          return;
        }
        // Training mode uses normal rules — fall through to handleSquareSelection.
        setState(s => handleSquareSelection(s, { x, y }));
      };
    });
  }

  applyTutorialHighlight();
}

// Applies the pulsing highlight to whichever element the current tutorial step points at
// (a board square, a player piece, or an HTML button like the dice-roll button).
function applyTutorialHighlight() {
  if (state.gameMode !== 'tutorial' || !state.highlightedElementId) return;
  const id = state.highlightedElementId;

  if (id === 'dice-roll-button') {
    const btn = document.getElementById('roll-dice-btn');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  if (id === 'skip-swap-button') {
    const btn = document.getElementById('skip-swap-btn');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  if (id === 'final-ok-button') {
    const btn = document.getElementById('final-ok-button');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  const squareMatch = id.match(/^square-(\d+)-(\d+)$/);
  if (squareMatch) {
    const x = parseInt(squareMatch[1], 10), y = parseInt(squareMatch[2], 10);
    const boardSvg = document.getElementById('board');
    if (boardSvg) {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('class', 'tutorial-highlight-svg');
      r.setAttribute('x', x * CELL + 1); r.setAttribute('y', y * CELL + 1);
      r.setAttribute('width', CELL - 2); r.setAttribute('height', CELL - 2);
      r.setAttribute('rx', 4);
      r.setAttribute('pointer-events', 'none');
      boardSvg.appendChild(r);
    }
    return;
  }
  const playerMatch = id.match(/^player-(\d+)-(home|away)$/);
  if (playerMatch) {
    const num = parseInt(playerMatch[1], 10), team = playerMatch[2];
    const player = state.players.find(p => p.playerNumber === num && p.team === team);
    if (player) {
      const boardSvg = document.getElementById('board');
      const g = boardSvg ? boardSvg.querySelector(`[data-player-id="${player.id}"]`) : null;
      if (g) {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('class', 'tutorial-highlight-svg');
        circle.setAttribute('r', '15');
        circle.setAttribute('pointer-events', 'none');
        g.appendChild(circle);
      }
    }
  }
}

function doPreGameRoll(team) {
  if (state.isResolvingKickoff) return; // already showing both results, ignore extra calls
  if (state[`${team}Roll`] !== null) return; // this side already rolled, don't overwrite it
  sounds.diceRoll();
  const roll = DICE_VALUES[Math.floor(Math.random() * DICE_VALUES.length)] || (Math.floor(Math.random()*6)+1);
  // Pre-game roll should not be 0 (need a winner); use 1-6 excluding tie-prone 0
  const fairRoll = Math.floor(Math.random() * 6) + 1;
  setState(s => {
    const teamName = getTeamName(s, team);
    const logged = logAction(s, `${teamName} sacó un ${fairRoll}.`, 'roll', team);
    const withRoll = { ...logged, [`${team}Roll`]: fairRoll };
    if (withRoll.homeRoll !== null && withRoll.awayRoll !== null) {
      // Both results are in: show them side by side for a moment before resolving the winner,
      // so the second roll's number doesn't flash by unread.
      const winnerName = withRoll.homeRoll === withRoll.awayRoll ? null
        : getTeamName(withRoll, withRoll.homeRoll > withRoll.awayRoll ? 'home' : 'away');
      const pauseMsg = winnerName
        ? `${getTeamName(withRoll,'home')}: ${withRoll.homeRoll} — ${getTeamName(withRoll,'away')}: ${withRoll.awayRoll}. ¡Gana ${winnerName}!`
        : `Empate ${withRoll.homeRoll} a ${withRoll.awayRoll}. Vuelven a tirar...`;
      const withPauseMsg = { ...withRoll, message: pauseMsg, isResolvingKickoff: true };
      setTimeout(() => {
        setState(s2 => {
          if (!s2.isResolvingKickoff) return s2; // user already moved on somehow
          return resolveKickoffWinner({ ...s2, isResolvingKickoff: false });
        });
      }, 1700);
      return withPauseMsg;
    }
    return withRoll;
  });
}

function resolveKickoffWinner(s) {
  if (s.homeRoll === null || s.awayRoll === null) return s;
  let startingTeam = null;
  if (s.homeRoll > s.awayRoll) startingTeam = 'home';
  else if (s.awayRoll > s.homeRoll) startingTeam = 'away';

  if (startingTeam) {
    const winnerName = getTeamName(s, startingTeam);
    const rollVal = startingTeam === 'home' ? s.homeRoll : s.awayRoll;
    const msg = `¡${winnerName} saca un ${rollVal} y gana el saque! Lanza el dado para empezar.`;
    const newPlayers = movePlayersForKickoff(getInitialPlayers(), startingTeam);
    startClock();
    startTurnTimer();
    const finalState = {
      ...s, players: newPlayers, currentPlayer: startingTeam, gamePhase: 'rolling',
      kickoffTeam: startingTeam, turnCount: 1, isClockRunning: true, homeRoll: null, awayRoll: null,
      isKickoffTurn: true, stats: { ...s.stats, possession: { ...s.stats.possession, [startingTeam]: 1 } },
    };
    return logAction(finalState, msg, 'game-event', startingTeam);
  }
  const tieMsg = '¡Empate! Vuelvan a tirar los dados.';
  return logAction({ ...s, homeRoll: null, awayRoll: null }, tieMsg, 'roll');
}

function doDiceRoll() {
  sounds.diceRoll();
  const roll = DICE_VALUES[Math.floor(Math.random() * DICE_VALUES.length)];
  setState(s => {
    const updated = { ...s, diceValue: roll };
    if (roll === 0) {
      const zeroState = { ...logAction(updated, '¡Sacaste un 0! Pierdes el turno.', 'roll'), gamePhase: 'turn-over' };
      // In online mode, only the player who actually rolled drives this timeout.
      // The other client just receives 'turn-over' via Firebase and stays passive —
      // it must NOT also schedule its own advance, or both clients race to call
      // advanceToNextTurn from two different stale closures over `state`.
      const shouldDriveTimeout = zeroState.gameMode !== 'online' || onlineMyTeam === zeroState.currentPlayer;
      if (shouldDriveTimeout) {
        const advanceFromZero = () => {
          setState(s2 => {
            if (s2.gamePhase !== 'turn-over') return s2; // already moved on (normal case)
            return advanceToNextTurn({ ...s2, lastAction: null });
          });
        };
        setTimeout(advanceFromZero, 1400);
        // Online safety net: a remote sync arriving in that 1.4s window can briefly
        // overwrite local state and make the check above bail out, leaving the turn
        // stuck forever with nobody left to advance it. Re-check shortly after as a
        // fallback in case the first attempt was skipped this way.
        if (zeroState.gameMode === 'online') {
          setTimeout(advanceFromZero, 2600);
        }
      }
      return zeroState;
    }
    const teamName = getTeamName(s, s.currentPlayer);
    const withLog = logAction(updated, `Sacaste un ${roll}. Elige un jugador de ${teamName} para mover.`, 'roll');
    return {
      ...withLog, gamePhase: 'selecting-piece',
      turnStartState: { players: s.players, ballPosition: s.ballPosition, lastPlayerToTouchBallId: s.lastPlayerToTouchBallId },
    };
  });
}

/* ---------------- Clock ---------------- */
function advanceTurnByTimeout(s) {
  const logState = logAction(s, '¡Tiempo agotado!', 'game-event', s.currentPlayer);
  if (s.gamePhase === 'chain-pass' && s.turnStartState) {
    const logState2 = logAction(logState, 'La jugada de pase en cadena se anula por falta de tiempo.', 'game-event', s.currentPlayer);
    const reverted = { ...logState2, players: s.turnStartState.players, ballPosition: s.turnStartState.ballPosition, lastPlayerToTouchBallId: s.turnStartState.lastPlayerToTouchBallId, lastAction: null };
    return advanceToNextTurn(reverted);
  }
  return advanceToNextTurn({ ...logState, lastAction: null });
}

function startClock() {
  if (clockIntervalHandle) clearInterval(clockIntervalHandle);
  clockIntervalHandle = setInterval(() => {
    // The match clock is purely a local, cosmetic countdown — it never syncs via
    // Firebase. Each player's browser ticks its own clock independently, exactly
    // like the original React build (useGameTimers dispatched TICK_GAME_CLOCK to
    // the local reducer only, with no online write at all). Trying to keep both
    // clients' clocks in lockstep over the network was the actual source of the
    // "lag" — every tick was a write competing with real moves. A few hundred ms
    // of clock drift between two screens is invisible to a real game; constant
    // network traffic for it was not.
    if (!state.isClockRunning) return;
    if (state.gamePhase === 'main-menu' || state.gamePhase === 'game-over' || state.gamePhase === 'half-time') return;
    if (state.gameMode === 'online' && document.visibilityState === 'hidden') return;
    if (state.gameClock > 0) {
      setLocalOnlyState(s => ({ ...s, gameClock: s.gameClock - 1 }));
      return;
    }
    // Reaching zero is a real rule event (half/match ends). In online mode only
    // the host drives that transition into the shared, synced state; the guest's
    // clock just sits at 0 until the host's resulting state arrives via Firebase.
    if (state.gameMode === 'online' && onlineMyTeam !== 'home') return;
    setState(s => handleEndHalfOrMatch(s));
  }, 1000);
}

function startTurnTimer() {
  if (turnTimerIntervalHandle) clearInterval(turnTimerIntervalHandle);
  turnTimerIntervalHandle = setInterval(() => {
    const isTimerActive = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass'].includes(state.gamePhase)
      && state.gameMode !== 'tutorial'
      && state.gameMode !== 'training';
    if (!isTimerActive) return;
    if (state.gameMode === 'online' && document.visibilityState === 'hidden') return;
    if (state.timer > 0) {
      // Cosmetic local-only tick, like the original's TICK_TURN_TIMER dispatched
      // straight to the local reducer with no online write. Both players' clocks
      // count down independently; nothing here touches Firebase.
      setLocalOnlyState(s => ({ ...s, timer: s.timer - 1 }));
      return;
    }
    // Timeout reached — this is a real rule event (turn is forfeited). Just like
    // the original (which didn't gate this by isCreator), whichever client's
    // local timer reaches zero first drives the synced state change.
    setState(s => advanceTurnByTimeout(s));
  }, 1000);
}

render();
document.addEventListener('fullscreenchange', () => { render(); });
checkForReconnectableSession();

// Background tabs get their setInterval throttled hard by the browser (sometimes
// paused entirely) to save battery/CPU. In online mode this means the inactive
// tab's clock/timer can fall behind, and its Firebase listener may also deliver
// updates late. When the tab regains focus, force an immediate re-read of the
// current gameState from Firebase so the UI is never acting on stale data.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (state.gameMode !== 'online' || !onlineRoomRef || onlineStatus !== 'connected') return;
  onlineRoomRef.child('gameState').once('value', snap => {
    if (!snap.exists()) return;
    const remote = snap.val();
    if (!remote || !remote.gamePhase) return;
    const remoteVersion = typeof remote._v === 'number' ? remote._v : -1;
    // Always resync on refocus even if the version looks "already seen" — the
    // background tab's own state may be stale relative to what it last pushed.
    onlineLastSeenVersion = Math.max(onlineLastSeenVersion, remoteVersion);
    applyRemoteState(remote);
  });
});
</script>
</body>
