function getAchievementText(a, field) {
  return a[field][lang] || a[field].es;
}

function isAchievementUnlocked(id) {
  return !!localStorage.getItem(`hx_ach_${id}`);
}

function unlockAchievement(id) {
  if (isAchievementUnlocked(id)) return;
  localStorage.setItem(`hx_ach_${id}`, Date.now().toString());
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;
  showAchievementToast(ach);
  if (currentUser && !currentUser.isAnonymous) {
    db.collection('users').doc(currentUser.uid).update({
      [`achievements.${id}`]: firebase.firestore.FieldValue.serverTimestamp(),
    }).catch(() => {});
  }
}

function showAchievementToast(ach) {
  const existing = document.getElementById('achievement-toast');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'achievement-toast';
  el.style.cssText = `
    position:fixed;top:80px;left:50%;transform:translateX(-50%);
    background:#1c2b22;color:#fff;border-radius:14px;padding:14px 20px;
    max-width:320px;width:90%;z-index:8500;box-shadow:0 4px 24px rgba(0,0,0,0.35);
    animation:tooltipIn 0.35s cubic-bezier(0.34,1.56,0.64,1);text-align:center;
    border:1.5px solid #3a5a3a;pointer-events:none;
  `;
  const title = lang === 'en' ? 'Achievement unlocked!' : lang === 'pt' ? 'Conquista desbloqueada!' : '¡Logro desbloqueado!';
  el.innerHTML = `
    <div style="font-size:0.72rem;color:#9aa593;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;">${title}</div>
    <div style="font-size:2rem;line-height:1;margin-bottom:4px;">${ach.icon}</div>
    <div style="font-weight:700;font-size:0.95rem;">${getAchievementText(ach, 'title')}</div>
    <div style="font-size:0.75rem;color:#9aa593;margin-top:2px;">${getAchievementText(ach, 'desc')}</div>
  `;
  document.body.appendChild(el);
  setTimeout(() => {
    if (el.parentNode) {
      el.style.animation = 'tooltipOut 0.3s ease-in forwards';
      setTimeout(() => el.remove(), 300);
    }
  }, 4000);
}

function checkAchievements(prev, next) {
  if (!next || !prev) return;
  const myTeam = next.gameMode === 'online' ? onlineMyTeam : 'home';
  if (!myTeam) return;
  const oppTeam = myTeam === 'home' ? 'away' : 'home';

  // 🥅 First goal — any mode
  const myPrevScore = prev.score?.[myTeam] || 0;
  const myNextScore = next.score?.[myTeam] || 0;
  if (myNextScore > myPrevScore) {
    unlockAchievement('first_goal');

    // 🎯 Long shot — goal from > 4 squares from goal
    const oppGoal = myTeam === 'home' ? AWAY_GOAL_POSITIONS : HOME_GOAL_POSITIONS;
    const ball = prev.ballPosition;
    if (ball) {
      const dist = Math.min(...oppGoal.map(g => Math.abs(g.x - ball.x) + Math.abs(g.y - ball.y)));
      if (dist > 4) unlockAchievement('long_shot');
    }

    // ⚽ Hat-trick — 3 goals by same player in match
    if (next.matchStats?.goals) {
      const maxGoals = Math.max(...Object.values(next.matchStats.goals));
      if (maxGoals >= 3) unlockAchievement('hat_trick');
    }
  }

  // 🔗 Chain master — 2+ passes in one transition (chain of 3+)
  const myPrevPasses = prev.stats?.passes?.[myTeam] || 0;
  const myNextPasses = next.stats?.passes?.[myTeam] || 0;
  if (myNextPasses >= myPrevPasses + 2) unlockAchievement('chain_master');

  // Online-only achievements
  if (next.gameMode === 'online' && next.gamePhase === 'game-over' && prev.gamePhase !== 'game-over') {
    const won = next.score[myTeam] > next.score[oppTeam];
    const conceded = next.score[oppTeam];
    if (won) {
      unlockAchievement('first_win');
      if (conceded === 0) unlockAchievement('clean_sheet');
      if (userProfile && currentUser && !currentUser.isAnonymous) {
        const streak = (userProfile.currentStreak || 0) + 1;
        userProfile.currentStreak = streak;
        if (streak >= 3) unlockAchievement('win_streak');
        db.collection('users').doc(currentUser.uid).update({ currentStreak: streak }).catch(() => {});
      }
    } else {
      if (userProfile && currentUser && !currentUser.isAnonymous) {
        userProfile.currentStreak = 0;
        db.collection('users').doc(currentUser.uid).update({ currentStreak: 0 }).catch(() => {});
      }
    }
    // Check top 10 after match ends
    setTimeout(checkTop10Achievement, 3000);
  }
}

async function checkTop10Achievement() {
  if (!currentUser || currentUser.isAnonymous || !userProfile) return;
  try {
    const snap = await db.collection('users').orderBy('elo', 'desc').limit(10).get();
    if (snap.docs.some(d => d.id === currentUser.uid)) unlockAchievement('top_10');
  } catch (e) {}
}

// ── Contextual Tooltips ───────────────────────────────────────────────────────
const TOOLTIP_DURATION = 4500;

function showContextTooltip(key, title, desc) {
  if (localStorage.getItem('hx_tip_' + key)) return;
  localStorage.setItem('hx_tip_' + key, '1');
  const existing = document.getElementById('ctx-tooltip');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'ctx-tooltip';
  el.style.cssText = `
    position:fixed;top:80px;left:50%;transform:translateX(-50%);
    background:#1c2b22;color:#fff;border-radius:12px;padding:12px 18px;
    max-width:320px;width:90%;z-index:7000;box-shadow:0 4px 20px rgba(0,0,0,0.3);
    animation:tooltipIn 0.3s ease-out;text-align:center;pointer-events:none;
  `;
  el.innerHTML = `<div style="font-weight:700;font-size:0.9rem;margin-bottom:4px;">${title}</div><div style="font-size:0.78rem;opacity:0.85;line-height:1.5;">${desc}</div>`;
  document.body.appendChild(el);
  setTimeout(() => {
    if (el.parentNode) {
      el.style.animation = 'tooltipOut 0.3s ease-in forwards';
      setTimeout(() => el.remove(), 300);
    }
  }, TOOLTIP_DURATION);
}

function checkContextTooltips(prev, next) {
  if (!next.isQuickTutorialMatch) return;
  const myTeam = 'home';
  const ball = next.ballPosition;
  if (!ball) return;

  // Tip: adjacent to ball
  if (!localStorage.getItem('hx_tip_adjacent') && next.gamePhase === 'selecting-piece') {
    const hasAdj = next.players.some(p => p.team === myTeam && isAdjacent(p.position, ball));
    if (hasAdj) {
      showContextTooltip('adjacent',
        lang === 'en' ? '⚽ You\'re next to the ball!' : '⚽ ¡Estás al lado de la pelota!',
        lang === 'en' ? 'Select that player to kick or drag the ball.' : lang === 'pt' ? 'Selecione esse jogador para chutar ou arrastar a bola.' : 'Seleccioná ese jugador para patear o arrastrar la pelota.'
      );
    }
  }

  // Tip: chain pass
  if (!localStorage.getItem('hx_tip_chain') && next.gamePhase === 'chain-pass') {
    showContextTooltip('chain',
      lang === 'en' ? '🔗 Chain pass!' : lang === 'pt' ? '🔗 Passe em cadeia!' : '🔗 ¡Pase en cadena!',
      lang === 'en' ? 'The ball reached a teammate — keep playing without spending a turn!' : lang === 'pt' ? 'A bola chegou a um companheiro — continue jogando sem gastar um turno!' : '¡La pelota llegó a un compañero! Seguís jugando sin gastar un turno.'
    );
  }

  // Tip: offside
  if (!localStorage.getItem('hx_tip_offside') && next.gamePhase === 'resolving-offside') {
    showContextTooltip('offside',
      lang === 'en' ? '🚩 Offside!' : lang === 'pt' ? '🚩 Impedimento!' : '🚩 ¡Fuera de juego!',
      lang === 'en' ? 'Move the marked player behind the offside line.' : lang === 'pt' ? 'Mova o jogador marcado para trás da linha de impedimento.' : 'Mové al jugador marcado detrás de la línea de fuera de juego.'
    );
  }

  // Tip: ball in goalkeeper area
  if (!localStorage.getItem('hx_tip_area') && ball) {
    const homeGoalY = BOARD_HEIGHT - 1;
    const awayGoalY = 0;
    const inArea = (ball.y >= homeGoalY - 3 && ball.y <= homeGoalY) || (ball.y >= awayGoalY && ball.y <= awayGoalY + 3);
    if (inArea && prev.ballPosition && !((prev.ballPosition.y >= homeGoalY - 3) || (prev.ballPosition.y <= awayGoalY + 3))) {
      showContextTooltip('area',
        lang === 'en' ? '🥅 Goalkeeper area' : lang === 'pt' ? '🥅 Área do goleiro' : '🥅 Área del arquero',
        lang === 'en' ? 'The goalkeeper moves double squares inside their area.' : lang === 'pt' ? 'O goleiro se move o dobro de casas dentro de sua área.' : 'El arquero se mueve el doble de casillas dentro de su área.'
      );
    }
  }

  // Tip: rolled zero
  if (!localStorage.getItem('hx_tip_zero') && next.diceValue === 0 && prev.diceValue !== 0) {
    showContextTooltip('zero',
      lang === 'en' ? '0 — Turn skipped' : lang === 'pt' ? '0 — Turno perdido' : '0 — Turno perdido',
      lang === 'en' ? 'You rolled 0! Your turn is skipped automatically.' : lang === 'pt' ? 'Você tirou 0! Seu turno é pulado automaticamente.' : '¡Sacaste 0! Tu turno se pierde automáticamente.'
    );
  }
}

function jerseyDotCss(team) {
  if (!team) return 'background:#ccc;';
  const primary = hsl(team.primaryColor);
  const secondary = team.secondaryColor ? hsl(team.secondaryColor) : primary;
  const tertiary = team.tertiaryColor ? hsl(team.tertiaryColor) : secondary;
  switch (team.design) {
    case 'vertical-stripes':
      return `background-image: repeating-linear-gradient(90deg, ${primary}, ${primary} 15%, ${secondary} 15%, ${secondary} 30%);`;
    case 'sash':
      return `background-image: linear-gradient(135deg, ${primary} 42%, ${secondary} 42%, ${secondary} 58%, ${primary} 58%);`;
    case 'horizontal-stripe':
      return `background-image: linear-gradient(180deg, ${primary} 33%, ${secondary} 33%, ${secondary} 67%, ${primary} 67%);`;
    case 'v-shape':
      return `background-image: conic-gradient(from -135deg at 50% 25%, ${primary} 90deg, ${secondary} 90deg, ${secondary} 180deg, ${primary} 180deg);`;
    case 'double-vertical-stripe':
      return `background-image: linear-gradient(to right, ${primary} 30%, ${secondary} 30%, ${secondary} 50%, ${tertiary} 50%, ${tertiary} 70%, ${primary} 70%);`;
    case 'triple-horizontal-stripe':
      return `background-image: linear-gradient(to bottom, ${primary} 35%, ${secondary} 35%, ${secondary} 45%, ${tertiary} 45%, ${tertiary} 55%, ${secondary} 55%, ${secondary} 65%, ${primary} 65%);`;
    default:
      return `background-color: ${primary};`;
  }
}
function jerseyDot(teamIdOrTeam, size) {
  const team = typeof teamIdOrTeam === 'string' ? TEAMS.find(t => t.id === teamIdOrTeam) : teamIdOrTeam;
  size = size || 18;
  return `<span style="display:inline-block; width:${size}px; height:${size}px; border-radius:50%; border:1px solid rgba(0,0,0,0.2); ${jerseyDotCss(team)} vertical-align:middle; flex-shrink:0;"></span>`;
}

let leagueViewTab = 'standings';

function renderLeagueView(s) {
  const ls = s.leagueState;
  const sortedTeams = getSortedLeagueTeams(ls.teams, ls.schedule);
  const matchesByRound = {};
  ls.schedule.forEach(m => { (matchesByRound[m.round] = matchesByRound[m.round] || []).push(m); });

  const tabs = lang === 'en'
    ? [{ id: 'standings', label: '📊 Table' }, { id: 'schedule', label: '📅 Schedule' }, { id: 'scorers', label: '⭐ Scorers' }]
    : [{ id: 'standings', label: '📊 Tabla' }, { id: 'schedule', label: '📅 Calendario' }, { id: 'scorers', label: '⭐ Goleadores' }];

  const thTeam = lang === 'en' ? 'Team' : lang === 'pt' ? 'Time' : 'Equipo';
  const thPlayer = lang === 'en' ? 'Player' : lang === 'pt' ? 'Jogador' : 'Jugador';
  const roundLabel = (r) => lang === 'en' ? `Round ${r}${r === ls.currentRound ? ' (current)' : ''}` : lang === 'pt' ? `Rodada ${r}${r === ls.currentRound ? ' (atual)' : ''}` : `Jornada ${r}${r === ls.currentRound ? ' (actual)' : ''}`;
  const playBtn = lang === 'en' ? 'Play' : lang === 'pt' ? 'Jogar' : 'Jugar';
  const noStats = lang === 'en' ? 'No stats yet.' : lang === 'pt' ? 'Ainda não há estatísticas.' : 'Aún no hay estadísticas.';
  const scorersTitle = lang === 'en' ? 'Top Scorers' : lang === 'pt' ? 'Artilheiros' : 'Goleadores';
  const assistsTitle = lang === 'en' ? 'Top Assists' : lang === 'pt' ? 'Assistências' : 'Asistencias';
  const goalsLabel = lang === 'en' ? 'Goals' : lang === 'pt' ? 'Gols' : 'Goles';
  const assistsLabel = lang === 'en' ? 'Assists' : lang === 'pt' ? 'Assist.' : 'Asist.';
  const exitLabel = lang === 'en' ? 'Exit league' : lang === 'pt' ? 'Sair da liga' : 'Salir de la liga';

  let body = '';
  if (leagueViewTab === 'standings') {
    const [pts,pj,v,e,d,gf,gc,dg] = lang === 'en'
      ? ['Pts','GP','W','D','L','GF','GA','GD']
      : ['Pts','PJ','V','E','D','GF','GC','DG'];
    body = `
    <table class="league-table">
      <thead><tr><th>#</th><th style="text-align:left;">${thTeam}</th><th>${pts}</th><th>${pj}</th><th>${v}</th><th>${e}</th><th>${d}</th><th>${gf}</th><th>${gc}</th><th>${dg}</th></tr></thead>
      <tbody>
        ${sortedTeams.map((t, i) => `
          <tr class="${i < 2 ? 'top' : ''}">
            <td>${i + 1}</td>
            <td style="text-align:left;"><div style="display:flex; align-items:center; gap:6px;">${jerseyDot(t.teamId, 16)} ${t.name}</div></td>
            <td><b>${t.points}</b></td><td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td>
            <td>${t.goalsFor}</td><td>${t.goalsAgainst}</td><td>${t.goalDifference > 0 ? '+' + t.goalDifference : t.goalDifference}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  } else if (leagueViewTab === 'schedule') {
    const rounds = Object.keys(matchesByRound).map(Number).sort((a, b) => a - b);
    body = rounds.map(round => `
      <div class="league-round">
        <div class="league-round-title ${round === ls.currentRound ? 'current' : ''}">${roundLabel(round)}</div>
        ${matchesByRound[round].map(m => {
          const homeT = TEAMS.find(t => t.id === m.homeTeamId), awayT = TEAMS.find(t => t.id === m.awayTeamId);
          return `
          <div class="league-match-row">
            <div class="league-match-team"><span>${homeT.name}</span>${jerseyDot(homeT, 16)}</div>
            <div class="league-match-score">
              ${m.played ? `<b>${m.homeScore} - ${m.awayScore}</b>` : (round === ls.currentRound ? `<button class="btn" data-play-match="${m.matchId}" style="padding:5px 12px; font-size:0.75rem;">${playBtn}</button>` : '<span style="opacity:0.4;">vs</span>')}
            </div>
            <div class="league-match-team away">${jerseyDot(awayT, 16)}<span>${awayT.name}</span></div>
          </div>`;
        }).join('')}
      </div>`).join('');
  } else if (leagueViewTab === 'scorers') {
    const topScorers = ls.playerStats.filter(p => p.goals > 0).sort((a, b) => b.goals - a.goals).slice(0, 10);
    const topAssists = ls.playerStats.filter(p => p.assists > 0).sort((a, b) => b.assists - a.assists).slice(0, 10);
    const renderStatTable = (list, key, label) => list.length === 0 ? `<p style="text-align:center; color:#8a9582; padding:14px 0;">${noStats}</p>` : `
      <table class="league-table" style="margin-bottom:16px;">

      </table>`;
    body = `<h3 style="margin:0 0 6px;">${scorersTitle}</h3>${renderStatTable(topScorers, 'goals', goalsLabel)}<h3 style="margin:14px 0 6px;">${assistsTitle}</h3>${renderStatTable(topAssists, 'assists', assistsLabel)}`;

  return `
  <div class="menu-screen league-screen" style="max-width:760px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">

    </div>
    <div class="league-tabs">
      ${tabs.map(t => `<button class="league-tab ${leagueViewTab === t.id ? 'active' : ''}" data-league-tab="${t.id}">${t.label}</button>`).join('')}
    </div>
    <div class="league-tab-body">${body}</div>
  </div>`;
}

function renderGameScreen(s) {
  const homeKit = hsl(s.homeTeam.primaryColor);
  const awayKit = hsl(s.awayTeam.primaryColor);
  const homeBorder = s.homeTeam.secondaryColor ? hsl(s.homeTeam.secondaryColor) : 'rgba(255,255,255,0.6)';
  const awayBorder = s.awayTeam.secondaryColor ? hsl(s.awayTeam.secondaryColor) : 'rgba(255,255,255,0.6)';

  let msgClass = 'board-message';
  if (s.toastToShow && s.toastToShow.variant === 'destructive') msgClass += '';
  if (s.gamePhase === 'resolving-offside') msgClass += ' alert';
  if (s.gamePhase === 'goalkeeper-swap') msgClass += ' alert';
  if (/GOL|gana|ganó/i.test(s.message)) msgClass += ' good';

  const possessionTotal = s.stats.possession.home + s.stats.possession.away;
  const possHomePct = possessionTotal ? Math.round((s.stats.possession.home / possessionTotal) * 100) : 50;

  const isOnline = s.gameMode === 'online';
  const isMyTurn = !isOnline || s.currentPlayer === onlineMyTeam;
  const opponentLabel = isOnline && !isMyTurn ? lang === 'en' ? `<div class="spectator-banner">⏳ Opponent's turn — wait for yours</div>` : lang === 'pt' ? `<div class="spectator-banner">⏳ Turno do adversário — aguarde o seu</div>` : `<div class="spectator-banner">⏳ Turno del rival — esperá tu turno</div>` : '';
  const onlineIndicator = isOnline ? `<span class="online-badge"><span class="online-dot"></span> Online · ${onlineMyTeam === 'home' ? (lang === 'en' ? 'Home' : lang === 'pt' ? 'Casa' : 'Local') : (lang === 'en' ? 'Away' : lang === 'pt' ? 'Visitante' : 'Visitante')}</span>` : '';

  // Contextual banners for situations that require specific player interaction.
  // These sit above the board message so they're the first thing the eye lands on.
  const offsideBanner = s.gamePhase === 'resolving-offside'
    ? `<div class="situation-banner offside-banner">🚩 ${lang === 'en' ? 'Offside — move the player marked in red to the allowed line' : lang === 'pt' ? 'Impedimento — mova o jogador marcado em vermelho para a linha permitida' : 'Fuera de juego — mové al jugador marcado en rojo a la línea permitida'}</div>`
    : '';
  const swapBanner = s.gamePhase === 'goalkeeper-swap'
    ? `<div class="situation-banner swap-banner">🔄 ${lang === 'en' ? 'You can swap the goalkeeper with a player in their area' : lang === 'pt' ? 'Você pode trocar o goleiro por um jogador de sua área' : 'Podés cambiar al arquero por uno de los jugadores en su área'}</div>`
    : '';

  return `
  <div class="game-layout">
    <div class="board-wrap">
      ${opponentLabel}
      ${offsideBanner}
      ${swapBanner}
      <div class="${msgClass}">${s.message}</div>
      <div class="board-frame">${renderBoardSVG(s)}</div>
    </div>
    ${isOnline ? `
    <button class="chat-fab" id="chat-fab-btn" title="Chat">
      💬${onlineChatUnread > 0 ? `<span class="chat-fab-badge">${onlineChatUnread > 9 ? '9+' : onlineChatUnread}</span>` : ''}
    </button>` : ''}
    <div class="panel ${['game-over','half-time'].includes(s.gamePhase) ? 'panel-expanded' : ''}">
      <div class="mini-scoreboard">
        <div class="mini-team home">
          <span class="kit-dot" style="background:${homeKit}; border-color:${homeBorder};"></span>
          <span class="mini-team-name">${s.homeTeam.name}</span>
          <span class="mini-score">${s.score.home}</span>
        </div>
        <div class="mini-team away">
          <span class="kit-dot" style="background:${awayKit}; border-color:${awayBorder};"></span>
          <span class="mini-team-name">${s.awayTeam.name}</span>
          <span class="mini-score">${s.score.away}</span>
        </div>
        <div class="mini-meta"><span class="clock" id="match-clock">${s.targetGoals ? `🥅 ${lang === 'en' ? `First to ${s.targetGoals}` : lang === 'pt' ? `Primeiro a ${s.targetGoals}` : `Al ${s.targetGoals}`}` : s.overtimeMode === 'golden-goal' ? (lang === 'en' ? '⚽ Golden goal' : lang === 'pt' ? '⚽ Gol de ouro' : '⚽ Gol de oro') : '⏱ ' + formatClock(s.gameClock)}</span><span>${s.overtimeMode === 'extra-time' ? (lang === 'en' ? 'ET' : lang === 'pt' ? 'TE' : 'TE') : s.overtimeMode === 'golden-goal' ? (lang === 'en' ? 'GG' : lang === 'pt' ? 'GO' : 'GO') : s.half === 1 ? (lang === 'en' ? '1st H.' : lang === 'pt' ? '1º T.' : '1er T.') : (lang === 'en' ? '2nd H.' : lang === 'pt' ? '2º T.' : '2do T.')}</span><span>${lang === 'en' ? 'Turn' : lang === 'pt' ? 'Turno' : 'Turno'} ${s.turnCount}</span>${onlineIndicator}<button class="sound-toggle-btn" id="sound-toggle-btn" title="${soundEnabled ? (lang === 'en' ? 'Mute' : lang === 'pt' ? 'Silenciar' : 'Silenciar sonido') : (lang === 'en' ? 'Unmute' : lang === 'pt' ? 'Ativar som' : 'Activar sonido')}">${soundEnabled ? '🔊' : '🔇'}</button><button class="fullscreen-btn" id="fullscreen-btn" title="${document.fullscreenElement ? (lang === 'en' ? 'Exit fullscreen' : lang === 'pt' ? 'Sair da tela cheia' : 'Salir de pantalla completa') : (lang === 'en' ? 'Fullscreen' : lang === 'pt' ? 'Tela cheia' : 'Pantalla completa')}">${document.fullscreenElement ? '✕⤢' : '⤢'}</button></div>
      </div>
      ${s.gameMode === 'tutorial' ? renderTutorialPanel(s) : s.gameMode === 'training' ? renderSandboxPanel(s) : renderDicePanel(s)}
      <div class="panel-stats-section">
        <h3>${t('game.stats')}</h3>
        <div class="stats-grid" style="margin-top:6px;">
          <div class="val home">${possHomePct}%</div><div class="label">${t('game.possession')}</div><div class="val away">${100-possHomePct}%</div>
          <div class="val home">${s.stats.shotsOnGoal.home}</div><div class="label">${t('game.shots')}</div><div class="val away">${s.stats.shotsOnGoal.away}</div>
          <div class="val home">${s.stats.passes?.home || 0}</div><div class="label">${t('game.passes')}</div><div class="val away">${s.stats.passes?.away || 0}</div>
          <div class="val home">${s.stats.offsides.home}</div><div class="label">${t('game.offsides')}</div><div class="val away">${s.stats.offsides.away}</div>
        </div>
      </div>
      <div class="panel-log-section" style="display:flex; flex-direction:column; flex:1; min-height:0;">
        <h3>${t('game.log')}</h3>
        <ul class="log-list">
          ${s.gameLog.slice().reverse().map(e => `<li class="${e.team || ''} ${e.actionType === 'goal' ? 'goal' : ''}"><span class="turn-tag">T${e.turn}</span>${e.message}</li>`).join('')}
        </ul>
      </div>
      <div class="btn-row" style="gap:6px;">
        ${s.gameMode !== 'online' ? `<button class="btn ghost hide-on-mobile" id="reset-btn" style="flex:1; font-size:0.76rem; padding:9px 8px;">${lang === 'en' ? 'Restart' : lang === 'pt' ? 'Reiniciar' : 'Reiniciar'}</button>` : ''}
        <button class="btn ghost hide-on-mobile" id="exit-to-menu-btn" style="flex:1; font-size:0.76rem; padding:9px 8px;">${lang === 'en' ? 'Main menu' : lang === 'pt' ? 'Menu principal' : 'Menú principal'}</button>
      </div>
    </div>
  </div>
  ${isOnline ? `
  <div class="chat-panel ${onlineChatOpen ? 'open' : ''}" id="chat-panel">
    <div class="chat-header">
      <span>💬 ${lang === 'en' ? 'Chat with opponent' : lang === 'pt' ? 'Chat com o adversário' : 'Chat con el rival'}</span>
      <button class="chat-close-btn" id="chat-close-btn">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages">
      ${onlineChatMessages.length === 0
        ? `<div class="chat-empty">${lang === 'en' ? 'No messages yet. Say something!' : lang === 'pt' ? 'Ainda não há mensagens. Diga algo!' : 'Todavía no hay mensajes. ¡Decí algo!'}</div>`
        : onlineChatMessages.map(m => `<div class="chat-msg ${m.from === onlineMyTeam ? 'mine' : 'theirs'}">${escapeHtml(m.text)}</div>`).join('')}
    </div>
    <div class="chat-quick-row">
      ${CHAT_QUICK_PHRASES.map(p => `<button class="chat-quick-btn" data-quick-phrase="${escapeHtml(p)}">${p}</button>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" class="chat-input" placeholder="${lang === 'en' ? 'Write a message...' : lang === 'pt' ? 'Escreva uma mensagem...' : 'Escribí un mensaje...'}" maxlength="200" autocomplete="off" />
      <button class="chat-send-btn" id="chat-send-btn">➤</button>
    </div>
  </div>` : ''}
  `;
}

function teamButtonStyle(team) {
  const bg = hsl(team.primaryColor);
  const fg = hsl(team.textColor);
  const border = team.secondaryColor ? hsl(team.secondaryColor) : 'transparent';
  return `background:${bg}; color:${fg}; border:2px solid ${border};`;
}

function renderTutorialPanel(s) {
  const step = tutorialScript[s.tutorialStep];
  const isLast = s.tutorialStep === tutorialScript.length - 1;
  const progress = Math.round(((s.tutorialStep + 1) / tutorialScript.length) * 100);
  const needsDiceButton = step.action.type === 'click_element' && step.action.payload.elementId === 'dice-roll-button';
  const needsSkipSwapButton = step.action.type === 'click_element' && step.action.payload.elementId === 'skip-swap-button';
  const diceDisplay = s.diceValue !== null ? s.diceValue : '🎲';
  const rollLabel = lang === 'en' ? 'Roll dice' : lang === 'pt' ? 'Lançar dado' : 'Lanzar dado';
  const skipSwapLabel = lang === 'en' ? 'End turn (skip swap)' : lang === 'pt' ? 'Finalizar turno (omitir troca)' : 'Finalizar turno (omitir cambio)';
  const diceLabel = lang === 'en' ? 'Dice:' : lang === 'pt' ? 'Dado:' : 'Dado:';
  const hintLabel = lang === 'en' ? 'Follow the highlighted hint on the board.' : lang === 'pt' ? 'Siga a dica destacada no tabuleiro.' : 'Seguí la indicación resaltada en el tablero.';
  const doneLabel = lang === 'en' ? 'Got it! →' : lang === 'pt' ? 'Entendido! →' : '¡Entendido! →';
  const exitLabel = lang === 'en' ? 'Exit tutorial' : lang === 'pt' ? 'Sair do tutorial' : 'Salir del tutorial';
  const stepLabel = lang === 'en' ? `Step ${s.tutorialStep + 1}/${tutorialScript.length}` : lang === 'pt' ? `Passo ${s.tutorialStep + 1}/${tutorialScript.length}` : `Paso ${s.tutorialStep + 1}/${tutorialScript.length}`;

  let actionHtml = '';
  if (needsDiceButton) {
    actionHtml = `<div class="dice-row" style="margin:8px 0;"><div class="dice-face">${diceDisplay}</div><button class="btn team-btn" id="roll-dice-btn" style="flex:1; ${teamButtonStyle(s.homeTeam)}">🎲 ${rollLabel}</button></div>`;
  } else if (needsSkipSwapButton) {
    actionHtml = `<button class="btn ghost" id="skip-swap-btn" style="width:100%; margin-top:8px;">${skipSwapLabel}</button>`;
  } else if (s.diceValue !== null) {
    actionHtml = `<div class="dice-row" style="margin:8px 0;"><span style="font-size:0.78rem; color:#5b6f8a;">${diceLabel}</span><div class="dice-face">${diceDisplay}</div></div>`;
  } else if (!isLast) {
    actionHtml = `<div style="font-size:0.74rem; color:#5b6f8a; margin-top:6px;">${hintLabel}</div>`;
  }

  return `
  <div class="dice-panel" style="background:#eef5ff; border-color:#cfe0fb;">
    <h3>🎓 Tutorial · ${stepLabel}</h3>
    <div class="tutorial-progress-bar"><div class="tutorial-progress-fill" style="width:${progress}%;"></div></div>
    ${actionHtml}
    ${isLast ? `<button class="btn" id="final-ok-button" style="width:100%; margin-top:10px;">${doneLabel}</button>` : ''}
    <button class="btn ghost" id="tutorial-exit-btn" style="width:100%; margin-top:8px; font-size:0.74rem; padding:7px;">${exitLabel}</button>
  </div>`;
}

function renderSandboxPanel(s) {
  const homeOptions = TEAMS.map((t,i) => `<option value="${i}" ${s.homeTeam.id===t.id?'selected':''}>${t.name}</option>`).join('');
  const awayOptions = TEAMS.map((t,i) => `<option value="${i}" ${s.awayTeam.id===t.id?'selected':''}>${t.name}</option>`).join('');
  const teamName = getTeamName(s, s.currentPlayer);
  const trainingLabel = lang === 'en' ? 'Training' : lang === 'pt' ? 'Treino' : 'Entrenamiento';
  const diceLabelSandbox = lang === 'en' ? 'Choose dice value' : lang === 'pt' ? 'Escolha o valor do dado' : 'Elegí el valor del dado';
  const moveHint = lang === 'en' ? 'Make your move on the board.' : lang === 'pt' ? 'Faça sua jogada no tabuleiro.' : 'Realizá tu jugada en el tablero.';
  const teamsLabel = lang === 'en' ? 'Teams' : lang === 'pt' ? 'Times' : 'Equipos';
  const resetLabel = lang === 'en' ? '↺ Reset positions' : lang === 'pt' ? '↺ Resetar posições' : '↺ Resetear posiciones';
  const backLabel = lang === 'en' ? '← Back to menu' : lang === 'pt' ? '← Voltar ao menu' : '← Volver al menú';
  const skipSwapSandbox = lang === 'en' ? 'Keep, end turn' : lang === 'pt' ? 'Manter, finalizar turno' : 'No cambiar, finalizar turno';
  const stopChain = lang === 'en' ? 'End play here' : lang === 'pt' ? 'Encerrar jogada aqui' : 'Terminar jugada acá';

  return `
  <div class="dice-panel">
    <h3>🧪 ${trainingLabel} — ${teamName}</h3>
    <div class="dice-row" style="margin:6px 0;">
      <div class="dice-face ${s.diceValue === null ? 'empty' : ''}">${s.diceValue !== null ? s.diceValue : '🎲'}</div>
    </div>
    ${s.gamePhase === 'rolling' ? `
    <div style="margin-bottom:10px;">
      <span class="field-label">${diceLabelSandbox}</span>
      <div class="training-dice-grid">
        ${DICE_VALUES.map(v => `<button class="training-dice-btn" data-training-dice="${v}">${v}</button>`).join('')}
      </div>
    </div>
    ` : `<p style="font-size:0.76rem; color:#6b7a64; text-align:center; margin:8px 0;">${moveHint}</p>`}
    ${s.gamePhase === 'goalkeeper-swap' ? `<button class="btn ghost" id="skip-swap-btn" style="width:100%;">${skipSwapSandbox}</button>` : ''}
    ${s.gamePhase === 'chain-pass' ? `<button class="btn ghost" id="cancel-chain-btn" style="width:100%;">${stopChain}</button>` : ''}
    <hr style="border:none; border-top:1px solid rgba(255,255,255,0.12); margin:10px 0;" />
    <div style="margin-bottom:8px;">
      <span class="field-label">${teamsLabel}</span>
      <div class="team-select-grid" style="margin-top:4px;">
        <select class="team-pick" id="sandbox-home-select">${homeOptions}</select>
        <select class="team-pick" id="sandbox-away-select">${awayOptions}</select>
      </div>
    </div>
    <button class="btn ghost" id="sandbox-reset-btn" style="width:100%; margin-top:4px;">${resetLabel}</button>
    <button class="btn ghost" id="back-to-menu-btn" style="width:100%; margin-top:6px;">${backLabel}</button>
  </div>`;
}

function renderDicePanel(s) {
  if (s.gamePhase === 'pre-game-roll') {
    const homeName = s.homeTeam.name, awayName = s.awayTeam.name;
    return `
    <div class="dice-panel">
      <h3>${t('pregame.title')}</h3>
      <div style="font-size:0.78rem; color:#6b7a64; margin:2px 0 6px;">${t('pregame.subtitle')}</div>
      <div class="btn-row pregame-roll-row">
        <button class="btn team-btn pregame-roll-btn" id="roll-pre-home" style="${teamButtonStyle(s.homeTeam)}" ${(s.gameMode==='vs-ai' && s.aiTeam==='home') || s.isResolvingKickoff ? 'disabled' : ''}>🎲 ${homeName}${s.homeRoll !== null ? ` — ${s.homeRoll}` : ''}</button>
        <button class="btn team-btn pregame-roll-btn" id="roll-pre-away" style="${teamButtonStyle(s.awayTeam)}" ${(s.gameMode==='vs-ai' && s.aiTeam==='away') || s.isResolvingKickoff ? 'disabled' : ''}>🎲 ${awayName}${s.awayRoll !== null ? ` — ${s.awayRoll}` : ''}</button>
      </div>
      ${s.isResolvingKickoff ? `<div style="font-size:0.74rem; color:#1d6b2b; font-weight:700; margin-top:6px;">⏳ ${lang === 'en' ? 'Starting match...' : lang === 'pt' ? 'Iniciando partida...' : 'Empezando partido...'}</div>` : (s.gameMode === 'vs-ai' ? `<div style="font-size:0.72rem; color:#8a9582; margin-top:4px;">🤖 ${lang === 'en' ? 'The computer rolls automatically.' : lang === 'pt' ? 'O computador lança automaticamente.' : 'La computadora tira automáticamente.'}</div>` : '')}
    </div>`;
  }

  if (s.gamePhase === 'resolving-offside') {
    const offsideTeamName = getTeamName(s, s.currentPlayer === 'home' ? 'away' : 'home');
    const timerLow = s.offsideTimer <= 5;
    return `<div class="dice-panel">
      <h3>🚩 ${lang === 'en' ? 'Offside!' : lang === 'pt' ? 'Impedimento!' : '¡Fuera de juego!'}</h3>
      <div style="font-size:0.8rem;color:#6b7a64;margin-bottom:8px;text-align:center;">${lang === 'en' ? `${offsideTeamName} must move the marked player.` : lang === 'pt' ? `${offsideTeamName} deve mover o jogador marcado.` : `${offsideTeamName} debe mover al jugador marcado.`}</div>
      <div class="turn-timer-row">
        <div class="turn-timer-bar"><div class="turn-timer-fill ${timerLow ? 'low' : ''}" style="width:${Math.round((s.offsideTimer / 15) * 100)}%;"></div></div>
        <span class="turn-timer-label ${timerLow ? 'low' : ''}">⏳ ${s.offsideTimer}s</span>
      </div>
    </div>`;
  }

  if (s.gamePhase === 'overtime-choice') {
    const isOnline = s.gameMode === 'online';
    const title = lang === 'en' ? "It's a draw!" : '¡Empate!';
    const extraTimeLabel = lang === 'en' ? `⏱ Extra time (${s.halfDurationMinutes} min)` : lang === 'pt' ? `⏱ Prorrogação (${s.halfDurationMinutes} min)` : `⏱ Prórroga (${s.halfDurationMinutes} min)`;
    const goldenGoalLabel = lang === 'en' ? '⚽ Golden goal' : lang === 'pt' ? '⚽ Gol de ouro' : '⚽ Gol de oro';
    const drawLabel = lang === 'en' ? 'End as draw' : lang === 'pt' ? 'Terminar em empate' : 'Terminar en empate';
    const countdownHtml = isOnline ? `<div style="font-size:0.75rem;color:#9aa593;text-align:center;margin-bottom:8px;">⏳ <span id="overtime-countdown">${s.timer}</span>s</div>` : '';
    const waitingLabel = lang === 'en' ? 'Waiting for host to decide...' : lang === 'pt' ? 'Aguardando o anfitrião decidir...' : 'Esperando que el anfitrión decida...';
    const continueLabel = lang === 'en' ? 'How do you want to continue?' : lang === 'pt' ? 'Como você quer continuar?' : '¿Cómo querés continuar?';
    return `<div class="dice-panel">
      <h3>${title}</h3>
      ${countdownHtml}
      ${isOnlineGuest
        ? `<div style="font-size:0.82rem;color:#6b7a64;text-align:center;padding:10px 0;">${waitingLabel}</div>`
        : `
        <div class="undo-desktop">
          <div style="font-size:0.8rem;color:#6b7a64;margin-bottom:10px;text-align:center;">${continueLabel}</div>
          <button class="btn" id="overtime-extra-btn-d" style="width:100%;margin-bottom:6px;">${extraTimeLabel}</button>
          <button class="btn" id="overtime-golden-btn-d" style="width:100%;margin-bottom:6px;background:#d4a017;border-color:#d4a017;">${goldenGoalLabel}</button>
          <button class="btn ghost" id="overtime-draw-btn-d" style="width:100%;">${drawLabel}</button>
        </div>
        <div class="mobile-action-row" style="padding-right:44px;">
          <span style="font-size:0.75rem;color:#6b7a64;margin-right:auto;">${continueLabel}</span>
          <button class="btn ghost" id="overtime-draw-btn-m" style="padding:2px 7px;font-size:0.72rem;" title="${drawLabel}">🤝</button>
          <button class="btn ghost" id="overtime-golden-btn-m" style="padding:2px 7px;font-size:0.72rem;margin-left:4px;" title="${goldenGoalLabel}">⚽</button>
          <button class="btn ghost" id="overtime-extra-btn-m" style="padding:2px 7px;font-size:0.72rem;margin-left:4px;" title="${extraTimeLabel}">⏱</button>
        </div>`}
    </div>`;
  }

  if (s.gamePhase === 'half-time') {
    return `<div class="dice-panel"><h3>${t('halftime.title')}</h3>${
      state.gameMode === 'online' && !onlineIsHost
        ? `<div class="rematch-waiting">⏳ ${t('halftime.waiting')} <span id="halftime-countdown" style="font-weight:800;">${state.timer}s</span></div>`
        : state.gameMode === 'online' && onlineIsHost
        ? `<button class="btn" id="start-2nd-half-btn" style="width:100%; margin-top:6px;">${t('halftime.start2nd')}</button>
           <div style="font-size:0.72rem; color:#6b7a64; text-align:center; margin-top:6px;">${t('halftime.autoinicio')} <b id="halftime-countdown">${state.timer}s</b></div>`
        : `<button class="btn" id="start-2nd-half-btn" style="width:100%; margin-top:6px;">${t('halftime.start2nd')}</button>`
    }</div>`;
  }

  if (s.gamePhase === 'game-over') {
    if (s.gameMode === 'online') {
      const requesterName = onlineIncomingRematchFrom ? getTeamName(s, onlineIncomingRematchFrom) : '';
      const myScore = onlineMyTeam ? s.score[onlineMyTeam] : 0;
      const theirTeam = onlineMyTeam === 'home' ? 'away' : 'home';
      const theirScore = s.score[theirTeam];
      const myTeamName = getTeamName(s, onlineMyTeam || 'home');
      const theirTeamName = getTeamName(s, theirTeam);
      const resultText = myScore > theirScore ? t('gameover.win') : myScore < theirScore ? t('gameover.loss') : t('gameover.draw');
      const resultColor = myScore > theirScore ? '#1d6b2b' : myScore < theirScore ? '#dc2626' : '#6b7a64';
      const wLabel = lang === 'en' ? 'W' : lang === 'pt' ? 'V' : 'V';
      const lLabel = lang === 'en' ? 'L' : lang === 'pt' ? 'D' : 'D';
      const eLabel = lang === 'en' ? 'D' : lang === 'pt' ? 'E' : 'E';
      const eloInfo = userProfile && onlineOpponentUid
        ? `<div style="font-size:0.75rem; color:#6b7a64; text-align:center; margin: 4px 0 6px;">⚡ ${userProfile.elo} ELO · ${userProfile.wins}${wLabel} ${userProfile.losses}${lLabel} ${userProfile.draws}${eLabel}</div>`
        : '';
      return `<div class="dice-panel">
        <div style="font-size:1.1rem; font-weight:800; color:${resultColor}; text-align:center; margin-bottom:4px;">${resultText}</div>
        <div style="font-size:0.85rem; text-align:center; color:#384032; margin-bottom:6px;">${myTeamName} ${myScore} — ${theirScore} ${theirTeamName}</div>
        ${eloInfo}
        <button class="btn ghost" id="share-result-btn" style="width:100%; margin-bottom:6px;">${t('gameover.share')}</button>
        <a href="javascript:void(0)"
           onclick="trackEvent('cafecito_click',{source:'game_over'});showDonateModal()"
           style="display:block;text-align:center;font-size:0.75rem;color:#6b7a64;margin-bottom:8px;text-decoration:none;cursor:pointer;">
          ❤️ ${t('menu.donate')}
        </a>
        ${onlineIncomingRematchFrom ? `
          <div class="rematch-prompt">
            <p>${requesterName} ${t('rematch.request')}</p>
            <div class="rematch-prompt-actions">
              <button class="btn team-btn" id="accept-rematch-btn" style="flex:1; background:var(--accent); border-color:var(--accent);">${t('rematch.accept')}</button>
              <button class="btn ghost" id="decline-rematch-btn" style="flex:1;">${t('rematch.decline')}</button>
            </div>
          </div>
        ` : onlineRematchRequestedByMe
          ? `<div class="rematch-waiting">⏳ ${t('gameover.waiting')}</div>`
          : `<button class="btn team-btn" id="request-rematch-btn" style="width:100%; margin-top:6px; background:var(--accent); border-color:var(--accent);">${t('gameover.rematch')}</button>`}
        <button class="btn ghost" id="back-to-menu-btn" style="width:100%; margin-top:6px;">${t('gameover.back')}</button>
      </div>`;
    }
    return `<div class="dice-panel"><h3>${t('gameover.finished')}</h3><button class="btn" id="back-to-menu-btn" style="width:100%; margin-top:6px;">${s.gameMode === 'league' ? t('gameover.league') : t('gameover.back')}</button></div>`;
  }

  const isBotTurn = s.gameMode === 'vs-ai' && s.currentPlayer === s.aiTeam;
  const isOpponentOnlineTurn = s.gameMode === 'online' && s.currentPlayer !== onlineMyTeam;
  const blockControls = isBotTurn || isOpponentOnlineTurn;
  const currentTeam = s.currentPlayer === 'home' ? s.homeTeam : s.awayTeam;
  const teamName = getTeamName(s, s.currentPlayer);
  const isZero = s.gamePhase === 'turn-over';
  const diceDisplay = s.diceValue !== null ? s.diceValue : '🎲';
  const isTimerActive = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass'].includes(s.gamePhase) && s.turnDuration !== 9999;
  const timerPct = isTimerActive ? Math.max(0, Math.min(100, (s.timer / s.turnDuration) * 100)) : 100;
  const timerLow = isTimerActive && s.timer <= Math.ceil(s.turnDuration * 0.3);
  const turnLabel = lang === 'en' ? `Dice — ${teamName}'s turn` : lang === 'pt' ? `Dado — turno de ${teamName}` : `Dado — turno de ${teamName}`;
  const thinkingLabel = lang === 'en' ? 'Thinking...' : lang === 'pt' ? 'Pensando...' : 'Pensando...';
  const opponentLabel = lang === 'en' ? 'Opponent rolling...' : lang === 'pt' ? 'Adversário lançando...' : 'Rival tirando...';
  const zeroNote = lang === 'en' ? "You rolled 0! Turn is skipped automatically…" : '¡Sacaste 0! Se pierde el turno automáticamente…';

  // Undo button HTML — computed before return to avoid nested template literal issues
  let undoBtnDesktop = '';
  let undoBtnMobile = '';
  const undoPhases = ['rolling','selecting-piece','moving-piece','chain-pass','goalkeeper-swap'];
  if (s.prevTurnSnapshot && undoPhases.includes(s.gamePhase)) {
    if (s.gameMode === 'online') {
      if (onlineIncomingUndoFrom) {
        const undoQ = lang === 'en' ? 'Undo?' : lang === 'pt' ? 'Desfazer?' : '¿Deshacer?';
        const btnsD = '<button class="btn" id="accept-undo-btn-d" style="padding:3px 9px;font-size:0.72rem;margin:0 2px;">✓</button><button class="btn ghost" id="decline-undo-btn-d" style="padding:3px 9px;font-size:0.72rem;">✕</button>';
        const btnsM = '<button class="btn" id="accept-undo-btn-m" style="padding:2px 7px;font-size:0.68rem;margin:0 2px;">✓</button><button class="btn ghost" id="decline-undo-btn-m" style="padding:2px 7px;font-size:0.68rem;">✕</button>';
        undoBtnDesktop = undoQ + ' ' + btnsD;
        undoBtnMobile = '↩ ' + btnsM;
      } else if (onlineUndoRequestedByMe) {
        undoBtnDesktop = lang === 'en' ? '⏳ Waiting...' : lang === 'pt' ? '⏳ Aguardando...' : '⏳ Esperando...';
        undoBtnMobile = '⏳';
      } else if (onlineMyTeam !== s.currentPlayer && s.diceValue === null) {
        const undoLabel = lang === 'en' ? '↩ Propose undo' : lang === 'pt' ? '↩ Propor desfazer' : '↩ Proponer deshacer';
        undoBtnDesktop = '<button class="btn ghost" id="request-undo-btn-d" style="width:100%;font-size:0.76rem;">' + undoLabel + '</button>';
        undoBtnMobile = '<button class="btn ghost" id="request-undo-btn-m" style="padding:1px 6px;font-size:0.7rem;">↩</button>';
      }
    } else if (!blockControls) {
      const undoLabel = lang === 'en' ? '↩ Undo last turn' : lang === 'pt' ? '↩ Desfazer última jogada' : '↩ Deshacer última jugada';
      undoBtnDesktop = '<button class="btn ghost" id="local-undo-btn-d" style="width:100%;font-size:0.76rem;">' + undoLabel + '</button>';
      undoBtnMobile = '<button class="btn ghost" id="local-undo-btn-m" style="padding:1px 6px;font-size:0.7rem;">↩</button>';
    }
  }
  const mobilMenuBtns = `<span class="panel-mobile-menu-btns" style="margin-left:auto;display:none;gap:4px;">
      ${s.gameMode !== 'online' ? `<button class="btn ghost" id="reset-btn-mobile" style="padding:1px 6px;font-size:0.75rem;" title="${lang === 'en' ? 'Restart' : lang === 'pt' ? 'Reiniciar' : 'Reiniciar'}">🔄</button>` : ''}
      <button class="btn ghost" id="exit-to-menu-btn-mobile" style="padding:1px 6px;font-size:0.75rem;" title="${lang === 'en' ? 'Main menu' : lang === 'pt' ? 'Menu principal' : 'Menú principal'}">🏠</button>
    </span>`;

  return `
  <div class="dice-panel">
    <h3>${turnLabel}${isBotTurn ? ' 🤖' : ''}${isOpponentOnlineTurn ? ' ⏳' : ''}</h3>
    ${isTimerActive ? `
    <div class="turn-timer-row">
      <div class="turn-timer-bar"><div class="turn-timer-fill ${timerLow ? 'low' : ''}" id="turn-timer-fill" style="width:${timerPct}%;"></div></div>
      <span class="turn-timer-label ${timerLow ? 'low' : ''}" id="turn-timer-label">⏳ ${s.timer}s</span>
      ${undoBtnMobile ? `<span class="undo-mobile" style="margin-left:4px;">${undoBtnMobile}</span>` : ''}
      ${mobilMenuBtns}
    </div>` : `<div class="mobile-action-row">
      ${undoBtnMobile ? `<span style="margin-right:4px;">${undoBtnMobile}</span>` : ''}
      ${mobilMenuBtns}
    </div>`}
    <div class="dice-row" style="margin:6px 0;">
      <div class="dice-face ${isZero ? 'zero' : ''} ${s.diceValue === null ? 'empty' : ''}">${diceDisplay}</div>
      ${s.gamePhase === 'rolling' && !blockControls ? `<button class="btn team-btn" id="roll-dice-btn" style="flex:1; ${teamButtonStyle(currentTeam)}">🎲 ${t('game.roll')}</button>` : ''}
      ${isBotTurn ? `<div class="bot-thinking"><span class="bot-dot"></span><span class="bot-dot"></span><span class="bot-dot"></span> ${thinkingLabel}</div>` : ''}
      ${isOpponentOnlineTurn && s.gamePhase === 'rolling' ? `<div class="bot-thinking"><span class="bot-dot"></span><span class="bot-dot"></span><span class="bot-dot"></span> ${opponentLabel}</div>` : ''}
    </div>
    ${isZero ? `<div class="zero-note">${zeroNote}</div>` : ''}
    ${s.gamePhase === 'goalkeeper-swap' && !blockControls ? `
    <div class="turn-timer-row" style="margin-top:4px;">
      <div class="turn-timer-bar"><div class="turn-timer-fill ${s.swapTimer <= 5 ? 'low' : ''}" id="swap-timer-fill" style="width:${Math.round((s.swapTimer / 15) * 100)}%;"></div></div>
      <span class="turn-timer-label ${s.swapTimer <= 5 ? 'low' : ''}" id="swap-timer-label">⏳ ${s.swapTimer}s</span>
    </div>
    <button class="btn ghost" id="skip-swap-btn" style="width:100%;">${t('msg.swap.skip')}</button>` : ''}
    ${s.gamePhase === 'goalkeeper-swap' && blockControls ? `
    <div class="turn-timer-row" style="margin-top:4px;">
      <div class="turn-timer-bar"><div class="turn-timer-fill ${s.swapTimer <= 5 ? 'low' : ''}" id="swap-timer-fill" style="width:${Math.round((s.swapTimer / 15) * 100)}%;"></div></div>
      <span class="turn-timer-label ${s.swapTimer <= 5 ? 'low' : ''}" id="swap-timer-label">⏳ ${s.swapTimer}s</span>
    </div>` : ''}
    ${s.gamePhase === 'chain-pass' && !blockControls ? `<button class="btn ghost" id="cancel-chain-btn" style="width:100%;">${t('msg.chain.stop')}</button>` : ''}
    ${undoBtnDesktop ? `<div class="undo-desktop" style="margin-top:6px;">${undoBtnDesktop}</div>` : ''}
  </div>`;
}

/* renderControls removed: dice now lives in the side panel (renderDicePanel),
   and ambiguous action choice is now resolved with icons drawn directly on the
   target tile inside renderBoardSVG (see actionChoice handling there). */

/* =========================================================================
   RENDER ROOT + EVENT WIRING
   ========================================================================= */

let currentMenuView = 'landing'; // starts on landing until auth resolves

function render() {
  const app = document.getElementById('app');

  if (state.gamePhase === 'main-menu') {
    if (currentMenuView === 'landing') {
      app.innerHTML = renderLanding();
      // Wire landing buttons directly here, not via wireEvents
      const googleBtn = document.getElementById('landing-google-btn');
      if (googleBtn) googleBtn.onclick = () => loginWithGoogle();
      const emailBtn = document.getElementById('landing-email-btn');
      if (emailBtn) emailBtn.onclick = () => { authFormMode = 'register'; authFormError = ''; currentMenuView = 'auth'; render(); };
      const guestBtn = document.getElementById('landing-guest-btn');
      if (guestBtn) guestBtn.onclick = () => loginAsGuest();
      return;
    }
    if (currentMenuView === 'auth') {
      app.innerHTML = renderAuthScreen();
      wireAuthEvents();
      return;
    }
    if (currentMenuView === 'rules') app.innerHTML = renderRules();
    else if (currentMenuView === 'leaderboard') app.innerHTML = renderLeaderboard();
    else if (currentMenuView === 'achievements') app.innerHTML = renderAchievementsScreen();
    else if (currentMenuView === 'choose-username') app.innerHTML = renderChooseUsername();
    else if (currentMenuView === 'quick-tutorial') app.innerHTML = renderQuickTutorial();
    else if (currentMenuView === 'match-history') { renderMatchHistory(); }
    else if (currentMenuView === 'play') app.innerHTML = renderPlayMenu();
    else if (currentMenuView === 'setup') app.innerHTML = renderSetup();
    else if (currentMenuView === 'ai-setup') app.innerHTML = renderAiSetup();
    else if (currentMenuView === 'league-entry') app.innerHTML = renderLeagueSetup();
    else if (currentMenuView === 'online-setup') app.innerHTML = renderOnlineSetup();
    else if (currentMenuView === 'online-join') app.innerHTML = renderOnlineJoin();
    else if (currentMenuView === 'online-waiting') app.innerHTML = renderOnlineWaiting();
    else if (currentMenuView === 'online-searching') app.innerHTML = renderOnlineSearching();
    else if (currentMenuView === 'online-reconnect') app.innerHTML = renderOnlineReconnect();
    else if (currentMenuView === 'online-kit-editor') app.innerHTML = renderCustomKitEditor();
    else app.innerHTML = renderMainMenu();
  } else if (state.gamePhase === 'league-view') {
    app.innerHTML = renderLeagueView(state);
  } else if (state.gamePhase === 'league-over') {
    app.innerHTML = renderLeagueOver(state);
  } else if (state.gamePhase === 'tutorial') {
    app.innerHTML = renderGameScreen(state);
  } else {
    app.innerHTML = renderGameScreen(state);
  }

  renderToast();
  wireEvents();
}

function renderToast() {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  if (state.toastToShow) {
    const t = document.createElement('div');
    t.className = 'toast' + (state.toastToShow.variant === 'destructive' ? ' destructive' : '');
    t.textContent = state.toastToShow.title + (state.toastToShow.description ? ' — ' + state.toastToShow.description : '');
    document.body.appendChild(t);
    clearTimeout(toastTimeoutHandle);
    toastTimeoutHandle = setTimeout(() => { setState({ toastToShow: null }); }, 2600);
  }
}

function wireEvents() {
  const soundToggleBtn = document.getElementById('sound-toggle-btn');
  if (soundToggleBtn) {
    soundToggleBtn.onclick = () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) { getAudioCtx(); sounds.move(); } // tiny confirmation blip when turning back on
      render();
    };
  }

  const fullscreenBtn = document.getElementById('fullscreen-btn');
  if (fullscreenBtn) {
    fullscreenBtn.onclick = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    };
  }

  // Rules screen: hide the scroll hint once the user has scrolled to the bottom.
  const rulesBody = document.querySelector('.rules-body');
  if (rulesBody) {
    const hint = document.getElementById('rules-scroll-hint');
    const updateHint = () => {
      if (!hint) return;
      const atBottom = rulesBody.scrollHeight - rulesBody.scrollTop - rulesBody.clientHeight < 4;
      hint.style.opacity = atBottom ? '0' : '1';
    };
    updateHint();
    rulesBody.onscroll = updateHint;
  }

  // Main menu
  document.querySelectorAll('[data-menu]').forEach(btn => {
    btn.onclick = () => {
      const target = btn.getAttribute('data-menu');
      if (target === 'league-exit') {
        currentMenuView = 'main';
        setState(getInitialState());
        return;
      }
      if (target === 'tutorial') {
        currentMenuView = 'main';
        trackEvent('tutorial_start', { type: 'full' }); setState(startTutorial());
        return;
      }
      if (target === 'quick-tutorial') {
        trackEvent('tutorial_start', { type: 'quick' }); currentMenuView = 'quick-tutorial';
        render();
        return;
      }
      if (target === 'sandbox') {
        currentMenuView = 'main';
        sandboxDragTarget = null;
        trackEvent('game_start', { mode: 'training' }); setState(startSandbox());
        return;
      }
      if (target === 'leaderboard') {
        currentMenuView = 'leaderboard';
        loadLeaderboard();
        return;
      }
      if (target === 'back') {
        const playSubViews = ['setup','ai-setup','online-setup','tutorial','league-entry','sandbox'];
        if (playSubViews.includes(currentMenuView)) currentMenuView = 'play';
        else currentMenuView = (currentUser && !currentUser.isAnonymous) || (currentUser && currentUser.isAnonymous) ? 'main' : 'landing';
      }
      else currentMenuView = target;
      render();
    };
  });

  // Online duration selector
  document.querySelectorAll('[data-online-goals]').forEach(btn => {
    btn.onclick = () => {
      setupTargetGoals = parseInt(btn.getAttribute('data-online-goals'), 10);
      setupDuration = 0;
      document.querySelectorAll('[data-online-goals]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('[data-online-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  document.querySelectorAll('[data-online-duration]').forEach(btn => {
    btn.onclick = () => {
      setupDuration = parseInt(btn.getAttribute('data-online-duration'), 10);
      setupTargetGoals = null;
      document.querySelectorAll('[data-online-duration]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('[data-online-goals]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  // Online — Create room
  const onlineCreateBtn = document.getElementById('online-create-btn');
  if (onlineCreateBtn) {
    onlineCreateBtn.onclick = () => {
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      trackEvent('online_room_created', { duration: setupDuration, target_goals: setupTargetGoals }); onlineCreateRoom(resolvePickedTeam('home'), setupDuration, setupTargetGoals);
    };
  }

  // Online — Quick match
  const onlineQuickBtn = document.getElementById('online-quick-btn');
  if (onlineQuickBtn) {
    onlineQuickBtn.onclick = () => {
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      trackEvent('online_quick_match', { duration: setupDuration }); onlineQuickMatch(resolvePickedTeam('home'), setupDuration, setupTargetGoals);
    };
  }

  // Online — Join by code
  const onlineJoinBtn = document.getElementById('online-join-btn');
  if (onlineJoinBtn) {
    onlineJoinBtn.onclick = () => {
      const code = (document.getElementById('join-code-input').value || '').trim().toUpperCase();
      if (code.length !== 6) { alert('El código debe tener 6 caracteres.'); return; }
      if (onlineTeamPicker.home.mode === 'preset') {
        const sel = document.getElementById('online-home-select');
        if (sel) onlineTeamPicker.home.presetIdx = parseInt(sel.value, 10);
      }
      onlineJoinRoom(code, resolvePickedTeam('home'));
    };
  }
  const joinInput = document.getElementById('join-code-input');
  if (joinInput) {
    joinInput.onkeydown = (e) => { if (e.key === 'Enter') { document.getElementById('online-join-btn')?.click(); } };
  }

  // Online — team picker mode toggle (preset vs custom)
  document.querySelectorAll('[data-team-mode]').forEach(btn => {
    btn.onclick = () => {
      const [side, mode] = btn.getAttribute('data-team-mode').split(':');
      onlineTeamPicker[side].mode = mode;
      render();
    };
  });

  // Online — open the kit editor for a side
  ['home', 'away'].forEach(side => {
    const editBtn = document.getElementById('edit-custom-kit-' + side);
    if (editBtn) editBtn.onclick = () => {
      onlineKitEditorReturnView = currentMenuView; // 'online-setup' or 'online-join'
      onlineCustomEditorSide = side;
      currentMenuView = 'online-kit-editor';
      render();
    };
  });

  // Online — kit editor: design choice
  document.querySelectorAll('[data-kit-design]').forEach(btn => {
    btn.onclick = () => {
      if (!onlineCustomEditorSide) return;
      onlineTeamPicker[onlineCustomEditorSide].customKit.design = btn.getAttribute('data-kit-design');
      render();
    };
  });

  // Online — kit editor: color swatches (primary/secondary/tertiary/text)
  document.querySelectorAll('[data-kit-color]').forEach(btn => {
    btn.onclick = () => {
      if (!onlineCustomEditorSide) return;
      const [field, value] = btn.getAttribute('data-kit-color').split(':');
      onlineTeamPicker[onlineCustomEditorSide].customKit[field] = value;
      render();
    };
  });

  // Online — kit editor: team name
  const customNameInput = document.getElementById('custom-team-name');
  if (customNameInput) {
    customNameInput.oninput = () => {
      if (!onlineCustomEditorSide) return;
      onlineTeamPicker[onlineCustomEditorSide].customName = customNameInput.value;
    };
  }

  // Online — kit editor: save and go back
  const saveCustomKitBtn = document.getElementById('save-custom-kit-btn');
  if (saveCustomKitBtn) {
    saveCustomKitBtn.onclick = () => {
      if (onlineCustomEditorSide) {
        const picker = onlineTeamPicker[onlineCustomEditorSide];
        if (!picker.customName || !picker.customName.trim()) picker.customName = lang === 'en' ? (onlineCustomEditorSide === 'home' ? 'My Team' : 'Away Team') : (onlineCustomEditorSide === 'home' ? 'Mi Equipo' : 'Equipo Visitante');
      }
      onlineCustomEditorSide = null;
      currentMenuView = onlineKitEditorReturnView || 'online-setup';
      render();
    };
  }

  const saveKitToProfileBtn = document.getElementById('save-kit-to-profile-btn');
  if (saveKitToProfileBtn) {
    saveKitToProfileBtn.onclick = async () => {
      if (!onlineCustomEditorSide) return;
      const picker = onlineTeamPicker[onlineCustomEditorSide];
      if (!picker.customName || !picker.customName.trim()) picker.customName = lang === 'en' ? 'My Team' : lang === 'pt' ? 'Meu Time' : 'Mi Equipo';
      const teamToSave = {
        name: picker.customName,
        kit: picker.customKit,
        mode: 'custom',
      };
      try {
        await db.collection('users').doc(currentUser.uid).update({ customTeam: teamToSave });
        if (userProfile) userProfile.customTeam = teamToSave;
        saveKitToProfileBtn.textContent = '✓ Guardado';
        saveKitToProfileBtn.disabled = true;
        setTimeout(() => {
          onlineCustomEditorSide = null;
          currentMenuView = onlineKitEditorReturnView || 'online-setup';
          render();
        }, 800);
      } catch (err) {
        console.error('Error saving team to profile:', err);
        alert('Error al guardar el equipo.');
      }
    };
  }

  // Online — kit editor: discard and go back
  const discardCustomKitBtn = document.getElementById('discard-custom-kit-btn');
  if (discardCustomKitBtn) {
    discardCustomKitBtn.onclick = () => {
      onlineCustomEditorSide = null;
      currentMenuView = onlineKitEditorReturnView || 'online-setup';
      render();
    };
  }

  // Online — Cancel / leave room
  const copyLinkBtn = document.getElementById('copy-link-btn');
  if (copyLinkBtn) copyLinkBtn.onclick = () => {
    const link = `https://hexagol.com.ar?sala=${onlineRoomId}`;
    navigator.clipboard.writeText(link).then(() => {
      copyLinkBtn.textContent = lang === 'en' ? '✓ Copied!' : lang === 'pt' ? '✓ Copiado!' : '✓ ¡Copiado!';
      setTimeout(() => {
        copyLinkBtn.innerHTML = `🔗 ${lang === 'en' ? 'Copy link' : lang === 'pt' ? 'Copiar link' : 'Copiar link'}`;
      }, 2000);
    }).catch(() => {
      // Fallback for browsers without clipboard API
      const el = document.createElement('textarea');
      el.value = link;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      copyLinkBtn.textContent = lang === 'en' ? '✓ Copied!' : lang === 'pt' ? '✓ Copiado!' : '✓ ¡Copiado!';
      setTimeout(() => {
        copyLinkBtn.innerHTML = `🔗 ${lang === 'en' ? 'Copy link' : lang === 'pt' ? 'Copiar link' : 'Copiar link'}`;
      }, 2000);
    });
  };

  const onlineCancelBtn = document.getElementById('online-cancel-btn');
  if (onlineCancelBtn) {
    onlineCancelBtn.onclick = () => {
      leaveOnlineRoom();
      currentMenuView = 'main';
      render();
    };
  }

  const reconnectAcceptBtn = document.getElementById('reconnect-accept-btn');
  if (reconnectAcceptBtn) reconnectAcceptBtn.onclick = () => { reconnectToOnlineRoom(); };

  const reconnectDeclineBtn = document.getElementById('reconnect-decline-btn');
  if (reconnectDeclineBtn) reconnectDeclineBtn.onclick = () => { declineReconnect(); };

  // Chat
  const chatFabBtn = document.getElementById('chat-fab-btn');
  if (chatFabBtn) chatFabBtn.onclick = () => { toggleOnlineChat(); };

  const chatCloseBtn = document.getElementById('chat-close-btn');
  if (chatCloseBtn) chatCloseBtn.onclick = () => { toggleOnlineChat(); };

  const chatInput = document.getElementById('chat-input');
  const chatSendBtn = document.getElementById('chat-send-btn');
  const doSendChat = () => {
    if (!chatInput) return;
    const text = chatInput.value;
    if (!text.trim()) return;
    sendOnlineChatMessage(text);
    chatInput.value = '';
  };
  if (chatSendBtn) chatSendBtn.onclick = doSendChat;
  if (chatInput) {
    chatInput.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); doSendChat(); } };
  }

  document.querySelectorAll('[data-quick-phrase]').forEach(btn => {
    btn.onclick = () => { sendOnlineChatMessage(btn.getAttribute('data-quick-phrase')); };
  });

  // Auto-scroll chat to the latest message whenever the panel is in the DOM.
  const chatMessagesEl = document.getElementById('chat-messages');
  if (chatMessagesEl) chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;

  // Online — Copy room code on click
  const codeDisplay = document.getElementById('room-code-display');
  if (codeDisplay && onlineRoomId) {
    codeDisplay.style.cursor = 'pointer';
    codeDisplay.title = 'Clic para copiar';
    codeDisplay.onclick = () => {
      navigator.clipboard.writeText(onlineRoomId).then(() => {
        codeDisplay.textContent = lang === 'en' ? 'Copied!' : lang === 'pt' ? 'Copiado!' : '¡Copiado!';
        setTimeout(() => { codeDisplay.textContent = onlineRoomId; }, 1500);
      }).catch(() => {});
    };
  }

  const finalOkBtn = document.getElementById('final-ok-button');
  if (finalOkBtn) finalOkBtn.onclick = () => handleTutorialAction({ type: 'click_element', payload: { elementId: 'final-ok-button' } });

  const tutorialExitBtn = document.getElementById('tutorial-exit-btn');
  if (tutorialExitBtn) tutorialExitBtn.onclick = () => { currentMenuView = 'main'; setState(getInitialState()); };

  const startBtn = document.getElementById('start-match-btn');
  if (startBtn) {
    startBtn.onclick = () => {
      const homeIdx = parseInt(document.getElementById('home-team-select').value, 10);
      const awayIdx = parseInt(document.getElementById('away-team-select').value, 10);
      let homeTeam = TEAMS[homeIdx], awayTeam = TEAMS[awayIdx];
      if (homeIdx === awayIdx) { awayTeam = TEAMS[(awayIdx + 1) % TEAMS.length]; }
      const { finalHomeTeam, finalAwayTeam, clashResolved } = resolveKitClash(homeTeam, awayTeam);
      const fresh = getInitialState();
      const noTurnTimer = document.getElementById('no-turn-timer-check')?.checked;
      const turnDur = noTurnTimer ? 9999 : setupDuration <= 2 ? 10 : setupDuration <= 5 ? 20 : TURN_DURATION;
      const useGoals = setupTargetGoals !== null;
      const finalTurnDur = useGoals ? TURN_DURATION : turnDur;
      setState({
        ...fresh, homeTeam: finalHomeTeam, awayTeam: finalAwayTeam,
        gamePhase: 'pre-game-roll', halfDurationMinutes: useGoals ? 0 : setupDuration,
        gameClock: useGoals ? 0 : setupDuration * 60,
        targetGoals: setupTargetGoals,
        turnDuration: finalTurnDur, timer: finalTurnDur,
        message: lang === 'en' ? 'Roll the dice to decide who starts.' : lang === 'pt' ? 'Lance o dado para decidir quem começa.' : 'Tiren los dados para decidir quién empieza.',
        toastToShow: clashResolved ? { title: lang === 'en' ? 'Kit clash' : lang === 'pt' ? 'Conflito de uniformes' : 'Conflicto de camisetas', description: lang === 'en' ? `${awayTeam.name} will use an alternate color.` : lang === 'pt' ? `${awayTeam.name} usará uma cor alternativa.` : `${awayTeam.name} usará un color alternativo.` } : null,
      });
    };
  }

  document.querySelectorAll('[data-ai-side]').forEach(btn => {
    btn.onclick = () => { aiHumanSide = btn.getAttribute('data-ai-side'); render(); };
  });
  document.querySelectorAll('[data-ai-difficulty]').forEach(btn => {
    btn.onclick = () => { aiDifficultyChoice = btn.getAttribute('data-ai-difficulty'); render(); };
  });
  const startAiBtn = document.getElementById('start-ai-match-btn');
  if (startAiBtn) {
    startAiBtn.onclick = () => {
      const homeIdx = parseInt(document.getElementById('ai-home-team-select').value, 10);
      const awayIdx = parseInt(document.getElementById('ai-away-team-select').value, 10);
      let homeTeam = TEAMS[homeIdx], awayTeam = TEAMS[awayIdx];
      if (homeIdx === awayIdx) { awayTeam = TEAMS[(awayIdx + 1) % TEAMS.length]; }
      const { finalHomeTeam, finalAwayTeam, clashResolved } = resolveKitClash(homeTeam, awayTeam);
      const fresh = getInitialState();
      const turnDur = document.getElementById('no-turn-timer-check')?.checked ? 9999 : setupDuration <= 2 ? 10 : setupDuration <= 5 ? 20 : TURN_DURATION;
      const useGoalsAi = setupTargetGoals !== null;
      const finalTurnDurAi = useGoalsAi ? TURN_DURATION : turnDur;
      const aiTeam = aiHumanSide === 'home' ? 'away' : 'home';
      setState({
        ...fresh, homeTeam: finalHomeTeam, awayTeam: finalAwayTeam, gameMode: 'vs-ai',
        aiTeam, aiDifficulty: aiDifficultyChoice,
        gamePhase: 'pre-game-roll', halfDurationMinutes: useGoalsAi ? 0 : setupDuration, gameClock: useGoalsAi ? 0 : setupDuration * 60,
        targetGoals: setupTargetGoals, turnDuration: finalTurnDurAi, timer: finalTurnDurAi,
        turnDuration: turnDur, timer: turnDur,
        message: lang === 'en' ? 'Roll the dice to decide who starts.' : lang === 'pt' ? 'Lance o dado para decidir quem começa.' : 'Tiren los dados para decidir quién empieza.',
        toastToShow: clashResolved ? { title: lang === 'en' ? 'Kit clash' : lang === 'pt' ? 'Conflito de uniformes' : 'Conflicto de camisetas', description: lang === 'en' ? `${awayTeam.name} will use an alternate color.` : lang === 'pt' ? `${awayTeam.name} usará uma cor alternativa.` : `${awayTeam.name} usará un color alternativo.` } : null,
      });
    };
  }
  document.querySelectorAll('[data-goals]').forEach(btn => {
    btn.onclick = () => {
      setupTargetGoals = parseInt(btn.getAttribute('data-goals'), 10);
      setupDuration = 0; // disable time-based
      document.querySelectorAll('[data-goals]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('[data-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  document.querySelectorAll('[data-duration]').forEach(btn => {
    btn.onclick = () => {
      setupDuration = parseInt(btn.getAttribute('data-duration'), 10);
      setupTargetGoals = null; // clear goals mode
      document.querySelectorAll('[data-duration]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('[data-goals]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });

  // League setup
  const leagueNumSelect = document.getElementById('league-num-teams');
  if (leagueNumSelect) {
    leagueNumSelect.onchange = () => {
      leagueNumTeams = parseInt(leagueNumSelect.value, 10);
      leagueSelectedTeams = Array(leagueNumTeams).fill(null);
      render();
    };
  }
  document.querySelectorAll('.league-team-select').forEach(sel => {
    sel.onchange = () => {
      const slot = parseInt(sel.getAttribute('data-team-slot'), 10);
      leagueSelectedTeams[slot] = sel.value || null;
      render();
    };
  });
  document.querySelectorAll('[data-league-duration]').forEach(btn => {
    btn.onclick = () => {
      leagueDuration = parseInt(btn.getAttribute('data-league-duration'), 10);
      document.querySelectorAll('[data-league-duration]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
  const startLeagueBtn = document.getElementById('start-league-btn');
  if (startLeagueBtn) {
    startLeagueBtn.onclick = () => {
      if (leagueSelectedTeams.some(id => !id)) return;
      if (new Set(leagueSelectedTeams).size !== leagueSelectedTeams.length) return;
      const leagueState = startLeague(leagueSelectedTeams, leagueDuration);
      currentMenuView = 'main';
      leagueViewTab = 'standings';
      setState({ ...getInitialState(), gameMode: 'league', gamePhase: 'league-view', leagueState, message: `Comienza la liga. Jornada 1.` });
    };
  }

  // League view: tabs + play match buttons
  document.querySelectorAll('[data-league-tab]').forEach(btn => {
    btn.onclick = () => { leagueViewTab = btn.getAttribute('data-league-tab'); render(); };
  });
  document.querySelectorAll('[data-play-match]').forEach(btn => {
    btn.onclick = () => {
      const matchId = parseInt(btn.getAttribute('data-play-match'), 10);
      setState(s => startLeagueMatch(s, matchId));
    };
  });

  // Pre-game roll
  const rollPreHome = document.getElementById('roll-pre-home');
