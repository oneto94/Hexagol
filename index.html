function setState(patch) {
  const prev = state;
  state = typeof patch === 'function' ? patch(state) : { ...state, ...patch };
  window.state = state;
  // No-op update (e.g. the inactive online player's clock tick returning the same
  // object because it's not their turn) — nothing changed, nothing to push or render.
  if (state === prev) return;
  playSoundsForTransition(prev, state);
  // Push to Firebase only when it's our own action, not when applying a remote update
  if (state.gameMode === 'online' && onlineStatus === 'connected' && !onlineApplyingRemote) {
    pushOnlineState(state);
    // Schedule room deletion 30s after game-over
    if (prev.gamePhase !== 'game-over' && state.gamePhase === 'game-over') {
      scheduleRoomDeletion();
    }
  }
  render();
  maybeTriggerBot();
}
window.state = state;

// Local-only state update: changes `state` and re-renders, but NEVER pushes to
// Firebase. Mirrors how the original React build's useGameTimers hook dispatched
// clock ticks straight to the local reducer with zero network involvement —
// each player's countdown is purely cosmetic and independent per screen. Real
// rule changes (a turn timing out, the half ending) still go through setState
// so they get synced; only the per-second numeric tick uses this path.
function setLocalOnlyState(patch) {
  const prev = state;
  state = typeof patch === 'function' ? patch(state) : { ...state, ...patch };
  window.state = state;
  if (state === prev) return;
  updateClockDisplaySurgically();
}

// Updates only the match-clock and turn-timer DOM nodes directly, without
// touching anything else in the tree. This runs once per second whenever the
// game clock or turn timer ticks (purely local, never synced to Firebase) —
// going through the full render() here would replace #app's entire innerHTML
// every second, which is both wasteful and was the actual cause of the chat
// input losing whatever the user was mid-typing (the <input> element itself
// gets destroyed and recreated on every innerHTML replacement). If the
// expected nodes aren't present (different screen, first paint, etc.) fall
// back to a normal full render so the UI never goes stale.
function updateClockDisplaySurgically() {
  const clockEl = document.getElementById('match-clock');
  const timerFillEl = document.getElementById('turn-timer-fill');
  const timerLabelEl = document.getElementById('turn-timer-label');

  // Update overtime-choice countdown surgically
  const overtimeCountdownEl = document.getElementById('overtime-countdown');
  if (overtimeCountdownEl) {
    overtimeCountdownEl.textContent = state.timer;
    return;
  }

  // Update offside timer surgically
  if (state.gamePhase === 'resolving-offside') {
    const timerLabel = document.querySelector('.turn-timer-label');
    const timerFill = document.querySelector('.turn-timer-fill');
    if (timerLabel) timerLabel.textContent = `⏳ ${state.offsideTimer}s`;
    if (timerFill) timerFill.style.width = `${Math.round((state.offsideTimer / 15) * 100)}%`;
    return;
  }

  // Update swap timer surgically
  if (state.gamePhase === 'goalkeeper-swap') {
    const swapLabel = document.getElementById('swap-timer-label');
    const swapFill = document.getElementById('swap-timer-fill');
    if (swapLabel) swapLabel.textContent = `⏳ ${state.swapTimer}s`;
    if (swapFill) swapFill.style.width = `${Math.round((state.swapTimer / 15) * 100)}%`;
    return;
  }

  if (!clockEl && !timerFillEl && !timerLabelEl) {
    // During half-time and pre-game-roll, no clock/timer elements exist in the DOM
    // but we still need to update the countdown span surgically — don't full render
    const countdownEl2 = document.getElementById('halftime-countdown') || document.getElementById('pregame-countdown');
    if (countdownEl2 && state.gameMode === 'online') {
      countdownEl2.textContent = state.timer + 's';
      return; // countdown updated surgically, no need for full render
    }
    render();
    return;
  }

  // Update countdown spans in pre-game-roll and half-time panels
  const countdownEl = document.getElementById('halftime-countdown') || document.getElementById('pregame-countdown');
  if (countdownEl && state.gameMode === 'online') {
    countdownEl.textContent = state.timer + 's';
  }

  if (clockEl) {
    if (state.targetGoals) {
      clockEl.textContent = lang === 'en' ? `🥅 First to ${state.targetGoals}` : lang === 'pt' ? `🥅 Primeiro a ${state.targetGoals}` : `🥅 Al ${state.targetGoals}`;
    } else if (state.overtimeMode === 'golden-goal') {
      clockEl.textContent = lang === 'en' ? '⚽ Golden goal' : lang === 'pt' ? '⚽ Gol de ouro' : '⚽ Gol de oro';
    } else {
      clockEl.textContent = '⏱ ' + formatClock(state.gameClock);
    }
  }

  const isTimerActive = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass'].includes(state.gamePhase)
    && state.gameMode !== 'tutorial';
  const isCountdownActive = isTimerActive ||
    (state.gameMode === 'online' && ['pre-game-roll', 'half-time'].includes(state.gamePhase));
  if (isCountdownActive && timerFillEl && timerLabelEl) {
    const maxTime = ['pre-game-roll', 'half-time'].includes(state.gamePhase) ? 30 : state.turnDuration;
    const timerPct = Math.max(0, Math.min(100, (state.timer / maxTime) * 100));
    const timerLow = state.timer <= Math.ceil(maxTime * 0.3);
    timerFillEl.style.width = timerPct + '%';
    timerFillEl.classList.toggle('low', timerLow);
    timerLabelEl.textContent = '⏳ ' + state.timer + 's';
    timerLabelEl.classList.toggle('low', timerLow);
  } else if (!isCountdownActive && (timerFillEl || timerLabelEl)) {
    // The timer row's very presence in the DOM depends on isTimerActive — if
    // that just flipped, a surgical text update can't add/remove the row
    // itself, so fall back to a full render to keep the markup correct.
    render();
  }
}

// Compares the previous and new game log / phase to decide which sound effect (if any) fits
// this particular state transition. Centralized here so it covers human clicks, the bot, and
// the tutorial uniformly, without scattering sound calls through the pure reducer functions.
function playSoundsForTransition(prev, next) {
  checkContextTooltips(prev, next);
  checkAchievements(prev, next);
  if (prev === next) return;
  const newEntries = next.gameLog && prev.gameLog && next.gameLog.length > prev.gameLog.length
    ? next.gameLog.slice(prev.gameLog.length)
    : [];
  const lastType = newEntries.length ? newEntries[newEntries.length - 1].actionType : null;

  if (lastType === 'goal') { sounds.goal(); showGoalAnimation(next); return; }
  if (lastType === 'kick' || lastType === 'shot-on-goal' || lastType === 'drag' || lastType === 'lofted-drag') { sounds.kick(); return; }
  if (lastType === 'move') { sounds.move(); return; }

  if (prev.gamePhase !== 'half-time' && next.gamePhase === 'half-time') { sounds.whistleShort(); return; }
  if (prev.gamePhase !== 'game-over' && next.gamePhase === 'game-over') {
    sounds.whistleLong();
    // Track match completion
    trackEvent('match_complete', {
      game_mode: next.gameMode,
      score_home: next.score.home,
      score_away: next.score.away,
      half_duration: next.halfDurationMinutes,
    });
    if (next.gameMode === 'online' && onlineMyTeam && onlineOpponentUid && !onlineMatchResultSaved) {
      onlineMatchResultSaved = true;
      const myScore = next.score[onlineMyTeam];
      const theirTeam = onlineMyTeam === 'home' ? 'away' : 'home';
      const result = myScore > next.score[theirTeam] ? 'win' : myScore < next.score[theirTeam] ? 'loss' : 'draw';
      trackEvent('online_match_complete', { result });
      updateEloAfterMatch(result, onlineOpponentUid).catch(err =>
        console.warn('[Hexagol ELO] Update failed:', err)
      );
    }
    return;
  }
  if (prev.score.home !== next.score.home || prev.score.away !== next.score.away) {
    trackEvent('goal_scored', { game_mode: next.gameMode });
  }
  if (prev.gamePhase !== 'turn-over' && next.gamePhase === 'turn-over') { sounds.turnTimeout(); return; }
}

function maybeTriggerBot() {
  const s = state;
  if (s.gameMode !== 'vs-ai' || !s.aiTeam) return;
  if (s.isAiThinking) return;
  if (s.gamePhase === 'pre-game-roll') {
    const aiNeedsToRoll = (s.aiTeam === 'home' && s.homeRoll === null) || (s.aiTeam === 'away' && s.awayRoll === null);
    if (aiNeedsToRoll) setTimeout(() => doPreGameRoll(s.aiTeam), 500);
    return;
  }
  if (s.currentPlayer !== s.aiTeam) return;
  if (!['rolling', 'turn-over', 'goalkeeper-swap', 'resolving-offside', 'chain-pass', 'selecting-piece', 'moving-piece'].includes(s.gamePhase)) return;
  setTimeout(() => runBotTurn(), 450);
}

/* ---------------- Core turn-advance logic (ported from phase-reducers.ts) ---------------- */

function advanceToNextTurn(s, opts) {
  opts = opts || {};
  const { currentPlayer, players, ballPosition } = s;

  if (!opts.skipSwapCheck) {
    const gk = players.find(p => p.team === currentPlayer && p.isGoalkeeper);
    if (gk && !isWithinGoalkeeperArea(gk.position, currentPlayer)) {
      const teammatesInArea = players.filter(p => p.team === currentPlayer && !p.isGoalkeeper && isWithinGoalkeeperArea(p.position, currentPlayer));
      if (teammatesInArea.length > 0) {
        const news = {
          ...s, gamePhase: 'goalkeeper-swap', swapCandidates: [gk.id, ...teammatesInArea.map(p => p.id)],
          message: lang === 'en' ? 'Goalkeeper is out of the area. Choose a player to swap, or end the turn.' : lang === 'pt' ? 'O goleiro saiu da área. Escolha um jogador para trocar ou encerre o turno.' : 'El arquero está fuera del área. Elige un jugador para cambiar, o finaliza el turno.',
          turnStartState: null, swapTimer: GOALKEEPER_SWAP_DURATION,
          ...freshActionState(), isKickoffTurn: false, assistProviderId: null,
        };
        return logAction(news, lang === 'en' ? 'Goalkeeper is out of the area. You can swap them.' : lang === 'pt' ? 'O goleiro saiu da área. Você pode trocá-lo.' : 'El arquero está fuera del área. Puedes intercambiarlo.', 'game-event');
      }
    }
  }

  const nextPlayer = currentPlayer === 'home' ? 'away' : 'home';
  const teamToKickOffName = getTeamName(s, nextPlayer);

  const lastTouchPlayer = players.find(p => p.id === s.lastPlayerToTouchBallId);
  if (!lastTouchPlayer || lastTouchPlayer.team === currentPlayer) {
    const offsideCheckBall = s.turnStartState ? s.turnStartState.ballPosition : ballPosition;
    const { offsidePlayers, offsideLineY } = checkForOffside(players, currentPlayer, offsideCheckBall, s.lastPlayerToTouchBallId);
    if (offsidePlayers.length > 0 && offsideLineY !== null) {
      const nextStats = { ...s.stats, offsides: { ...s.stats.offsides, [currentPlayer]: s.stats.offsides[currentPlayer] + 1 } };
      const msg = lang === 'en' ? `Offside! ${teamToKickOffName}, move the highlighted players.` : lang === 'pt' ? `Impedimento! ${teamToKickOffName}, mova os jogadores destacados.` : `¡Fuera de juego! ${teamToKickOffName}, debes mover a los jugadores resaltados.`;
      const news = {
        ...s, stats: nextStats, currentPlayer: nextPlayer, gamePhase: 'resolving-offside', diceValue: null,
        ...freshActionState(), validOffsideMoves: [], offsidePlayerIds: offsidePlayers.map(p => p.id),
        offsideContext: { ballPosition: offsideCheckBall, offsideLineY }, swapCandidates: [],
        offsideTimer: OFFSIDE_RESOLUTION_DURATION, timer: s.turnDuration, toastToShow: null,
        turnStartState: null, isKickoffTurn: false, assistProviderId: null,
      };
      return logAction(news, msg, 'offside', currentPlayer);
    }
  }

  if (isBallTotallyBlocked(ballPosition, players, nextPlayer)) {
    const teamCausingBlockName = getTeamName(s, currentPlayer);
    const playersForKickoff = movePlayersForKickoff(getInitialPlayers(), nextPlayer);
    const msg = lang === 'en' ? `Ball blocked! ${teamToKickOffName} kicks off. Roll the dice.` : lang === 'pt' ? `Bola bloqueada! ${teamToKickOffName} sai com a bola. Lance o dado.` : `¡Balón bloqueado! Saca ${teamToKickOffName}. Lanza el dado.`;
    const news = {
      ...s, players: playersForKickoff, ballPosition: { ...INITIAL_BALL_POSITION }, currentPlayer: nextPlayer,
      gamePhase: 'rolling', diceValue: null, ...freshActionState(),
      lastPlayerToTouchBallId: null, offsidePlayerIds: [], validOffsideMoves: [], swapCandidates: [],
      timer: s.turnDuration, toastToShow: { title: lang === 'en' ? 'Ball blocked!' : lang === 'pt' ? 'Bola bloqueada!' : '¡Juego trabado!', description: lang === 'en' ? `${teamCausingBlockName} has blocked the ball. Resetting kickoff.` : lang === 'pt' ? `${teamCausingBlockName} bloqueou a bola. Reiniciando o saque.` : `${teamCausingBlockName} ha bloqueado el balón. Se reinicia el saque.` },
      turnStartState: null, isKickoffTurn: true, assistProviderId: null,
    };
    return logAction(news, msg, 'game-event', currentPlayer);
  }

  const nextStats = { ...s.stats, possession: { ...s.stats.possession, [nextPlayer]: s.stats.possession[nextPlayer] + 1 } };
  // Override: possession counts when the next player has a piece adjacent to the ball
  const ballPos = s.ballPosition;
  if (ballPos) {
    const homeAdj = s.players.some(p => p.team === 'home' && isAdjacent(p.position, ballPos));
    const awayAdj = s.players.some(p => p.team === 'away' && isAdjacent(p.position, ballPos));
    if (homeAdj || awayAdj) {
      nextStats.possession = {
        home: s.stats.possession.home + (homeAdj ? 1 : 0),
        away: s.stats.possession.away + (awayAdj ? 1 : 0),
      };
    }
  }
  const baseMsg = lang === 'en' ? `${teamToKickOffName}'s turn. Roll the dice.` : lang === 'pt' ? `Turno de ${teamToKickOffName}. Lance o dado.` : `Turno de ${teamToKickOffName}. Lanza el dado.`;
  const news = {
    ...s, stats: nextStats, currentPlayer: nextPlayer, gamePhase: 'rolling', diceValue: null,
    ...freshActionState(), offsidePlayerIds: [], validOffsideMoves: [], offsideContext: null,
    swapCandidates: [], swapTimer: GOALKEEPER_SWAP_DURATION, timer: s.turnDuration,
    turnCount: s.turnCount + 1, toastToShow: null, turnStartState: null, isKickoffTurn: false, assistProviderId: null,
    prevTurnSnapshot: s.prevTurnSnapshot, // preserved until next dice roll
  };
  return logAction(news, baseMsg, 'turn-start', nextPlayer);
}

function handleGoal(s) {
  const scoringTeam = s.currentPlayer;
  const scorerId = s.lastPlayerToTouchBallId;
  const assisterId = s.assistProviderId;
  const safeMatchStats = s.matchStats || { goals: {}, assists: {} };
  const newMatchStats = { goals: { ...(safeMatchStats.goals || {}) }, assists: { ...(safeMatchStats.assists || {}) } };
  if (scorerId) newMatchStats.goals[scorerId] = (newMatchStats.goals[scorerId] || 0) + 1;
  if (assisterId) newMatchStats.assists[assisterId] = (newMatchStats.assists[assisterId] || 0) + 1;

  const concederName = getTeamName(s, scoringTeam === 'home' ? 'away' : 'home');
  const scorerName = getTeamName(s, scoringTeam);
  const newScore = { ...s.score, [scoringTeam]: s.score[scoringTeam] + 1 };

  // Check if match ends: targetGoals mode or golden-goal overtime
  const matchEnds = (s.targetGoals && newScore[scoringTeam] >= s.targetGoals) ||
                    (s.overtimeMode === 'golden-goal');

  if (matchEnds) {
    const winMsg = lang === 'en' ? `GOAL! ${scorerName} wins the match!` : lang === 'pt' ? `GOL! ${scorerName} venceu a partida!` : `¡GOL! ¡${scorerName} gana el partido!`;
    // First show the goal normally (with toast and board reset), then end match after a delay
    const newPlayers = movePlayersForKickoff(getInitialPlayers(), scoringTeam === 'home' ? 'away' : 'home');
    const goalState = logAction({
      ...s, score: newScore, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION },
      currentPlayer: scoringTeam === 'home' ? 'away' : 'home', diceValue: null,
      ...freshActionState(), lastPlayerToTouchBallId: null, swapCandidates: [], timer: s.turnDuration,
      turnStartState: null, lastAction: null, matchStats: newMatchStats, assistProviderId: null,
      gamePhase: 'rolling',
      toastToShow: { title: lang === 'en' ? '⚽ MATCH OVER!' : lang === 'pt' ? '⚽ FIM DE JOGO!' : '⚽ ¡FIN DEL PARTIDO!', description: lang === 'en' ? `${scorerName} wins!` : lang === 'pt' ? `${scorerName} venceu!` : `¡${scorerName} gana!` },
    }, winMsg, 'goal', scoringTeam);
    // Delay game-over so the goal toast and board reset are visible
    setTimeout(() => {
      setState(s2 => s2.gamePhase === 'rolling' && s2.score[scoringTeam] >= (s2.targetGoals || 1)
        ? { ...s2, gamePhase: 'game-over', isClockRunning: false }
        : s2);
    }, 1800);
    return goalState;
  }

  const newPlayers = movePlayersForKickoff(getInitialPlayers(), scoringTeam === 'home' ? 'away' : 'home');
  const msg = lang === 'en' ? `GOAL by ${scorerName}! ${concederName} kicks off.` : lang === 'pt' ? `GOL de ${scorerName}! ${concederName} sai com a bola.` : `¡GOL de ${scorerName}! Repone ${concederName}. Lanza el dado.`;
  const news = {
    ...s, score: newScore, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION },
    currentPlayer: scoringTeam === 'home' ? 'away' : 'home', gamePhase: 'rolling', diceValue: null,
    ...freshActionState(), lastPlayerToTouchBallId: null, swapCandidates: [], timer: s.turnDuration,
    turnStartState: null, lastAction: null, isKickoffTurn: true, matchStats: newMatchStats, assistProviderId: null,
    toastToShow: { title: lang === 'en' ? '⚽ GOAAAL!' : lang === 'pt' ? '⚽ GOOOLLL!' : '¡GOOOOL!', description: lang === 'en' ? `${scorerName} scored!` : lang === 'pt' ? `${scorerName} marcou!` : `${scorerName} ha marcado.` },
  };
  return logAction(news, msg, 'goal', scoringTeam);
}

function handleOwnGoal(s) {

  const scoringTeam = team === 'home' ? 'away' : 'home';
  const concederName = getTeamName(s, team);
  const scorerName = getTeamName(s, scoringTeam);

  const matchEnds = (s.targetGoals && newScore[scoringTeam] >= s.targetGoals) ||
                    (s.overtimeMode === 'golden-goal');

  const newPlayers = movePlayersForKickoff(getInitialPlayers(), team);
  const msg = lang === 'en' ? `OWN GOAL by ${concederName}!` : lang === 'pt' ? `GOL CONTRA de ${concederName}!` : `¡AUTOGOL de ${concederName}! Repone ${concederName}.`;

  if (matchEnds) {
    const winMsg = lang === 'en' ? `OWN GOAL! ${scorerName} wins the match!` : lang === 'pt' ? `GOL CONTRA! ${scorerName} venceu a partida!` : `¡AUTOGOL! ¡${scorerName} gana el partido!`;
    const goalState = logAction({
      ...s, score: newScore, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION },
      currentPlayer: team, diceValue: null, ...freshActionState(),
      lastPlayerToTouchBallId: null, swapCandidates: [], timer: s.turnDuration,
      turnStartState: null, lastAction: null, isKickoffTurn: true, assistProviderId: null,
      gamePhase: 'rolling',
      toastToShow: { title: lang === 'en' ? '⚽ MATCH OVER!' : lang === 'pt' ? '⚽ FIM DE JOGO!' : '⚽ ¡FIN DEL PARTIDO!', description: lang === 'en' ? `${scorerName} wins!` : lang === 'pt' ? `${scorerName} venceu!` : `¡${scorerName} gana!` },
    }, winMsg, 'goal', scoringTeam);
    setTimeout(() => {
      setState(s2 => s2.gamePhase === 'rolling' && s2.score[scoringTeam] >= (s2.targetGoals || 1)
        ? { ...s2, gamePhase: 'game-over', isClockRunning: false }
        : s2);
    }, 1800);
    return goalState;
  }

  const news = {
    ...s, score: newScore, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION },
    currentPlayer: team, gamePhase: 'rolling', diceValue: null, ...freshActionState(),
    lastPlayerToTouchBallId: null, swapCandidates: [], timer: s.turnDuration,
    turnStartState: null, lastAction: null, isKickoffTurn: true, assistProviderId: null,
    toastToShow: { title: lang === 'en' ? '⚽ OWN GOAL!' : lang === 'pt' ? '⚽ GOL CONTRA!' : '¡AUTOGOL!', description: lang === 'en' ? `${concederName} scored an own goal.` : lang === 'pt' ? `${concederName} fez um gol contra.` : `${concederName} ha marcado en propia puerta.` },
  };
  return logAction(news, msg, 'goal', scoringTeam);
}

function handleEndHalfOrMatch(s) {
  // Golden goal mode — match never ends on time, only on a goal
  if (s.overtimeMode === 'golden-goal') {
    return s; // keep playing, handleGoal will end it
  }

  if (s.half === 1) {
    const halfTimeState = { ...logAction(s, t('msg.halftime'), 'game-event'), gamePhase: 'half-time', isClockRunning: false, prevTurnSnapshot: null };
    if (s.gameMode === 'online') halfTimeStartedAt = Date.now();
    return s.gameMode === 'online' ? { ...halfTimeState, timer: 30 } : halfTimeState;
  }

  // End of 2nd half (or extra time)
  const isDraw = s.score.home === s.score.away;
  const isExtraTime = s.overtimeMode === 'extra-time';

  // If draw at end of regular time (not already in extra time) — offer overtime choice
  if (isDraw && !isExtraTime && !s.targetGoals) {
    const msg = lang === 'en' ? "It's a draw! Choose how to continue." : '¡Empate! Elegí cómo continuar.';
    if (s.gameMode === 'online') overtimeChoiceStartedAt = Date.now();
    return { ...logAction(s, msg, 'game-event'), gamePhase: 'overtime-choice', isClockRunning: false };
  }

  // Regular end
  const homeName = getTeamName(s, 'home'), awayName = getTeamName(s, 'away');
  let msg = lang === 'en' ? "Match over! " : '¡Fin del partido! ';
  if (s.score.home > s.score.away) msg += lang === 'en' ? `${homeName} wins.` : lang === 'pt' ? `${homeName} venceu.` : `${homeName} ha ganado.`;
  else if (s.score.away > s.score.home) msg += lang === 'en' ? `${awayName} wins.` : lang === 'pt' ? `${awayName} venceu.` : `${awayName} ha ganado.`;
  else msg += lang === 'en' ? 'The result is a draw.' : lang === 'pt' ? 'O resultado é empate.' : 'El resultado es un empate.';
  return { ...logAction(s, msg, 'game-event'), gamePhase: 'game-over', isClockRunning: false };
}

/* ---------------- AI bot (uses the real rules engine — same validators a human sees) ---------------- */

function goalDistanceScore(pos, team) {
  // Lower is better: vertical distance to the opponent's goal line, centered on the goal mouth.
  const goalY = team === 'home' ? 0 : BOARD_HEIGHT - 1;
  const centerX = 9;
  return Math.abs(pos.y - goalY) + Math.abs(pos.x - centerX) * 0.25;
}

function isDirectGoalTarget(pos, team) {
  const goal = team === 'home' ? AWAY_GOAL_POSITIONS : HOME_GOAL_POSITIONS;
  return goal.some(g => g.x === pos.x && g.y === pos.y);
}

// Returns true if the bot has a clear unobstructed line from ballPos to any
// opponent goal square, AND at least one bot player is adjacent to ballPos.
// This is the "guaranteed goal next turn if rival rolls 0" check.
function botHasDirectShotFromPos(ballPos, botTeam, allPlayers) {
  if (!ballPos) return false;
  const oppGoal = botTeam === 'home' ? AWAY_GOAL_POSITIONS : HOME_GOAL_POSITIONS;
  const botAdjacentToBall = allPlayers.some(p =>
    p.team === botTeam && isAdjacent(p.position, ballPos));
  if (!botAdjacentToBall) return false;

  return oppGoal.some(g => {
    const dx = Math.sign(g.x - ballPos.x);
    const dy = Math.sign(g.y - ballPos.y);
    if (dx === 0 && dy === 0) return false;
    // Must be a straight line
    if (g.x !== ballPos.x && g.y !== ballPos.y &&
        Math.abs(g.x - ballPos.x) !== Math.abs(g.y - ballPos.y)) return false;
    let cx = ballPos.x + dx, cy = ballPos.y + dy;
    while (cx !== g.x || cy !== g.y) {
      if (allPlayers.some(p => p.position.x === cx && p.position.y === cy)) return false;
      cx += dx; cy += dy;
    }
    return true;
  });
}

// Returns squares that the OPPONENT could reach to drag the ball from,
// given any possible dice value (1-6). Used to detect drag threats so the
// bot doesn't naively leave its ball exposed to a rival in the same line.
function findDragThreatPlayers(s) {
  if (!s.ballPosition) return [];
  const defendingTeam = s.currentPlayer;
  const attackingTeam = defendingTeam === 'home' ? 'away' : 'home';
  const ball = s.ballPosition;
  const directions = [
    { dx: 0, dy: -1 }, { dx: 1, dy: -1 }, { dx: 1, dy: 0 }, { dx: 1, dy: 1 },
    { dx: 0, dy: 1 }, { dx: -1, dy: 1 }, { dx: -1, dy: 0 }, { dx: -1, dy: -1 },
  ];
  const threatPlayers = [];
  directions.forEach(dir => {
    // Walk along each direction from the ball — if an attacker is in that line
    // with no blocker between them and the ball, they can drag it with the right dice.
    for (let i = 1; i <= 6; i++) {
      const pos = { x: ball.x + dir.dx * i, y: ball.y + dir.dy * i };
      if (pos.x < 0 || pos.x >= BOARD_WIDTH || pos.y < 0 || pos.y >= BOARD_HEIGHT) break;
      const player = s.players.find(p => p.position.x === pos.x && p.position.y === pos.y);
      if (player) {
        if (player.team === attackingTeam) threatPlayers.push(player);
        break; // blocked — stop this direction
      }
    }
  });
  return threatPlayers;
}

// Finds the squares an opponent attacker could shoot from RIGHT NOW for a clear, unobstructed
// shot on our goal — i.e. an opponent sits next to the ball, and the straight line from the ball
// to our goal mouth has no other piece blocking it.
function findShotThreatSquares(s) {
  if (!s.ballPosition) return [];
  const defendingTeam = s.currentPlayer;
  const attackingTeam = defendingTeam === 'home' ? 'away' : 'home';
  const ownGoal = defendingTeam === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;

  const attackerAdjacent = s.players.some(p => p.team === attackingTeam && isAdjacent(p.position, s.ballPosition));
  if (!attackerAdjacent) return [];

  const directions = [
    { dx: 0, dy: -1 }, { dx: 1, dy: -1 }, { dx: 1, dy: 0 }, { dx: 1, dy: 1 },
    { dx: 0, dy: 1 }, { dx: -1, dy: 1 }, { dx: -1, dy: 0 }, { dx: -1, dy: -1 },
  ];
  const dangerSquares = [];
  directions.forEach(dir => {
    const path = [];
    let blocked = false;
    for (let i = 1; i <= Math.max(BOARD_WIDTH, BOARD_HEIGHT); i++) {
      const pos = { x: s.ballPosition.x + dir.dx * i, y: s.ballPosition.y + dir.dy * i };
      if (isBallPathOutOfBounds(pos)) break;
      const occupied = s.players.some(p => p.position.x === pos.x && p.position.y === pos.y);
      if (occupied) { blocked = true; break; }
      path.push(pos);
      if (ownGoal.some(g => g.x === pos.x && g.y === pos.y)) break;
    }
    if (!blocked && path.length && ownGoal.some(g => g.x === path[path.length - 1].x && g.y === path[path.length - 1].y)) {
      dangerSquares.push(...path);
    }
  });
  return dangerSquares;
}

// Returns true if the human player has a direct shot at the bot's goal from the current ball position.
function humanHasDirectShotThreat(s) {
  if (!s.ballPosition) return false;
  const botTeam = s.currentPlayer;
  const humanTeam = botTeam === 'home' ? 'away' : 'home';
  const ownGoal = botTeam === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;
  return s.players.some(p => {
    if (p.team !== humanTeam || !isAdjacent(p.position, s.ballPosition)) return false;
    // Check each goal position for a clear line from ball
    return ownGoal.some(g => {
      const dx = Math.sign(g.x - s.ballPosition.x);
      const dy = Math.sign(g.y - s.ballPosition.y);
      if (dx === 0 && dy === 0) return false;
      // Must be a straight line (diagonal, horizontal, or vertical)
      if (g.x !== s.ballPosition.x && g.y !== s.ballPosition.y &&
          Math.abs(g.x - s.ballPosition.x) !== Math.abs(g.y - s.ballPosition.y)) return false;
      let cx = s.ballPosition.x + dx, cy = s.ballPosition.y + dy;
      while (cx !== g.x || cy !== g.y) {
        if (s.players.some(pl => pl.position.x === cx && pl.position.y === cy)) return false;
        cx += dx; cy += dy;
      }
      return true;
    });
  });
}

// Collects every legal ball-action this player could take (kick/drag/lofted variants),
// tagged with the resulting ball position, exactly like handlePlayerSelection computes for a human.
function collectBallActionsForPlayer(s, player) {
  const actions = [];
  if (!s.diceValue || !s.ballPosition) return actions;

  // Gap crítico 2: arquero dentro de su área usa dado×2 (igual que las reglas del juego)
  const effectiveDice = (player.isGoalkeeper &&
    isWithinGoalkeeperArea(player.position, player.team) &&
    isWithinGoalkeeperArea(s.ballPosition, player.team))
    ? s.diceValue * 2
    : s.diceValue;

  if (isAdjacent(player.position, s.ballPosition)) {
    const kickRes = getValidKickTargets(player, s.ballPosition, effectiveDice, s.players);
    kickRes.validTargets.forEach(p => actions.push({ kind: 'kick', target: p }));
    const lofted = getValidLoftedPassTargets(player, s.ballPosition, effectiveDice, s.players);
    const kickSet = new Set(kickRes.validTargets.map(p => `${p.x},${p.y}`));
    lofted.filter(p => !kickSet.has(`${p.x},${p.y}`)).forEach(p => actions.push({ kind: 'lofted-pass', target: p }));
  } else {
    const dragRes = getValidDragTargets(player, effectiveDice, s.players, s.ballPosition);
    dragRes.validTargets.forEach(p => actions.push({ kind: 'drag', target: p }));
    const loftedDragRes = getValidLoftedDragTargets(player, effectiveDice, s.players, s.ballPosition);
    loftedDragRes.validTargets.forEach(p => actions.push({ kind: 'lofted-drag', target: p }));
  }
  return actions;
}

// ── Fixed player roles by jersey number ─────────────────────────────────────
// Bug 1 fix: roles are fixed per playerNumber, not dynamic by current position.
// This prevents attackers from being classified as defenders just because they
// happened to be near their own goal on a particular turn.
function getPlayerRole(player) {
  if (player.isGoalkeeper) return 'gk';
  const n = player.playerNumber;
  if (n <= 4) return 'def';   // 2,3,4,5 = defenders
  if (n <= 8) return 'mid';   // 6,7,8 = midfielders
  return 'att';               // 9,10,11 = attackers
}

// Bug 5 fix: tactical possession — ball is "ours" if we have a player adjacent,
// even if lastPlayerToTouchBallId belongs to the opponent.
function teamHasTacticalPossession(s, team) {
  if (!s.ballPosition) return false;
  const touched = s.lastPlayerToTouchBallId != null
    ? s.players.find(p => p.id === s.lastPlayerToTouchBallId)
    : null;
  if (touched && touched.team === team) return true;
  // Even if opponent touched it last, if we have someone adjacent we contest it
  return s.players.some(p => p.team === team && isAdjacent(p.position, s.ballPosition));
}

// Bug 4 fix: cap total score bonuses so no single factor completely dominates.
// Returns a score clamped to [-500, 995] to prevent extreme outliers.
// ═══════════════════════════════════════════════════════════
// MÓDULO: AI — Motor de inteligencia artificial
// ═══════════════════════════════════════════════════════════
function clampScore(score) {
  return Math.max(-500, Math.min(995, score));
}

function scoreBallAction(s, player, action) {
  const team = player.team;
  const oppTeam = team === 'home' ? 'away' : 'home';
  const ownGoal = team === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;
  let score = 0;

  // ── 1. Direct goal ───────────────────────────────────────────────────────
  if (isDirectGoalTarget(action.target, team)) return 1000;

  // ── Never own goal ───────────────────────────────────────────────────────
  if (ownGoal.some(g => g.x === action.target.x && g.y === action.target.y)) return -9999;

  // ── 2. Advancing toward opponent goal ────────────────────────────────────
  const distGainToOppGoal = goalDistanceScore(s.ballPosition, team) - goalDistanceScore(action.target, team);
  score += distGainToOppGoal * 20;

  // ── 2b. Direct shot setup ────────────────────────────────────────────────
  const ballFarFromOwnGoal = !ownGoal.some(g =>
    Math.abs(g.x - s.ballPosition.x) + Math.abs(g.y - s.ballPosition.y) <= 6);
  if (ballFarFromOwnGoal) {
    const simulatedPlayers = (action.kind === 'drag' || action.kind === 'lofted-drag')
      ? s.players.map(p => p.id === player.id ? { ...p, position: action.target } : p)
      : s.players;
    if (botHasDirectShotFromPos(action.target, team, simulatedPlayers)) {
      score += 350;
    }
  }

  // ── 3. Chain pass — proportional bonus (calibration 2) ───────────────────
  const chainReceiver = s.players.find(p =>
    p.id !== player.id && p.team === team &&
    p.position.x === action.target.x && p.position.y === action.target.y);
  if (chainReceiver) {
    const advance = goalDistanceScore(player.position, team) - goalDistanceScore(chainReceiver.position, team);
    score += Math.max(20, 50 + advance * 12);
    const chainPotential = evaluateChainSequence(s, action.target, team, 0, 3);
    score += chainPotential * 0.6;
  }

  const nearbyTeammates = s.players.filter(p =>
    p.team === team && p.id !== player.id && isAdjacent(p.position, action.target));
  nearbyTeammates.forEach(p => {
    const advance = goalDistanceScore(player.position, team) - goalDistanceScore(p.position, team);
    score += Math.max(8, 15 + advance * 5);
  });

  // ── 4. Possession quality ─────────────────────────────────────────────────
  const playerEndsAdjacentToTarget = (action.kind === 'drag' || action.kind === 'lofted-drag')
    ? true : isAdjacent(player.position, action.target);
  const teammateAdjacentToTarget = s.players.some(p =>
    p.team === team && p.id !== player.id && isAdjacent(p.position, action.target));
  const weMaintainControl = playerEndsAdjacentToTarget || teammateAdjacentToTarget;
  if (weMaintainControl) {
    score += (distGainToOppGoal <= 0 && !chainReceiver) ? 15 : 30;
  }

  // ── 5. Drag escape ───────────────────────────────────────────────────────
  if (action.kind === 'drag' || action.kind === 'lofted-drag') {
    const rivalWasAdj = s.players.some(p => p.team === oppTeam && isAdjacent(p.position, s.ballPosition));
    const rivalStillAdj = s.players.some(p => p.team === oppTeam && isAdjacent(p.position, action.target));
    if (rivalWasAdj && !rivalStillAdj) score += 35;
  }

  // ── 6. Defensive clearance ───────────────────────────────────────────────
  const ballNearOwnGoal = ownGoal.some(g =>
    Math.abs(g.x - s.ballPosition.x) + Math.abs(g.y - s.ballPosition.y) <= 4);
  if (ballNearOwnGoal) {
    const distBefore = Math.min(...ownGoal.map(g =>
      Math.abs(g.x - s.ballPosition.x) + Math.abs(g.y - s.ballPosition.y)));
    const distAfter = Math.min(...ownGoal.map(g =>
      Math.abs(g.x - action.target.x) + Math.abs(g.y - action.target.y)));
    score += (distAfter - distBefore) * 18;
  }

  // ── 7. Contest situation ─────────────────────────────────────────────────
  const rivalsAdjacentToBall = s.players.filter(p =>
    p.team === oppTeam && isAdjacent(p.position, s.ballPosition));
  if (rivalsAdjacentToBall.length > 0) {
    const rivalsStillAdj = s.players.filter(p =>
      p.team === oppTeam && isAdjacent(p.position, action.target)).length;
    if (weMaintainControl && rivalsStillAdj === 0) score += 55;
    else if (!weMaintainControl && rivalsStillAdj > 0) score -= 40;
    else if (!weMaintainControl && rivalsStillAdj === 0) score += 15;
    else if (weMaintainControl && rivalsStillAdj > 0) score += 5;
  }

  // ── 8. Threat detection — proportional (calibration 1) ───────────────────
  const rivalsAdjacentToTarget = s.players.filter(p =>
    p.team === oppTeam && isAdjacent(p.position, action.target));
  if (rivalsAdjacentToTarget.length > 0) {
    score -= 20;
    rivalsAdjacentToTarget.forEach(opp => {
      ownGoal.forEach(g => {
        const dx = Math.sign(g.x - action.target.x);
        const dy = Math.sign(g.y - action.target.y);
        if (dx === 0 && dy === 0) return;
        if (g.x !== action.target.x && g.y !== action.target.y &&
            Math.abs(g.x - action.target.x) !== Math.abs(g.y - action.target.y)) return;
        let cx = action.target.x + dx, cy = action.target.y + dy;
        let clear = true, stepsToGoal = 0;
        while ((cx !== g.x || cy !== g.y) && clear) {
          if (s.players.some(p => p.position.x === cx && p.position.y === cy)) clear = false;
          cx += dx; cy += dy; stepsToGoal++;
        }
        if (clear) {
          const distanceFactor = Math.max(0.2, 1 - (stepsToGoal - 1) / 6);
          score -= Math.round(100 * distanceFactor);
        }
      });
      const chainable = s.players.some(p2 =>
        p2.team === oppTeam && p2.id !== opp.id && isAdjacent(p2.position, action.target));
      if (chainable) score -= 25;
    });
  }

  // Drag threats — proportional to proximity
  const dirs8 = [{dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},
    {dx:0,dy:1},{dx:-1,dy:1},{dx:-1,dy:0},{dx:-1,dy:-1}];
  dirs8.forEach(dir => {
    for (let i = 1; i <= 6; i++) {
      const px = action.target.x + dir.dx * i, py = action.target.y + dir.dy * i;
      if (px < 0 || px >= BOARD_WIDTH || py < 0 || py >= BOARD_HEIGHT) break;
      const pl = s.players.find(p => p.position.x === px && p.position.y === py);
      if (pl) {
        if (pl.team === oppTeam) score -= Math.round(40 * (1 - (i - 1) / 6));
        break;
      }
    }
  });

  if (ownGoal.some(g => Math.abs(g.x - action.target.x) <= 2 && Math.abs(g.y - action.target.y) <= 2))
    score -= 60;

  if (action.kind === 'kick') score += 5;
  return clampScore(score);
}

function scoreMoveAction(s, player, target) {
  const team = player.team;
  const oppTeam = team === 'home' ? 'away' : 'home';
  const ownGoal = team === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;
  const oppGoal = team === 'home' ? AWAY_GOAL_POSITIONS : HOME_GOAL_POSITIONS;
  let score = 0;

  const ball = s.ballPosition;

  // Bug 1 fix: fixed roles by jersey number
  const role = getPlayerRole(player);
  const isDefensive = role === 'gk' || role === 'def';
  const isAttacking = role === 'att';

  // Bug 5 fix: tactical possession — we "have" the ball if adjacent, regardless of last touch
  const weHaveTacticalPossession = teamHasTacticalPossession(s, team);
  const oppHasTacticalPossession = teamHasTacticalPossession(s, oppTeam);
  const weHavePossession = s.lastPlayerToTouchBallId != null &&
    s.players.find(p => p.id === s.lastPlayerToTouchBallId)?.team === team;
  const oppHasPossession = s.lastPlayerToTouchBallId != null &&
    s.players.find(p => p.id === s.lastPlayerToTouchBallId)?.team === oppTeam;

  // ── Goalkeeper discipline ─────────────────────────────────────────────────
  if (player.isGoalkeeper) {
    const ownGoalY = team === 'home' ? BOARD_HEIGHT - 1 : 0;
    const inOwnArea = Math.abs(player.position.y - ownGoalY) <= 3;
    const targetInOwnArea = Math.abs(target.y - ownGoalY) <= 3;
    const wouldBeAdjacentBall = ball && isAdjacent(target, ball);
    if (ball && !targetInOwnArea && wouldBeAdjacentBall) {
      const otherCanReach = s.players.some(p => {
        if (p.team !== team || p.id === player.id || p.isGoalkeeper) return false;
        return Math.max(Math.abs(p.position.x - ball.x), Math.abs(p.position.y - ball.y)) <= (s.diceValue || 0);
      });
      if (otherCanReach) score -= 120;
    }
    if (inOwnArea && !targetInOwnArea && !wouldBeAdjacentBall) score -= 100;
    if (!inOwnArea && !targetInOwnArea && !wouldBeAdjacentBall) score -= 150;
    if (!inOwnArea && targetInOwnArea) score += 50;
  }

  // ── Ball adjacency ────────────────────────────────────────────────────────
  const currentlyAdjacent = ball && isAdjacent(player.position, ball);
  const wouldBeAdjacent = ball && isAdjacent(target, ball);
  if (wouldBeAdjacent && !currentlyAdjacent) score += 20;
  if (wouldBeAdjacent) score += 8;

  // ── Direct shot setup via positioning ────────────────────────────────────
  if (wouldBeAdjacent && ball) {
    const ballFarFromOwnGoal = !ownGoal.some(g =>
      Math.abs(g.x - ball.x) + Math.abs(g.y - ball.y) <= 6);
    if (ballFarFromOwnGoal) {
      const simPlayers = s.players.map(p => p.id === player.id ? { ...p, position: target } : p);
      if (botHasDirectShotFromPos(ball, team, simPlayers)) score += 280;
    }
  }

  // ── Attacking movement ────────────────────────────────────────────────────
  if (weHaveTacticalPossession) {
    const advance = goalDistanceScore(player.position, team) - goalDistanceScore(target, team);
    score += advance * (isAttacking ? 7 : isDefensive ? 2 : 4);

    // Support chain: get near ball carrier
    const carrier = s.lastPlayerToTouchBallId
      ? s.players.find(p => p.id === s.lastPlayerToTouchBallId && p.team === team)
      : null;
    if (carrier && carrier.id !== player.id && ball) {
      const distAfter = Math.abs(target.x - carrier.position.x) + Math.abs(target.y - carrier.position.y);
      if (distAfter === 1) score += 22;
      else if (distAfter === 2) score += 8;
    }
  }

  // ── Defensive movement ────────────────────────────────────────────────────
  if (oppHasTacticalPossession && ball) {
    const ownGoalY = team === 'home' ? BOARD_HEIGHT - 1 : 0;
    const ballDistToOwnGoal = Math.abs(ball.y - ownGoalY);
    const ballInOppHalf = team === 'home' ? ball.y < BOARD_HEIGHT * 0.5 : ball.y > BOARD_HEIGHT * 0.5;

    const distBefore = Math.abs(player.position.x - ball.x) + Math.abs(player.position.y - ball.y);
    const distAfter = Math.abs(target.x - ball.x) + Math.abs(target.y - ball.y);

    if (ballInOppHalf) {
      // Ball in opponent's half — only attackers chase, defenders hold shape
      if (isAttacking) score += (distBefore - distAfter) * 5;
      else if (isDefensive) {
        const targetDistToOwnGoal = Math.abs(target.y - ownGoalY);
        const playerDistToOwnGoal = Math.abs(player.position.y - ownGoalY);
        if (targetDistToOwnGoal > playerDistToOwnGoal + 2) score -= 30;
        if (targetDistToOwnGoal <= 6) score += 8;
      } else {
        score += (distBefore - distAfter) * 2;
      }
    } else {
      // Ball in our half — everyone defends with urgency
      const urgency = Math.max(1, Math.round(8 - ballDistToOwnGoal / 2));
      score += (distBefore - distAfter) * (isDefensive ? urgency : isAttacking ? urgency * 0.4 : urgency * 0.7);
      if (isDefensive) {
        const betweenBallAndGoal = team === 'home'
          ? target.y > ball.y && target.y < ownGoalY
          : target.y < ball.y && target.y > ownGoalY;
        if (betweenBallAndGoal) score += 12;
      }
    }

    // Bug 3 fix: only mark chain receivers if there's a REAL chain threat
    // (opponent adjacent to ball AND a receiver adjacent to them AND receiver is more advanced)
    const oppsAdj = s.players.filter(p => p.team === oppTeam && isAdjacent(p.position, ball));
    const realChainThreat = oppsAdj.some(opp =>
      s.players.some(p2 =>
        p2.team === oppTeam && p2.id !== opp.id &&
        isAdjacent(p2.position, opp.position) &&
        goalDistanceScore(p2.position, oppTeam) < goalDistanceScore(opp.position, oppTeam)
      )
    );
    if (realChainThreat) {
      const chainReceivers = s.players.filter(p =>
        p.team === oppTeam && !oppsAdj.some(o => o.id === p.id) &&
        oppsAdj.some(o => isAdjacent(o.position, p.position)) &&
        goalDistanceScore(p.position, oppTeam) < goalDistanceScore(ball, oppTeam));
      if (chainReceivers.some(r => isAdjacent(target, r.position))) score += 14;
    }
  }

  // ── Neutral ───────────────────────────────────────────────────────────────
  if (!weHaveTacticalPossession && !oppHasTacticalPossession && ball) {
    const distBefore = Math.abs(player.position.x - ball.x) + Math.abs(player.position.y - ball.y);
    const distAfter = Math.abs(target.x - ball.x) + Math.abs(target.y - ball.y);
    score += (distBefore - distAfter) * (isAttacking ? 5 : isDefensive ? 1 : 3);
  }

  // Avoid clustering
  const nearTeammates = s.players.filter(p =>
    p.team === team && p.id !== player.id &&
    Math.abs(p.position.x - target.x) <= 1 && Math.abs(p.position.y - target.y) <= 1).length;
  score -= nearTeammates * 4;

  return clampScore(score);
}

// Simulates a chain pass sequence recursively, returning the best total score
// achievable from a given ball position with available chain receivers.
// maxDepth limits recursion (3 = up to 3 chain passes in one turn).
function evaluateChainSequence(s, ballPos, chainTeam, depth, maxDepth) {
  if (depth >= maxDepth) return 0;

  const teamPlayers = s.players.filter(p => p.team === chainTeam);
  const oppTeam = chainTeam === 'home' ? 'away' : 'home';
  const ownGoalPositions = chainTeam === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;

  // Find all valid chain pass targets from this ball position
  // A chain pass can go to any adjacent player of the same team
  const chainTargets = [];
  teamPlayers.forEach(p => {
    if (!isAdjacent(p.position, ballPos)) return;
    // Check each direction for kick targets from this position
    [1,2,3,4,6].forEach(dv => {
      const kicks = getValidKickTargets(p, ballPos, dv, s.players);
      kicks.validTargets.forEach(t => {
        if (ownGoalPositions.some(g => g.x === t.x && g.y === t.y)) return; // never own goal
        if (!chainTargets.some(c => c.x === t.x && c.y === t.y)) {
          chainTargets.push(t);
        }
      });
    });
  });

  if (chainTargets.length === 0) return 0;

  let bestChainScore = 0;

  chainTargets.forEach(t => {
    // Direct goal from chain
    if (isDirectGoalTarget(t, chainTeam)) {
      bestChainScore = Math.max(bestChainScore, 800); // slightly less than first action goal
      return;
    }

    let chainScore = 0;

    // Advancing the ball toward goal
    chainScore += (goalDistanceScore(ballPos, chainTeam) - goalDistanceScore(t, chainTeam)) * 18;

    // Check if this chain pass reaches another teammate (enables further chain)
    const nextReceiver = s.players.find(p =>
      p.team === chainTeam && p.position.x === t.x && p.position.y === t.y);
    if (nextReceiver) {
      chainScore += 40; // chain continues
      // Recurse to evaluate the next chain
      const futureScore = evaluateChainSequence(s, t, chainTeam, depth + 1, maxDepth);
      chainScore += futureScore * 0.7; // discount future value slightly
    } else {
      // Lands near a teammate — good position
      const nearTeam = s.players.some(p =>
        p.team === chainTeam && isAdjacent(p.position, t));
      if (nearTeam) chainScore += 20;
    }

    // Avoid landing near opponent
    const nearOpp = s.players.some(p => p.team === oppTeam && isAdjacent(p.position, t));
    if (nearOpp) chainScore -= 20;

    bestChainScore = Math.max(bestChainScore, chainScore);
  });

  return bestChainScore;
}

// Picks the bot's full move for the current turn: { playerId, kind: 'move'|'kick'|..., target }
function pickBotMove(s) {
  const team = s.currentPlayer;
  const oppTeam = team === 'home' ? 'away' : 'home';
  const difficulty = s.aiDifficulty || 'normal';
  const myPlayers = s.players.filter(p => p.team === team);
  const candidates = [];
  const ownGoal = team === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;
  const ball = s.ballPosition;

  // Only compute danger squares when there's a real threat —
  // if the ball is in the human's half, shot threats near our goal are irrelevant
  const ballNearOwnGoal = ball && ownGoal.some(g =>
    Math.abs(g.x - ball.x) + Math.abs(g.y - ball.y) <= 8);
  const dangerSquares = (difficulty !== 'easy' && ballNearOwnGoal)
    ? findShotThreatSquares(s) : [];
  const dangerKey = new Set(dangerSquares.map(p => `${p.x},${p.y}`));

  const dragThreatPlayers = difficulty === 'easy' ? [] : findDragThreatPlayers(s);
  const dragThreatKeys = new Set(dragThreatPlayers.map(p => `${p.position.x},${p.position.y}`));

  // Detect direct shot threat
  const humanHasShot = difficulty !== 'easy' && humanHasDirectShotThreat(s);

  // Bug 3 fix: stricter chain threat — only trigger if receiver is genuinely
  // more advanced toward our goal than the ball holder
  const humanHasChainThreat = !humanHasShot && difficulty !== 'easy' && (() => {
    if (!ball) return false;
    const humanAdjacentToBall = s.players.filter(p =>
      p.team === oppTeam && isAdjacent(p.position, ball));
    if (humanAdjacentToBall.length === 0) return false;
    return humanAdjacentToBall.some(p1 =>
      s.players.some(p2 =>
        p2.team === oppTeam && p2.id !== p1.id &&
        isAdjacent(p2.position, p1.position) &&
        goalDistanceScore(p2.position, oppTeam) < goalDistanceScore(ball, oppTeam) - 1
      )
    );
  })();

  myPlayers.forEach(player => {
    const ballActions = collectBallActionsForPlayer(s, player);
    ballActions.forEach(a => {
      if (isActionOffside(player, a.target, s.players, s.ballPosition)) return;
      let score = scoreBallAction(s, player, a);
      if (humanHasShot) score += 400;
      if (humanHasChainThreat) score += 200; // moving ball breaks chain threat too

      if (s.ballPosition) {
        const directions = [
          { dx: 0, dy: -1 }, { dx: 1, dy: -1 }, { dx: 1, dy: 0 }, { dx: 1, dy: 1 },
          { dx: 0, dy: 1 }, { dx: -1, dy: 1 }, { dx: -1, dy: 0 }, { dx: -1, dy: -1 },
        ];
        const newDragThreats = directions.some(dir => {
          for (let i = 1; i <= 6; i++) {
            const pos = { x: a.target.x + dir.dx * i, y: a.target.y + dir.dy * i };
            if (pos.x < 0 || pos.x >= BOARD_WIDTH || pos.y < 0 || pos.y >= BOARD_HEIGHT) break;
            const blocker = s.players.find(p => p.position.x === pos.x && p.position.y === pos.y);
            if (blocker) {
              if (dragThreatKeys.has(`${blocker.position.x},${blocker.position.y}`)) return true;
              break;
            }
          }
          return false;
        });
        if (newDragThreats) score -= 40;
        else if (dragThreatPlayers.length > 0) score += 30;
      }

      candidates.push({ playerId: player.id, kind: a.kind, target: a.target, score });
    });

    if (s.diceValue) {
      const moves = getValidMoves(player, s.diceValue, s.players, s.ballPosition);
      moves.forEach(target => {
        let score = scoreMoveAction(s, player, target);

        const isOnDangerSquare = dangerKey.has(`${target.x},${target.y}`);
        if (isOnDangerSquare) {
          // Problem 3: prefer danger squares that ALSO bring player closer to ball
          // A move that blocks AND approaches ball is worth much more than just blocking
          let blockBonus = 200;
          if (ball) {
            const distToBallBefore = Math.abs(player.position.x - ball.x) + Math.abs(player.position.y - ball.y);
            const distToBallAfter = Math.abs(target.x - ball.x) + Math.abs(target.y - ball.y);
            const ballApproach = distToBallBefore - distToBallAfter;
            blockBonus += ballApproach * 15; // approaching ball while blocking = dual purpose
          }
          // Problem 1: goalkeeper should not leave area just to block a danger square
          // unless the ball is very close (already filtered by ballNearOwnGoal but add extra check)
          if (player.isGoalkeeper) {
            const ownGoalY = team === 'home' ? BOARD_HEIGHT - 1 : 0;
            const targetInOwnArea = Math.abs(target.y - ownGoalY) <= 3;
            if (!targetInOwnArea) blockBonus = Math.min(blockBonus, 50); // keeper stays back
          }
          score += blockBonus;
        }

        // Problem 2: bonus for moves that disrupt human chain pass setup
        if (humanHasChainThreat && ball) {
          const humanAdjacentToBall = s.players.filter(p =>
            p.team === oppTeam && isAdjacent(p.position, ball));
          const chainReceivers = s.players.filter(p =>
            p.team === oppTeam &&
            !humanAdjacentToBall.some(h => h.id === p.id) &&
            humanAdjacentToBall.some(h => isAdjacent(h.position, p.position)));
          if (chainReceivers.some(r => isAdjacent(target, r.position))) score += 80;
          if (isAdjacent(target, ball)) score += 40; // contesting the ball breaks chain
        }

        candidates.push({ playerId: player.id, kind: 'move', target, score });
      });
    }
  });

  if (candidates.length === 0) return null;
  candidates.sort((a, b) => b.score - a.score);

  if (difficulty === 'easy') {
    // Easy: always pick from relevant candidates (top half) but randomly
    // pick 2nd or 3rd best ~40% of the time to simulate mistakes
    const relevant = candidates.slice(0, Math.max(1, Math.ceil(candidates.length / 2)));
    const rand = Math.random();
    if (rand < 0.5 || relevant.length === 1) return relevant[0]; // best
    if (rand < 0.75 && relevant.length >= 2) return relevant[1]; // 2nd best
    return relevant[Math.min(2, relevant.length - 1)]; // 3rd best
  }
  if (difficulty === 'hard') return candidates[0];

  if (candidates.length > 1 && Math.random() < 0.15) return candidates[1];
  return candidates[0];
}

function pickBotChainContinuation(s) {
  const targets = s.validChainPassTargets || [];
  if (targets.length === 0) return null;
  const team = s.currentPlayer;
  const oppTeam = team === 'home' ? 'away' : 'home';

  // Key insight: if we stop the chain, the game REVERTS to turnStartState positions.
  // So we should only continue if the best chain target is BETTER than reverting.
  // The baseline is turnStartState.ballPosition (where we'd end up if we stop now).
  const startBallPos = s.turnStartState?.ballPosition || s.ballPosition;
  const startDistToGoal = goalDistanceScore(startBallPos, team);

  const scored = targets.map(t => {
    const ownGoalPos = team === 'home' ? HOME_GOAL_POSITIONS : AWAY_GOAL_POSITIONS;
    if (ownGoalPos.some(g => g.x === t.x && g.y === t.y)) return { target: t, score: -9999 };

    // Direct goal — always worth it
    if (isDirectGoalTarget(t, team)) return { target: t, score: 1000 };

    let score = 0;

    // How much do we advance vs the START of the turn (not current ball pos)?
    // This is the real gain because stopping reverts to startBallPos.
    const distToGoalAtTarget = goalDistanceScore(t, team);
    const netAdvance = startDistToGoal - distToGoalAtTarget;
    score += netAdvance * 20;

    // Chain continues to another receiver
    const nextReceiver = s.players.find(p =>
      p.team === team && p.position.x === t.x && p.position.y === t.y);
    if (nextReceiver) {
      score += 30;
      const futureChain = evaluateChainSequence(s, t, team, 0, 2);
      score += futureChain * 0.5;
    } else {
      const nearTeam = s.players.filter(p =>
        p.team === team && isAdjacent(p.position, t));
      score += nearTeam.length * 8;
    }

    // Penalize landing near rivals
    const rivalsNear = s.players.filter(p =>
      p.team === oppTeam && isAdjacent(p.position, t));
    score -= rivalsNear.length * 25;

    // Drag threats at target
    const directions8 = [
      {dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},
      {dx:0,dy:1},{dx:-1,dy:1},{dx:-1,dy:0},{dx:-1,dy:-1}
    ];
    directions8.forEach(dir => {
      for (let i = 1; i <= 4; i++) {
        const px = t.x + dir.dx * i, py = t.y + dir.dy * i;
        if (px < 0 || px >= BOARD_WIDTH || py < 0 || py >= BOARD_HEIGHT) break;
        const pl = s.players.find(p => p.position.x === px && p.position.y === py);
        if (pl) {
          if (pl.team === oppTeam) score -= Math.round(20 * (1 - (i-1)/4));
          break;
        }
      }
    });

    return { target: t, score };
  });

  scored.sort((a, b) => b.score - a.score);
  const best = scored[0];

  // Only continue chain if best option has positive net value
  // (i.e., better than reverting to start position)
  // A score <= 0 means we're not improving on turnStartState — stop the chain.
  if (best.score <= 0) return null;

  return best.target;
}

function pickBotOffsideMove(s) {
  const moves = s.validOffsideMoves || [];
  if (moves.length === 0) return null;
  if (moves.length === 1) return moves[0];

  const team = s.currentPlayer;
  const oppTeam = team === 'home' ? 'away' : 'home';
  const ball = s.ballPosition;

  const scored = moves.map(pos => {
    let score = 0;

    // Prefer positions closer to ball (stay in the game)
    if (ball) {
      const dist = Math.abs(pos.x - ball.x) + Math.abs(pos.y - ball.y);
      score -= dist * 3;

      // Bonus for being adjacent to ball (can act next turn)
      if (isAdjacent(pos, ball)) score += 25;
    }

    // Prefer positions near teammates (support network)
    const nearTeam = s.players.filter(p =>
      p.team === team && isAdjacent(p.position, pos)).length;
    score += nearTeam * 10;

    // Avoid positions near rivals
    const nearOpp = s.players.filter(p =>
      p.team === oppTeam && isAdjacent(p.position, pos)).length;
    score -= nearOpp * 15;

    // Prefer positions that advance toward opponent goal (stay useful offensively)
    score += goalDistanceScore(pos, team) * -2; // lower distance = higher score

    return { pos, score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored[0].pos;
}

// Decides if swapping the keeper back in is worth it: only if the keeper is meaningfully
// far from goal and a swap candidate is close to the keeper's own goal.
function shouldBotSwapGoalkeeper(s) {
  const gk = s.players.find(p => p.team === s.currentPlayer && p.isGoalkeeper);
  if (!gk) return null;
  const candidates = s.swapCandidates.filter(id => id !== gk.id);
  if (candidates.length === 0) return null;
  const ownGoalY = s.currentPlayer === 'home' ? BOARD_HEIGHT - 1 : 0;
  const best = candidates
    .map(id => s.players.find(p => p.id === id))
    .sort((a, b) => Math.abs(a.position.y - ownGoalY) - Math.abs(b.position.y - ownGoalY))[0];
  return best ? best.id : null;
}

// Runs one bot turn end-to-end with small delays between sub-steps so the move is readable on screen.
function runBotTurn() {
  const s = state;
  if (s.currentPlayer !== s.aiTeam || s.isAiThinking) return;
  setState({ isAiThinking: true });

  const step = () => {
    const cur = state;
    if (cur.currentPlayer !== cur.aiTeam || cur.gameMode !== 'vs-ai') { setState({ isAiThinking: false }); return; }

    if (cur.gamePhase === 'rolling') {
      doDiceRoll();
      setTimeout(step, 500);
      return;
    }
    if (cur.gamePhase === 'turn-over') {
      setTimeout(step, 300);
      return;
    }
    if (cur.gamePhase === 'goalkeeper-swap') {
      const swapId = shouldBotSwapGoalkeeper(cur);
      setTimeout(() => {
        if (swapId) setState(s2 => handlePlayerSelection(s2, swapId));
        else setState(s2 => advanceToNextTurn(s2, { skipSwapCheck: true }));
        setTimeout(step, 400);
      }, 500);
      return;
    }
    if (cur.gamePhase === 'resolving-offside') {
      const selId = cur.offsidePlayerIds[0];
      setState(s2 => handlePlayerSelection(s2, selId));
      setTimeout(() => {
        const mv = pickBotOffsideMove(state);
        if (mv) setState(s2 => handleSquareSelection(s2, mv));
        setTimeout(step, 400);
      }, 400);
      return;
    }
    if (cur.gamePhase === 'chain-pass') {
      // Safety counter to prevent infinite chain loops
      if (!step.chainDepth) step.chainDepth = 0;
      step.chainDepth++;

      const target = step.chainDepth <= 4 ? pickBotChainContinuation(cur) : null;

      setTimeout(() => {
        if (target) {
          setState(s2 => handleSquareSelection(s2, target));
        } else {
          step.chainDepth = 0;
          setState(s2 => {
            const logState = logAction(s2, lang === 'en' ? 'Opponent ends the play.' : lang === 'pt' ? 'O adversário encerra a jogada.' : 'El equipo rival termina la jugada.', 'game-event');
            const reverted = { ...logState, players: s2.turnStartState.players, ballPosition: s2.turnStartState.ballPosition, lastPlayerToTouchBallId: s2.turnStartState.lastPlayerToTouchBallId };
            return advanceToNextTurn(reverted);
          });
        }
        setTimeout(step, 500);
      }, 500);
      return;
    }
    if (cur.gamePhase === 'selecting-piece' || cur.gamePhase === 'moving-piece') {
      const move = pickBotMove(cur);
      if (!move) { setState(s2 => advanceToNextTurn(s2, { skipSwapCheck: true })); setTimeout(step, 300); return; }
      setTimeout(() => {
        // Select the player — this updates validKickTargets/validDragTargets/validMoves in state
        setState(s2 => handlePlayerSelection(s2, move.playerId));
        setTimeout(() => {
          // Verify the target is actually valid in the post-selection state.
          // For the goalkeeper (effectiveDice×2), the game engine computes the real
          // valid targets after selection — the bot's pre-computed target may differ.
          // If the target isn't valid, fall back to the best valid target of the same kind.
          setState(s2 => {
            const botTeam = s2.currentPlayer;
            const selectedPlayer = s2.players.find(p => p.id === s2.selectedPlayerId);
            if (!selectedPlayer) return advanceToNextTurn(s2, { skipSwapCheck: true });

            // Check if the pre-computed target is valid in the post-selection state
            const validForKind = {
              'kick': s2.validKickTargets || [],
              'lofted-pass': s2.validLoftedPassTargets || [],
              'drag': s2.validDragTargets || [],
              'lofted-drag': s2.validLoftedDragTargets || [],
              'move': s2.validMoves || [],
            }[move.kind] || [];

            const targetIsValid = validForKind.some(t =>
              t.x === move.target.x && t.y === move.target.y);

            let finalTarget = move.target;
            let finalKind = move.kind;

            if (!targetIsValid) {
              // Pre-computed target not valid — find best available
              const allTargets = [
                ...(s2.validKickTargets || []).map(t => ({ t, kind: 'kick' })),
                ...(s2.validDragTargets || []).map(t => ({ t, kind: 'drag' })),
                ...(s2.validLoftedPassTargets || []).map(t => ({ t, kind: 'lofted-pass' })),
                ...(s2.validLoftedDragTargets || []).map(t => ({ t, kind: 'lofted-drag' })),
                ...(s2.validMoves || []).map(t => ({ t, kind: 'move' })),
              ];
              if (allTargets.length === 0) return advanceToNextTurn(s2, { skipSwapCheck: true });

              // Score each available target properly
              const scored = allTargets.map(({ t, kind }) => {
                let sc = 0;
                if (kind === 'move') {
                  sc = scoreMoveAction(s2, selectedPlayer, t);
                } else {
                  // Ball action: use goalDistance + direct goal bonus
                  if (isDirectGoalTarget(t, botTeam)) sc = 1000;
                  else sc = (goalDistanceScore(s2.ballPosition, botTeam) - goalDistanceScore(t, botTeam)) * 20;
                }
                return { t, kind, sc };
              });
              scored.sort((a, b) => b.sc - a.sc);
              finalTarget = scored[0].t;
              finalKind = scored[0].kind;
            }

            // Execute the move — handle actionChoice immediately if it appears
            const afterMove = handleSquareSelection(s2, finalTarget);

            // Safety check: if state didn't change, the target wasn't processed
            if (afterMove === s2 || afterMove.gamePhase === s2.gamePhase &&
                afterMove.selectedPlayerId === s2.selectedPlayerId) {
              // Try to execute as a ball action directly if it's a ball kind
              if (finalKind !== 'move' && s2.ballPosition) {
                return handleActionExecution(s2, finalKind, finalTarget);
              }
              return advanceToNextTurn(s2, { skipSwapCheck: true });
            }

            if (afterMove.actionChoice) {
              const available = afterMove.actionChoice.actions;
              const act = available.includes(finalKind) ? finalKind : available[0];
              const pos = afterMove.actionChoice.position;
              return handleActionExecution({ ...afterMove, actionChoice: null }, act, pos);
            }

            return afterMove;
          });
          setTimeout(step, 600);
        }, 400);
      }, 500);
      return;
    }
    // Any other phase (pre-game-roll, half-time, game-over, etc.) — nothing for the bot to do here.
    setState({ isAiThinking: false });
  };
  step();
}
