// Applies the pulsing highlight to whichever element the current tutorial step points at
// (a board square, a player piece, or an HTML button like the dice-roll button).
function applyTutorialHighlight() {
  if (state.gameMode !== 'tutorial' || !state.highlightedElementId) return;
  const id = state.highlightedElementId;

  if (id === 'dice-roll-button') {
    const btn = document.getElementById('roll-dice-btn');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  if (id === 'skip-swap-button') {
    const btn = document.getElementById('skip-swap-btn');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  if (id === 'final-ok-button') {
    const btn = document.getElementById('final-ok-button');
    if (btn) btn.classList.add('tutorial-highlight-html');
    return;
  }
  const squareMatch = id.match(/^square-(\d+)-(\d+)$/);
  if (squareMatch) {
    const x = parseInt(squareMatch[1], 10), y = parseInt(squareMatch[2], 10);
    const boardSvg = document.getElementById('board');
    if (boardSvg) {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('class', 'tutorial-highlight-svg');
      r.setAttribute('x', x * CELL + 1); r.setAttribute('y', y * CELL + 1);
      r.setAttribute('width', CELL - 2); r.setAttribute('height', CELL - 2);
      r.setAttribute('rx', 4);
      r.setAttribute('pointer-events', 'none');
      boardSvg.appendChild(r);
    }
    return;
  }
  const playerMatch = id.match(/^player-(\d+)-(home|away)$/);
  if (playerMatch) {
    const num = parseInt(playerMatch[1], 10), team = playerMatch[2];
    const player = state.players.find(p => p.playerNumber === num && p.team === team);
    if (player) {
      const boardSvg = document.getElementById('board');
      const g = boardSvg ? boardSvg.querySelector(`[data-player-id="${player.id}"]`) : null;
      if (g) {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('class', 'tutorial-highlight-svg');
        circle.setAttribute('r', '15');
        circle.setAttribute('pointer-events', 'none');
        g.appendChild(circle);
      }
    }
  }
}

function doPreGameRoll(team) {
  if (state.isResolvingKickoff) return; // already showing both results, ignore extra calls
  if (state[`${team}Roll`] !== null) return; // this side already rolled, don't overwrite it
  sounds.diceRoll();
  const roll = DICE_VALUES[Math.floor(Math.random() * DICE_VALUES.length)] || (Math.floor(Math.random()*6)+1);
  // Pre-game roll should not be 0 (need a winner); use 1-6 excluding tie-prone 0
  const fairRoll = Math.floor(Math.random() * 6) + 1;
  setState(s => {
    const teamName = getTeamName(s, team);
    const logged = logAction(s, lang === 'en' ? `${teamName} rolled ${fairRoll}.` : lang === 'pt' ? `${teamName} tirou ${fairRoll}.` : `${teamName} sacó un ${fairRoll}.`, 'roll', team);
    const withRoll = { ...logged, [`${team}Roll`]: fairRoll };
    if (withRoll.homeRoll !== null && withRoll.awayRoll !== null) {
      // Both results are in: show them side by side for a moment before resolving the winner,
      // so the second roll's number doesn't flash by unread.
      const winnerName = withRoll.homeRoll === withRoll.awayRoll ? null
        : getTeamName(withRoll, withRoll.homeRoll > withRoll.awayRoll ? 'home' : 'away');
      const pauseMsg = winnerName
        ? (lang === 'en' ? `${getTeamName(withRoll,'home')}: ${withRoll.homeRoll} — ${getTeamName(withRoll,'away')}: ${withRoll.awayRoll}. ${winnerName} wins!` : lang === 'pt' ? `${getTeamName(withRoll,'home')}: ${withRoll.homeRoll} — ${getTeamName(withRoll,'away')}: ${withRoll.awayRoll}. ${winnerName} venceu!` : `${getTeamName(withRoll,'home')}: ${withRoll.homeRoll} — ${getTeamName(withRoll,'away')}: ${withRoll.awayRoll}. ¡Gana ${winnerName}!`)
        : (lang === 'en' ? `Draw ${withRoll.homeRoll} — ${withRoll.awayRoll}. Rolling again...` : lang === 'pt' ? `Empate ${withRoll.homeRoll} — ${withRoll.awayRoll}. Lançando novamente...` : `Empate ${withRoll.homeRoll} a ${withRoll.awayRoll}. Vuelven a tirar...`);
      const withPauseMsg = { ...withRoll, message: pauseMsg, isResolvingKickoff: true };
      setTimeout(() => {
        setState(s2 => {
          if (!s2.isResolvingKickoff) return s2; // user already moved on somehow
          return resolveKickoffWinner({ ...s2, isResolvingKickoff: false });
        });
      }, 1700);
      return withPauseMsg;
    }
    return withRoll;
  });
}

function resolveKickoffWinner(s) {
  if (s.homeRoll === null || s.awayRoll === null) return s;
  let startingTeam = null;
  if (s.homeRoll > s.awayRoll) startingTeam = 'home';
  else if (s.awayRoll > s.homeRoll) startingTeam = 'away';

  if (startingTeam) {
    const winnerName = getTeamName(s, startingTeam);
    const rollVal = startingTeam === 'home' ? s.homeRoll : s.awayRoll;
    const msg = lang === 'en' ? `${winnerName} rolls ${rollVal} and wins the kickoff! Roll the dice to start.` : lang === 'pt' ? `${winnerName} tira ${rollVal} e vence o sorteio! Lance o dado para começar.` : `¡${winnerName} saca un ${rollVal} y gana el saque! Lanza el dado para empezar.`;
    const newPlayers = movePlayersForKickoff(getInitialPlayers(), startingTeam);
    startClock();
    startTurnTimer();
    preGameRollStartedAt = null;
    const finalState = {
      ...s, players: newPlayers, currentPlayer: startingTeam, gamePhase: 'rolling',
      kickoffTeam: startingTeam, turnCount: 1, isClockRunning: true, homeRoll: null, awayRoll: null,
      isKickoffTurn: true, timer: s.turnDuration,
      stats: { ...s.stats, possession: { home: s.stats.possession.home + (startingTeam === 'home' ? 1 : 0), away: s.stats.possession.away + (startingTeam === 'away' ? 1 : 0) } },
    };
    return logAction(finalState, msg, 'game-event', startingTeam);
  }
  const tieMsg = lang === 'en' ? 'Draw! Roll again.' : lang === 'pt' ? 'Empate! Lance novamente.' : '¡Empate! Vuelvan a tirar los dados.';
  return logAction({ ...s, homeRoll: null, awayRoll: null }, tieMsg, 'roll');
}

function doDiceRoll() {
  // If there's a pending undo request from the opponent, rolling the dice cancels it
  if (onlineIncomingUndoFrom) declineOnlineUndo();
  sounds.diceRoll();
  const roll = DICE_VALUES[Math.floor(Math.random() * DICE_VALUES.length)];
  setState(s => {
    const updated = { ...s, diceValue: roll };
    if (roll === 0) {
      const zeroState = { ...logAction(updated, t('msg.zero'), 'roll'), gamePhase: 'turn-over' };
      // In online mode, only the player who actually rolled drives this timeout.
      // The other client just receives 'turn-over' via Firebase and stays passive —
      // it must NOT also schedule its own advance, or both clients race to call
      // advanceToNextTurn from two different stale closures over `state`.
      const shouldDriveTimeout = zeroState.gameMode !== 'online' || onlineMyTeam === zeroState.currentPlayer;
      if (shouldDriveTimeout) {
        const advanceFromZero = () => {
          setState(s2 => {
            if (s2.gamePhase !== 'turn-over') return s2; // already moved on (normal case)
            return advanceToNextTurn({ ...s2, lastAction: null });
          });
        };
        setTimeout(advanceFromZero, 1400);
        // Online safety net: a remote sync arriving in that 1.4s window can briefly
        // overwrite local state and make the check above bail out, leaving the turn
        // stuck forever with nobody left to advance it. Re-check shortly after as a
        // fallback in case the first attempt was skipped this way.
        if (zeroState.gameMode === 'online') {
          setTimeout(advanceFromZero, 2600);
        }
      }
      return zeroState;
    }
    const teamName = getTeamName(s, s.currentPlayer);
    const withLog = logAction(updated, t('msg.rolled', { value: roll, team: teamName }), 'roll');
    return {
      ...withLog, gamePhase: 'selecting-piece',
      turnStartState: { players: s.players, ballPosition: s.ballPosition, lastPlayerToTouchBallId: s.lastPlayerToTouchBallId },
      prevTurnSnapshot: {
        players: s.players.map(p => ({ ...p, position: { ...p.position } })),
        ballPosition: s.ballPosition ? { ...s.ballPosition } : null,
        lastPlayerToTouchBallId: s.lastPlayerToTouchBallId,
        currentPlayer: s.currentPlayer,
        turnCount: s.turnCount,
        diceValue: roll,
      },
    };
  });
}

/* ---------------- Clock ---------------- */
function advanceTurnByTimeout(s) {
  // If there's a pending undo request, auto-decline it when turn times out
  if (onlineIncomingUndoFrom) declineOnlineUndo();
  const logState = logAction(s, lang === 'en' ? "Time's up!" : '¡Tiempo agotado!', 'game-event', s.currentPlayer);
  if (s.gamePhase === 'chain-pass' && s.turnStartState) {
    const logState2 = logAction(logState, lang === 'en' ? 'Chain pass cancelled due to timeout.' : lang === 'pt' ? 'Passe em cadeia cancelado por tempo esgotado.' : 'La jugada de pase en cadena se anula por falta de tiempo.', 'game-event', s.currentPlayer);
    const reverted = { ...logState2, players: s.turnStartState.players, ballPosition: s.turnStartState.ballPosition, lastPlayerToTouchBallId: s.turnStartState.lastPlayerToTouchBallId, lastAction: null };
    return advanceToNextTurn(reverted);
  }
  return advanceToNextTurn({ ...logState, lastAction: null });
}

function startClock() {
  if (clockIntervalHandle) clearInterval(clockIntervalHandle);
  clockIntervalHandle = setInterval(() => {
    // The match clock is purely a local, cosmetic countdown — it never syncs via
    // Firebase. Each player's browser ticks its own clock independently, exactly
    // like the original React build (useGameTimers dispatched TICK_GAME_CLOCK to
    // the local reducer only, with no online write at all). Trying to keep both
    // clients' clocks in lockstep over the network was the actual source of the
    // "lag" — every tick was a write competing with real moves. A few hundred ms
    // of clock drift between two screens is invisible to a real game; constant
    // network traffic for it was not.
    if (!state.isClockRunning) return;
    if (state.gamePhase === 'main-menu' || state.gamePhase === 'game-over' || state.gamePhase === 'half-time') return;
    if (state.gameMode === 'online' && document.visibilityState === 'hidden') return;
    if (state.targetGoals) return; // goals mode — no clock
    if (['resolving-offside', 'goalkeeper-swap'].includes(state.gamePhase)) return; // paused during resolution
    if (state.gameClock > 0) {
      setLocalOnlyState(s => ({ ...s, gameClock: s.gameClock - 1 }));
      return;
    }
    // Reaching zero is a real rule event (half/match ends). In online mode only
    // the host drives that transition into the shared, synced state; the guest's
    // clock just sits at 0 until the host's resulting state arrives via Firebase.
    if (state.gameMode === 'online' && onlineMyTeam !== 'home') return;
    setState(s => handleEndHalfOrMatch(s));
  }, 1000);
}

function startTurnTimer() {
  if (turnTimerIntervalHandle) clearInterval(turnTimerIntervalHandle);
  startTurnTimer._lastTick = null; // reset second tracker

  // Fix 3: track when the tab was hidden to correct timer on return (online only)
  let hiddenAt = null;
  const onVisibilityChange = () => {
    if (state.gameMode !== 'online') return;
    if (document.visibilityState === 'hidden') {
      hiddenAt = Date.now();
    } else if (hiddenAt !== null) {
      // Tab came back — calculate real elapsed time and apply correction
      const elapsed = Math.floor((Date.now() - hiddenAt) / 1000);
      hiddenAt = null;
      if (elapsed > 0) {
        const isTimerActive = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass', 'pre-game-roll', 'half-time'].includes(state.gamePhase)
          && state.gameMode === 'online';
        if (!isTimerActive) return;
        const newTimer = Math.max(0, state.timer - elapsed);
        if (newTimer === 0) {
          // Timer expired while tab was hidden — trigger timeout now
          if (state.gamePhase === 'half-time') {
            startSecondHalfOnlineAuto();
          } else if (state.gamePhase === 'pre-game-roll') {
            autoRollPreGame();
          } else {
            setState(s => advanceTurnByTimeout(s));
          }
        } else {
          setLocalOnlyState(s => ({ ...s, timer: newTimer }));
        }
      }
    }
  };
  // Remove previous listener if any and add fresh one
  document.removeEventListener('visibilitychange', onVisibilityChange);
  document.addEventListener('visibilitychange', onVisibilityChange);

  turnTimerIntervalHandle = setInterval(() => {
    const isNormalTurn = ['rolling', 'selecting-piece', 'moving-piece', 'chain-pass'].includes(state.gamePhase)
      && state.gameMode !== 'tutorial'
      && state.gameMode !== 'training';

    // Normal turn timer (non-wall-clock): only decrement once per second
    // despite the interval running at 250ms for smoother wall-clock timers
    if (isNormalTurn) {
      if (document.visibilityState === 'hidden') return;
      // Use a separate second tracker to avoid decrementing 4x per second
      if (!startTurnTimer._lastTick) startTurnTimer._lastTick = Date.now();
      const now = Date.now();
      if (now - startTurnTimer._lastTick < 950) return; // not a full second yet
      startTurnTimer._lastTick = now;
      if (state.timer > 0) {
        setLocalOnlyState(s => ({ ...s, timer: s.timer - 1 }));
        return;
      }
      setState(s => advanceTurnByTimeout(s));
      return;
    }

    // Offside resolution timeout — if player doesn't move in 15s, auto-move to best valid position
    if (state.gamePhase === 'resolving-offside') {
      if (!startTurnTimer._lastOffsideTick) startTurnTimer._lastOffsideTick = Date.now();
      const now = Date.now();
      if (now - startTurnTimer._lastOffsideTick < 950) return;
      startTurnTimer._lastOffsideTick = now;
      if (state.offsideTimer > 0) {
        setLocalOnlyState(s => ({ ...s, offsideTimer: s.offsideTimer - 1 }));
        return;
      }
      // Time's up — auto-resolve: select the first offside player then move to best position
      startTurnTimer._lastOffsideTick = null;
      const offsideId = state.offsidePlayerIds[0];
      if (!offsideId) return;
      // First select the player
      setState(s => handlePlayerSelection(s, offsideId));
      // Then move to best position after a tick
      setTimeout(() => {
        const mv = pickBotOffsideMove(state);
        if (mv) setState(s => handleSquareSelection(s, mv));
        else {
          // No valid move — skip this player and advance
          setState(s => {
            const remaining = s.offsidePlayerIds.filter(id => id !== offsideId);
            if (remaining.length > 0) return { ...s, offsidePlayerIds: remaining, selectedPlayerId: null, validOffsideMoves: [] };
            const msg = lang === 'en' ? `Offside resolved. ${getTeamName(s, s.currentPlayer)}'s turn.` : lang === 'pt' ? `Impedimento resolvido. Turno de ${getTeamName(s, s.currentPlayer)}.` : `Fuera de juego resuelto. Turno de ${getTeamName(s, s.currentPlayer)}.`;
            return { ...logAction(s, msg, 'game-event'), gamePhase: 'rolling', selectedPlayerId: null, offsidePlayerIds: [], validOffsideMoves: [], offsideContext: null, timer: s.turnDuration };
          });
        }
      }, 100);
      return;
    }
    if (startTurnTimer._lastOffsideTick) startTurnTimer._lastOffsideTick = null;

    // Goalkeeper swap timeout — if player doesn't swap in 15s, skip swap (goalkeeper stays out)
    if (state.gamePhase === 'goalkeeper-swap') {
      if (!startTurnTimer._lastSwapTick) startTurnTimer._lastSwapTick = Date.now();
      const now = Date.now();
      if (now - startTurnTimer._lastSwapTick < 950) return;
      startTurnTimer._lastSwapTick = now;
      if (state.swapTimer > 0) {
        setLocalOnlyState(s => ({ ...s, swapTimer: s.swapTimer - 1 }));
        return;
      }
      // Time's up — skip swap, goalkeeper stays where they are
      startTurnTimer._lastSwapTick = null;
      setState(s => advanceToNextTurn(s, { skipSwapCheck: true }));
      return;
    }
    if (startTurnTimer._lastSwapTick) startTurnTimer._lastSwapTick = null;
    const isPreGameRoll = state.gamePhase === 'pre-game-roll' && state.gameMode === 'online';
    if (isPreGameRoll) {
      if (preGameRollStartedAt === null) preGameRollStartedAt = Date.now(); // safety
      const elapsed = Math.floor((Date.now() - preGameRollStartedAt) / 1000);
      const remaining = Math.max(0, 30 - elapsed);
      if (state.timer !== remaining) {
        setLocalOnlyState(s => ({ ...s, timer: remaining }));
      }
      if (remaining === 0) autoRollPreGame();
      return;
    }

    // Fix 2: half-time auto-start (online only) — wall-clock based
    // Use wall-clock time from halfTimeStartedAt so host and guest trigger
    // at the same real-world moment regardless of network latency.
    const isHalfTime = state.gamePhase === 'half-time' && state.gameMode === 'online';
    if (isHalfTime) {
      if (halfTimeStartedAt === null) halfTimeStartedAt = Date.now(); // safety
      const elapsed = Math.floor((Date.now() - halfTimeStartedAt) / 1000);
      const remaining = Math.max(0, 30 - elapsed);
      // Update displayed timer surgically
      if (state.timer !== remaining) {
        setLocalOnlyState(s => ({ ...s, timer: remaining }));
      }
      if (remaining === 0) startSecondHalfOnlineAuto();
      return;
    }

    // Overtime-choice timeout (online only, host decides in 30s or match ends in draw)
    const isOvertimeChoice = state.gamePhase === 'overtime-choice' && state.gameMode === 'online';
    if (isOvertimeChoice) {
      if (overtimeChoiceStartedAt === null) overtimeChoiceStartedAt = Date.now();
      const elapsed = Math.floor((Date.now() - overtimeChoiceStartedAt) / 1000);
      const remaining = Math.max(0, 30 - elapsed);
      if (state.timer !== remaining) setLocalOnlyState(s => ({ ...s, timer: remaining }));
      if (remaining === 0 && onlineIsHost) {
        overtimeChoiceStartedAt = null;
        setState(s => {
          if (s.gamePhase !== 'overtime-choice') return s;
          const msg = lang === 'en' ? 'Time ran out. Match ends in a draw.' : lang === 'pt' ? 'O tempo acabou. A partida termina em empate.' : 'Se acabó el tiempo. El partido termina en empate.';
          return { ...logAction(s, msg, 'game-event'), gamePhase: 'game-over', isClockRunning: false };
        });
      }
      return;
    }

    const isTimerActive = isNormalTurn;
    if (!isTimerActive) return;

    // Fix 3: skip tick if hidden (correction happens in visibilitychange handler)
    if (document.visibilityState === 'hidden') return;

    if (state.timer > 0) {
      setLocalOnlyState(s => ({ ...s, timer: s.timer - 1 }));
      return;
    }

    // Timer reached 0 — handle each phase
    if (isPreGameRoll) {
      autoRollPreGame();
      return;
    }
    setState(s => advanceTurnByTimeout(s));
  }, 250); // 250ms for smooth wall-clock timer display (pre-game-roll and half-time)
}

// Fix 1: auto-roll for whichever side hasn't rolled yet in pre-game-roll
function autoRollPreGame() {
  if (state.gamePhase !== 'pre-game-roll' || state.gameMode !== 'online') return;
  preGameRollStartedAt = null;
  if (onlineMyTeam === 'home' && state.homeRoll === null) {
    // Host auto-rolls for themselves
    doPreGameRoll('home');
  } else if (onlineMyTeam === 'away' && state.awayRoll === null) {
    if (state.homeRoll !== null) {
      // Host already rolled — guest can roll now
      doPreGameRoll('away');
    } else {
      // Host hasn't rolled yet — restart the countdown from now and wait
      preGameRollStartedAt = Date.now();
    }
  }
}

// Fix 2: auto-start second half after 30s (online only, each client drives it)
// Uses wall-clock time (halfTimeStartedAt) instead of a local countdown to avoid
// desync between host and guest who receive the half-time state at different times.
let halfTimeStartedAt = null;
let preGameRollStartedAt = null; // wall-clock reference for pre-game-roll timer
let overtimeChoiceStartedAt = null; // wall-clock reference for overtime-choice timeout

function startSecondHalfOnlineAuto() {
  if (state.gamePhase !== 'half-time' || state.gameMode !== 'online') return;
  setState(s => {
    if (s.gamePhase !== 'half-time') return s; // already started
    const secondHalfKickoff = s.kickoffTeam === 'home' ? 'away' : 'home';
    const newPlayers = movePlayersForKickoff(getInitialPlayers(), secondHalfKickoff);
    const kickoffTeamName = getTeamName(s, secondHalfKickoff);
    const news = {
      ...s, players: newPlayers, ballPosition: { ...INITIAL_BALL_POSITION }, gamePhase: 'rolling',
      currentPlayer: secondHalfKickoff, half: 2, diceValue: null, ...freshActionState(),
      lastPlayerToTouchBallId: null, timer: s.turnDuration, gameClock: s.halfDurationMinutes * 60,
      isClockRunning: true, isKickoffTurn: true, assistProviderId: null, prevTurnSnapshot: null,
    };
    return logAction(news, `Comienza el segundo tiempo. Saca ${kickoffTeamName}.`, 'game-event');
  });
  halfTimeStartedAt = null;
}

function wireAuthEvents() {
  const googleBtn = document.getElementById('auth-google-btn');
  if (googleBtn) googleBtn.onclick = () => loginWithGoogle();

  const switchBtn = document.getElementById('auth-switch-btn');
  if (switchBtn) switchBtn.onclick = () => {
    authFormMode = authFormMode === 'login' ? 'register' : 'login';
    authFormError = '';
    render();
  };

  const backBtn = document.getElementById('auth-back-btn');
  if (backBtn) backBtn.onclick = () => { currentMenuView = 'landing'; render(); };

  const submitBtn = document.getElementById('auth-submit-btn');
  if (submitBtn) submitBtn.onclick = async () => {
    const email = document.getElementById('auth-email')?.value?.trim();
    const password = document.getElementById('auth-password')?.value;
    const username = document.getElementById('auth-username')?.value?.trim();
    if (!email || !password) { authFormError = lang === 'en' ? 'Please fill in all fields.' : lang === 'pt' ? 'Preencha todos os campos.' : 'Completá todos los campos.'; render(); return; }
    if (authFormMode === 'register' && !username) { authFormError = lang === 'en' ? 'Choose a username.' : lang === 'pt' ? 'Escolha um nome de usuário.' : 'Elegí un nombre de usuario.'; render(); return; }
    authFormLoading = true;
    authFormError = '';
    render();
    try {
      if (authFormMode === 'register') {
        await registerWithEmail(email, password, username);
      } else {
        await loginWithEmail(email, password);
      }
      currentMenuView = 'main';
    } catch (err) {
      authFormError = err.message;
    }
    authFormLoading = false;
    render();
  };

  // Allow Enter to submit
  ['auth-email', 'auth-password', 'auth-username'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.onkeydown = (e) => { if (e.key === 'Enter') submitBtn?.click(); };
  });
}

function checkUrlRoomParam() {
  const params = new URLSearchParams(window.location.search);
  const sala = params.get('sala');
  if (!sala) return;
  // Clean the URL without reloading
  window.history.replaceState({}, '', window.location.pathname);
  // Wait for auth to be ready then join
  const tryJoin = () => {
    if (!currentUser) { setTimeout(tryJoin, 500); return; }
    const code = sala.toUpperCase();
    currentMenuView = 'online-setup';
    render();
    // Pre-fill the join code and trigger join flow
    setTimeout(() => {
      const input = document.getElementById('online-join-input');
      if (input) {
        input.value = code;
        const joinBtn = document.getElementById('online-join-submit');
        if (joinBtn) joinBtn.click();
      } else {
        // Fallback: go directly to join
        onlineJoinRoom(code, resolvePickedTeam('home'));
      }
    }, 300);
  };
  tryJoin();
}

// Background tabs get their setInterval throttled hard by the browser (sometimes
// paused entirely) to save battery/CPU. In online mode this means the inactive
// tab's clock/timer can fall behind, and its Firebase listener may also deliver
// updates late. When the tab regains focus, force an immediate re-read of the
// current gameState from Firebase so the UI is never acting on stale data.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'visible') return;
  if (state.gameMode !== 'online' || !onlineRoomRef || onlineStatus !== 'connected') return;
  // Force a fresh read when the tab regains focus — Firestore's onSnapshot
  // listener may have been suspended by the browser while the tab was hidden.
  onlineRoomRef.get().then(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    if (!data || !data.gameState || !data.gameState.gamePhase) return;
    applyRemoteState(data.gameState);
  }).catch(() => {});
});
